<script>
/* EN build (analysis/build_english_pages.py): translate Hebrew names inside every
   fetched JSON via data/names_en.json — keys AND values, exact-match only, so party
   ballot codes and other join keys pass through untouched. */
(function(){
  var orig = window.fetch.bind(window);
  var mapP = null;
  function getMap(){
    if(!mapP) mapP = orig('data/names_en.json').then(function(r){return r.json();}).then(function(d){
      var m = {};
      [d.localities, d.parties, d.misc, d.elections].forEach(function(part){
        if(part) for(var k in part) m[k] = part[k];
      });
      return m;
    });
    return mapP;
  }
  var HEBRE = /[\u0590-\u05FF]/;
  function tr(m, s){ return (m[s] !== undefined && HEBRE.test(s)) ? m[s] : s; }
  function deep(m, o){
    if(Array.isArray(o)){
      for(var i=0;i<o.length;i++) o[i] = deep(m, o[i]);
      return o;
    }
    if(o && typeof o === 'object'){
      var ks = Object.keys(o);
      for(var j=0;j<ks.length;j++){
        var k = ks[j], nk = tr(m, k), v = deep(m, o[k]);
        if(nk !== k){ delete o[k]; }
        o[nk] = v;
      }
      return o;
    }
    return (typeof o === 'string') ? tr(m, o) : o;
  }
  window.fetch = function(input, init){
    var url = (typeof input === 'string') ? input : ((input && input.url) || '');
    var p = orig(input, init);
    if(url.indexOf('names_en.json') !== -1) return p;
    return p.then(function(r){
      if(!r || !r.ok) return r;
      var j = r.json.bind(r);
      r.json = function(){
        return Promise.all([getMap(), j()]).then(function(a){ return deep(a[0], a[1]); });
      };
      return r;
    });
  };
})();
</script>

<script>
const YEARS = {
  '2022': {data:'statarea_2022.json', geo:'statarea_2022_geo.json', pnKey:'25', censusYr:'2022',
    demo:['datiyut','acad','wage','ses','age','aliya','origin'], sesVin:'2021',
    intro:`The map shows the 25th Knesset election results (November 2022) at statistical-area level —
      roughly 2,400 neighborhoods and areas — cross-referenced with the CBS 2022 census.<br><br>
      <b>How it was built:</b> ~32,700 polling stations were geocoded (98% success) and assigned to the
      statistical area they sit in; votes were summed per area. Coverage: 97.3% of the geographic vote.<br><br>
      <b>Location source:</b> the official 25th-Knesset polling-station address file, plus hundreds of verified position fixes. This is the most accurate layer in the system.<br><br>
      <b>Caveats:</b> turnout is computed only over mapped stations; some areas get
      census data at combined-area or locality level; about 1% of votes "spill" into a neighboring area.`},
  '2009': {data:'statarea_2009.json', geo:'statarea_2009_geo.json', pnKey:'18', censusYr:'2008',
    demo:['religion','acad','ses','age','aliya','origin'],
    intro:`The map shows the 18th Knesset election results (February 2009) at statistical-area level —
      roughly 2,300 areas — cross-referenced with the CBS 2008 census. <b>A cross never done before:</b>
      each election with its contemporary census.<br><br>
      <b>How it was built:</b> the CEC official polling-place list (December 2008) includes
      <b>a period-true address for every station</b>; the addresses were geocoded, validated against the locality polygons,
      and assigned to the 2008-census statistical area (point-in-polygon). 55% of the votes sit on
      an official address, the rest on venue-name matching; coverage: 99.7% of the geographic vote
      (closure against each locality's total: 99.9%).<br><br>
      <b>Caveats:</b> religion data is at locality level (2019); some areas get census at
      locality level; a socioeconomic cluster exists for 56% of areas (localities ≥ 10k). In Giv'at Ze'ev
      and Beitar Illit a large share of votes still sits on
      estimated coordinates — <span class="warn">the neighborhood map there is less accurate</span>;
      the locality-level summary is reliable.`},
  '2006': {data:'statarea_k17.json', geo:'statarea_1995_geo.json', pnKey:'17', censusYr:'1995',
    noTurnout:true, demo:['religion','age','aliya','origin','oc'],
    intro:`The map shows the 17th Knesset election results (March 2006) at statistical-area level, on
      the 1995-census statistical-area boundaries, <b>cross-referenced with the 1995 census</b>
      (religion, age, post-1990 immigrants; ~91% of areas).<br><br>
      <b>How it was built:</b> the official 2006 ballot file carries each station's <b>contemporaneous street address</b>
      (99.8% of votes); the addresses were geocoded, validated against the locality's own polygons, and assigned
      to their statistical area (point-in-polygon). A method fully independent of the modern venue master
      that the 2009+ layers rely on.<br><br>
      <b>Caveats:</b> the 2006 file has no registered-voter counts — hence no turnout;
      some stations are placed via a neighboring station (imputation) or at street level only.`},
  '2003': {data:'statarea_k16.json', geo:'statarea_1995_geo.json', pnKey:'16', censusYr:'1995',
    demo:['religion','age','aliya','origin','oc'],
    intro:`The map shows the 16th Knesset election results (January 2003) at statistical-area level, on
      the 1995-census boundaries, <b>cross-referenced with the 1995 census</b> (religion, age, post-1990 immigrants).<br><br>
      <b>How it was built:</b> 2003 ballot-box numbers were joined to the 2006 boxes of the same locality
      (~96.6% exact matches — a single step back) and inherited the station-address coordinate
      from 2006. The 2003 election predates the November 2003 municipal mergers, so locality codes
      natively match the 1995 geometry.<br><br>
      <b>Caveats:</b> the method assumes 2003→2006 ballot-number stability; unmatched boxes
      were placed via a neighboring box or dropped.`},
};
// the six additional elections share two methodology templates
const INTRO_MODERN22 = (k, when) => `The map shows the election results for Knesset ${k} (${when}) at statistical-area level,
  cross-referenced with the 2022 census. <b>Note:</b> the census postdates the election — demographics reflect 2022, not election day.<br><br>
  <b>How it was built:</b> like the 2022 layer — station locations from the venue master (+coordinate fixes), point-in-polygon into 2022-census areas.<br><br>

function yaminaAdj(){ return YAMINA_RIGHT && YEAR === '2021'; }
// rec must carry .blocs + .parties (SA records, estimate records, interp donors all do).
// Below the record's party cutoff (0.5%) the shift is negligible and skipped.
function adjBlocs(rec){
  if(!rec || !rec.blocs || !yaminaAdj()) return rec && rec.blocs;
  const y = (rec.parties && rec.parties['ב']) || 0;
  if(!y) return rec.blocs;
  return Object.assign({}, rec.blocs, {
    rh:  Math.round((rec.blocs.rh + y) * 100) / 100,
    cla: Math.round(Math.max(0, rec.blocs.cla - y) * 100) / 100,
  });
}

function lerpColor(a, b, t){
  const pa = [1,3,5].map(i=>parseInt(a.substr(i,2),16));
  const pb = [1,3,5].map(i=>parseInt(b.substr(i,2),16));
  return 'rgb(' + pa.map((v,i)=>Math.round(v+(pb[i]-v)*t)).join(',') + ')';
}
function ramp(val, min, max, color){
  if(val == null) return NO_DATA;
  const t = Math.max(0, Math.min(1, (val-min)/(max-min)));
  return lerpColor('#141a24', color, t);
}
function pct(vals, p){
  const s = vals.filter(v=>v!=null).sort((a,b)=>a-b);
  return s.length ? s[Math.min(s.length-1, Math.floor(p*s.length))] : 0;
}
function relLabel(c){ return YEARS[YEAR].censusYr==='2022' ? (c.religion||'') : (c.rel_dom||''); }
function aliyaVal(c){ return YEARS[YEAR].censusYr==='1995' ? c.aliya90 : c.aliya02; }
// Ethnic-origin axis (census "מוצא": father's continent for the Israel-born): (Asia+Africa) − (Europe-America).
// 1995 shares are of Jews+others and overlap born_il; 2008/2022 are an exclusive breakdown incl. origin-Israel
// (which sits neutral on the axis). Non-Jewish-majority areas return null — this is an intra-Jewish measure.
function originVal(c){
  if(!c) return null;
  if(YEARS[YEAR].censusYr === '1995'){
    if(c.orig_asia == null || c.orig_euram == null) return null;
    if(!c.religion || (c.religion.jew || 0) < 50) return null;
    return (c.orig_asia + (c.orig_afr || 0)) - c.orig_euram;
  }
  if(c.orig_asia == null || c.orig_eur == null) return null;
  const rel = relLabel(c) || '';
  if(rel && !rel.startsWith('Jew')) return null;
  return (c.orig_asia + (c.orig_afr || 0)) - (c.orig_eur + (c.orig_am || 0));
}
const POSTER_BUCKETS = ['<25','25-30','30-35','35-40','40-45','45-50','50+'];
function shareBucket(s){ return s>=50?6 : s>=45?5 : s>=40?4 : s>=35?3 : s>=30?2 : s>=25?1 : 0; }
function winnerShade(code, share){
  const base = WINNER_COLORS[code] || WINNER_FALLBACK;
  if(share == null) return base;
  return lerpColor('#141a24', base, 0.30 + 0.70 * shareBucket(share) / 6);
}

function getColor(rec){
  if(!rec) return NO_DATA;
  const c = rec.census || {};
  const voteModes = {bloc:1, winner:1, party:1, turnout:1};
  if(voteModes[currentMode] && !rec.blocs) return NO_DATA;
  switch(currentMode){
    case 'bloc': {
      const B = adjBlocs(rec);
      const m = B.rh - B.cla;
      if(Math.abs(m) < 1) return 'rgb(80,80,90)';
      const t = Math.min(Math.abs(m), 60)/60;
      return m > 0 ? lerpColor('#141a24','#4a9eff',0.25+0.75*t) : lerpColor('#141a24','#ef4444',0.25+0.75*t);
    }
    case 'winner': return POSTER ? winnerShade(rec.winner, rec.parties[rec.winner])
                                 : (WINNER_COLORS[rec.winner] || WINNER_FALLBACK);
    case 'party': {
      const share = rec.parties[selectedParty] || 0;
      const s = scales['party_'+selectedParty];
      const col = WINNER_COLORS[selectedParty] || '#4a9eff';
      return share <= 0 ? NO_DATA : ramp(share, 0, s.max, col);
    }
    case 'turnout': return rec.turnout==null ? NO_DATA : ramp(rec.turnout, 30, 90, '#2ecc71');
    case 'seg': {
      const e = spaceEntry(rec);
      return e ? (SPACE.meta.segments[e[2]]||{}).color || NO_DATA : NO_DATA;
    }
    case 'pc2': {
      const e = spaceEntry(rec);
      if(!e) return NO_DATA;
      const [lo, hi] = SPACE.meta.pc2_scale;
      const v = e[1];
      if(Math.abs(v) < 3) return 'rgb(80,80,90)';
      const t = Math.min(Math.abs(v), v > 0 ? hi : -lo) / (v > 0 ? hi : -lo);
      return v > 0 ? lerpColor('#141a24','#a855f7',0.4+0.6*t)
                   : lerpColor('#141a24','#22d3ee',0.4+0.6*t);
    }
    case 'datiyut': return DATIYUT_COLORS[c.datiyut] || NO_DATA;
    case 'religion': return RELIGION_COLORS[c.rel_dom] || NO_DATA;
    case 'acad':  return ramp(c.acad,  scales.acad.min,  scales.acad.max,  '#22d3ee');
    case 'wage':  return ramp(c.med_wage, scales.wage.min, scales.wage.max, '#2ecc71');
    case 'ses':   return ramp(c.ses_cluster, scales.ses.min, scales.ses.max, '#10b981');
    case 'age':   return ramp(c.age_med, scales.age.min, scales.age.max, '#a855f7');
    case 'aliya': return ramp(aliyaVal(c), scales.aliya.min, scales.aliya.max, '#f97316');
    case 'origin': {
      const m = originVal(c);
      if(m == null) return NO_DATA;
      if(Math.abs(m) < 2) return 'rgb(80,80,90)';
      // 0.4 floor: mild leanings must stay distinguishable from no-data black (the national
      // p95 scale is set by homogeneous towns, so intra-city values sit low on it)
      const t = Math.min(Math.abs(m), scales.origin.max)/scales.origin.max;
      return m > 0 ? lerpColor('#141a24','#f59e0b',0.4+0.6*t) : lerpColor('#141a24','#38bdf8',0.4+0.6*t);
    }
    case 'oc': {
      const v = (c.oc||{})[selectedOrigin];
      if(v == null) return NO_DATA;
      const t = Math.max(0, Math.min(1, v/scales['oc_'+selectedOrigin].max));
      return lerpColor('#141a24','#fb923c',0.3+0.7*t);
    }
  }
  return NO_DATA;
}

// ---- interpolated fill: paint no-ballot SAs from the nearest voted SA in the same locality ----
// display-only estimate; the underlying data stays actuals (venue-based placement).
function ensureInterp(){
  if(interpMap) return;
  interpMap = {};
  const cent = {}, votedBySem = {};
  GEO.features.forEach(f=>{
    const g = f.geometry;
    const ring = (g.type==='MultiPolygon' ? g.coordinates[0] : g.coordinates)[0];
    let x=0, y=0;
    ring.forEach(p=>{ x+=p[0]; y+=p[1]; });
    cent[f.properties.id] = [x/ring.length, y/ring.length];
    const rec = SA.areas[f.properties.id];
    if(rec && rec.blocs) (votedBySem[f.properties.semel] = votedBySem[f.properties.semel] || []).push(f.properties.id);
  });
  const KX = 0.845;   // ~cos(32°): lng->km relative to lat
  GEO.features.forEach(f=>{
    const id = f.properties.id, rec = SA.areas[id];
    if(rec && rec.blocs) return;
    const c = cent[id], cand = votedBySem[f.properties.semel];
    if(!c || !cand) return;
    let best = null, bd = Infinity;
    cand.forEach(vid=>{
      const v = cent[vid];
      const dx = (v[0]-c[0])*KX, dy = v[1]-c[1];
      const d = dx*dx + dy*dy;
      if(d < bd){ bd = d; best = vid; }
    });
    if(best && Math.sqrt(bd)*111 <= 3) interpMap[id] = best;   // within-city, ≤3 km
  });
}
function interpDonor(id){
  if(!INTERP || !VOTE_MODES[currentMode]) return null;
  const rec = SA.areas[id];
  if(rec && rec.blocs) return null;
  ensureInterp();
  return interpMap[id] ? SA.areas[interpMap[id]] : null;
}

// ---- residence estimate: each venue's votes split back over the SAs it serves ----
// modeled data (nearest-venue catchments × population); actuals stay untouched.
async function ensureEst(){
  const file = EST_FILES[YEAR];
  if(!file || estCache[YEAR]) return;
  estCache[YEAR] = await fetch('data/'+file+'?v='+Date.now()).then(r=>r.json());
}

// ---- electoral space layer: common-space PCA scores + segments, per year ----
async function ensureSpace(){
  if(SPACE) return;
  SPACE = await fetch('data/electoral_space.json?v='+Date.now()).then(r=>r.json());
}
function spaceEntry(rec){
  if(!SPACE || !rec) return null;
  const m = SPACE[YEAR];
  return m ? m[rec.semel+'|'+rec.sa] : null;
}
// one-line segment tag in the SA panel (only once the layer has been loaded);
// the segment name and the axis score are separately tappable explainers
function pc2Tag(v){
  return v <= -15 ? 'strongly secular' : v <= 0 ? 'Secular' : v <= 15 ? 'traditional/mixed' : v <= 35 ? 'Religious' : 'Haredi';
}
// the band tag is an intra-Jewish measure: non-Jewish areas show the CBS
// household-lifestyle label instead (modern census carries it for every SA);
// older eras have no datiyut for Arab SAs -> score only, no tag
function spaceTag(rec, v){
  const c = (rec && rec.census) || {};
  const relObj = (c.religion && typeof c.religion === 'object') ? c.religion : null;
  const rel = relObj ? '' : (c.religion || c.rel_dom || '');
  const nonJewish = relObj ? ((relObj.jew || 0) < 50)
                           : (rel && rel.indexOf('Jewish') !== 0);
  if(nonJewish) return c.datiyut ? c.datiyut + ' · CBS' : '';
  return pc2Tag(v);
}
function spaceLine(rec){
  const e = spaceEntry(rec);
  if(!e) return '';
  const s = SPACE.meta.segments[e[2]] || {};
  const lang = document.documentElement.lang==='en' ? 'en' : 'he';
  const sc = (e[1] > 0 ? '+' : '') + e[1];
  return `<div class="note" style="margin-top:8px"><span class="mk" data-m="segment">Electoral segment:
    <b style="color:${s.color}">${s[lang]||''}</b></span> ·
    <span class="mk" data-m="pc2score">Haredi-secular axis <span class="n">${sc}</span>${spaceTag(rec,e[1])? ' ('+spaceTag(rec,e[1])+')' : ''}</span> · <span class="mk" data-m="segment">assignment confidence <span class="n">${Math.round(100*(1-e[3]))}%</span></span></div>`;
}

// ---- SES index layer (modern years): CBS 2019/2021 index on 2022 SA keys ----
// merged into rec.census so the existing 'ses' mode machinery applies as-is.
async function ensureSes(){
  if(SESall) return;
  SESall = await fetch('data/ses_statarea.json?v='+Date.now()).then(r=>r.json());
}
function mergeSes(cfg){
  const S = SESall[cfg.sesVin];
  GEO.features.forEach(f=>{
    const rec = SA.areas[f.properties.id];
    const e = S[f.properties.semel+'|'+f.properties.sa];
    if(!rec || !e) return;
    const c = rec.census = rec.census || {};
    c.ses_value = e[0]; c.ses_cluster = e[1]; c.ses_src = e[2];
  });
}
function estArea(id){
  if(!EST || !EST_MODES[currentMode] || !estCache[YEAR]) return null;
  return estCache[YEAR].areas[id] || null;
}

// ---- corrected venue dots: one point per polling venue, winner-colored ----
// NOTE: the dots share the SA layer's canvas (no separate pane) — a per-pane
// canvas would sit above the polygons and swallow every map click/hover.
// Paint order keeps them on top: renderDots() always runs after the geo layer.
function saFeatureAt(latlng){
  let best = null, bestArea = Infinity;
  geoLayer.eachLayer(l=>{
    const b = l.getBounds();
    if(b.contains(latlng)){
      const a = (b.getEast()-b.getWest())*(b.getNorth()-b.getSouth());
      if(a < bestArea){ bestArea = a; best = l.feature; }
    }
  });
  return best;
}
// ---- address search (Nominatim/OSM, keyless) ----
// Search text that matches no locality is geocoded as an Israeli address: pin + fly + the
// containing SA's profile opens (true point-in-polygon, unlike saFeatureAt's bbox shortcut).
// The address is deliberately NOT written to the hash — addresses are personal data and
// the hash is a shareable permalink.
function pointInFeature(ll, f){
  const x = ll.lng, y = ll.lat;
  const inRing = ring => {
    let inside = false;
    for(let i = 0, j = ring.length - 1; i < ring.length; j = i++){
      const xi = ring[i][0], yi = ring[i][1], xj = ring[j][0], yj = ring[j][1];
      if(((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
    }
    return inside;
  };
  const polys = f.geometry.type === 'Polygon' ? [f.geometry.coordinates]
              : f.geometry.type === 'MultiPolygon' ? f.geometry.coordinates : [];
  return polys.some(rings => inRing(rings[0]) && rings.slice(1).every(h => !inRing(h)));
}

function saLayerAt(ll){   // smallest SA whose polygon truly contains the point
  let best = null, bestArea = Infinity;
  geoLayer.eachLayer(l => {
    const b = l.getBounds();
    if(!b.contains(ll) || !pointInFeature(ll, l.feature)) return;
    const a = (b.getEast() - b.getWest()) * (b.getNorth() - b.getSouth());
    if(a < bestArea){ bestArea = a; best = l; }
  });
  return best;
}

let addrMarker = null, addrBusy = false;
async function nominatim(params){
  const lang = document.documentElement.lang === 'en' ? 'en' : 'he';
  const res = await fetch('https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&countrycodes=il'
                        + '&accept-language=' + lang + '&' + params).then(r => r.json()).catch(() => []);
  return (res && res.length) ? res[0] : null;
}
async function searchAddress(q){
  if(addrBusy) return null;
  addrBusy = true;
  try{
    // normalize Hebrew geresh (U+05F3) and curly quote (U+2019) to ASCII apostrophe
    q = q.replace(/[\u05F3\u2019]/g, "'").replace(/\s+/g, ' ').trim();
    // Free-form Nominatim mis-scopes Israeli addresses (it happily returns the same street name
    // in another city), so parse street/city and query structured first. Accepted shapes:
    // "street number, city" and the Hebrew convention "street number city" (no comma).
    let street = null, city = null;
    const segs = q.split(',').map(s => s.trim()).filter(Boolean);
    if(segs.length >= 2){
      if(/^(israel|\u05D9\u05E9\u05E8\u05D0\u05DC)$/i.test(segs[segs.length - 1])) segs.pop();   // trailing "Israel" (also in Hebrew)
      if(segs.length >= 2){ street = segs[0]; city = segs.slice(1).join(' '); }
    }
    if(street === null && segs.length === 1){
      const toks = q.split(' ');
      let numIdx = -1;   // last house-number-looking token: 16, 16a, or 16 + a Hebrew letter suffix
      toks.forEach((t, i) => { if(/^\d+[\u05D0-\u05EAa-z]?$/i.test(t)) numIdx = i; });
      if(numIdx > 0 && numIdx < toks.length - 1){
        street = toks.slice(0, numIdx + 1).join(' ');
        city = toks.slice(numIdx + 1).join(' ');
      }
    }
    const attempts = [];
    if(street && city){
      attempts.push('street=' + encodeURIComponent(street) + '&city=' + encodeURIComponent(city));
      // "St"/"Rd" suffixes poison the geocoder — retry with them stripped
      const bare = street.replace(/\b(st\.?|street|rd\.?|road|blvd\.?|ave\.?|avenue)\b/gi, ' ').replace(/\s+/g, ' ').trim();
      if(bare && bare !== street) attempts.push('street=' + encodeURIComponent(bare) + '&city=' + encodeURIComponent(city));
    }
    attempts.push('q=' + encodeURIComponent(q));
    let hit = null;
    for(let i = 0; i < attempts.length && !hit; i++){
      if(i) await new Promise(r => setTimeout(r, 1100));   // Nominatim etiquette: max 1 req/sec
      hit = await nominatim(attempts[i]);
    }
    if(!hit) return null;
    const ll = L.latLng(+hit.lat, +hit.lon);
    dropPin(ll, hit.display_name.split(',').slice(0, 3).join(','));
    return ll;
  } catch(e){ return null; }
  finally { addrBusy = false; }
}

function dropPin(ll, label){
  if(addrMarker) map.removeLayer(addrMarker);
  addrMarker = L.marker(ll, {icon: L.divIcon({className:'addr-pin', html:'📍', iconSize:[30,30], iconAnchor:[15,28]})})
    .addTo(map)
    .bindTooltip(label, {direction:'top'});
  addrMarker.on('click', () => { map.removeLayer(addrMarker); addrMarker = null; });
  map.flyTo(ll, Math.max(map.getZoom(), 15));
}

// ---- live address suggestions (Photon/OSM) ----
// Photon exists for search-as-you-type (Nominatim's policy forbids per-keystroke queries) and
// returns coordinates directly, so picking a suggestion needs no second geocoding round-trip.
const escHtml = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
async function photonSuggest(q){
  const lang = document.documentElement.lang === 'en' ? 'en' : 'default';   // default = local (Hebrew) names
  const res = await fetch('https://photon.komoot.io/api/?q=' + encodeURIComponent(q)
                        + '&limit=6&lang=' + lang + '&bbox=34.2,29.4,35.9,33.4').then(r => r.json()).catch(() => null);
  if(!res || !res.features) return [];
  const seen = new Set(), out = [];
  for(const f of res.features){
    const p = f.properties;
    if(p.countrycode && p.countrycode !== 'IL') continue;   // bbox clips neighbors imperfectly
    const streetPart = [p.street || '', p.housenumber || ''].join(' ').trim();
    const main = (p.name && p.name !== p.street) ? p.name : (streetPart || p.name || '');
    if(!main) continue;
    const sub = [(p.name && p.name !== p.street && streetPart) ? streetPart : '', p.city || p.district || p.county || '']
      .filter(Boolean).join(' · ');
    const key = main + '|' + sub;
    if(seen.has(key)) continue;
    seen.add(key);
    out.push({main, sub, lat: f.geometry.coordinates[1], lon: f.geometry.coordinates[0]});
    if(out.length >= 5) break;
  }
  return out;
}

function zoomToLocality(name){
  const hits = [];
  geoLayer.eachLayer(l=>{ const r = SA.areas[l.feature.properties.id]; if((r && r.loc===name) || l.feature.properties.name===name) hits.push(l); });
  if(hits.length){ let b = hits[0].getBounds(); hits.forEach(h=>b=b.extend(h.getBounds())); map.fitBounds(b.pad(0.2)); }
  return hits.length > 0;
}

// One dropdown for both suggestion kinds: 🏘️ locality matches render instantly,
// 📍 address suggestions (Photon) are debounced in below them.
function renderSug(q, addrSugs){
  const sb = document.getElementById('searchbox');
  const locs = LOC_NAMES.filter(n => n.includes(q)).slice(0, addrSugs && addrSugs.length ? 4 : 6);
  const addrs = addrSugs || [];
  if(!locs.length && !addrs.length){ hideSug(); return; }
  sugEl.innerHTML =
    locs.map(n => `<div class="it" data-loc="${escHtml(n)}">🏘️ ${escHtml(n)}</div>`).join('')
    + addrs.map((s, i) =>
      `<div class="it${!i && locs.length ? ' sec' : ''}" data-i="${i}">📍 ${escHtml(s.main)}${s.sub ? `<div class="sub">${escHtml(s.sub)}</div>` : ''}</div>`).join('');
  const r = sb.getBoundingClientRect();
  sugEl.style.top = (r.bottom + 6) + 'px';
  sugEl.style.left = Math.max(8, Math.min(r.left, window.innerWidth - r.width - 8)) + 'px';
  sugEl.style.minWidth = r.width + 'px';
  sugEl.classList.add('open');
  // mousedown (not click): fires before the input's blur, so the pick isn't swallowed
  sugEl.querySelectorAll('.it').forEach(el => el.addEventListener('mousedown', ev => {
    ev.preventDefault();
    hideSug();
    if(el.dataset.loc !== undefined){
      sb.value = el.dataset.loc;
      lastPicked = el.dataset.loc;   // suppress the change-handler's redundant lookup
      zoomToLocality(el.dataset.loc);
      return;
    }
    const s = addrs[+el.dataset.i];
    sb.value = s.main;
    lastPicked = s.main;
    const ll = L.latLng(s.lat, s.lon);
    dropPin(ll, s.main + (s.sub ? ', ' + s.sub : ''));
    const l = saLayerAt(ll);
    if(l){ setSelected(l); showPanel(l.feature); }
  }));
}

async function renderDots(){
  if(dotsLayer){ map.removeLayer(dotsLayer); dotsLayer = null; }
  if(!DOTS) return;
  const file = DOTS_FILES[YEAR];
  if(!file) return;
  if(!dotsCache[YEAR])
    dotsCache[YEAR] = await fetch('data/'+file+'?v='+Date.now()).then(r=>r.json());
  const tip = document.getElementById('tip');
  const markers = dotsCache[YEAR].venues.map(d=>{
    const [lat, lng, valid, win, winPct, rh, nb, name] = d;
    const m = L.circleMarker([lat, lng], {
      radius: Math.max(2.5, Math.min(12, Math.sqrt(valid/40))),
      fillColor: WINNER_COLORS[win] || WINNER_FALLBACK,

    });

    return m;
  });
  dotsLayer = L.layerGroup(markers).addTo(map);
}

function refresh(){
  const estOn = EST && EST_MODES[currentMode] && estCache[YEAR];
  if(INTERP && !estOn && VOTE_MODES[currentMode]) ensureInterp();
  // over satellite the fills go lighter so the imagery stays readable
  const baseOp = SATBASE ? (DOTS ? 0.35 : 0.55) : (DOTS ? 0.45 : 0.82);
  const interpOp = SATBASE ? (DOTS ? 0.22 : 0.30) : (DOTS ? 0.28 : 0.42);
  geoLayer.eachLayer(l=>{
    const id = l.feature.properties.id;
    if(estOn){
      l.setStyle({fillColor:getColor(estCache[YEAR].areas[id]), fillOpacity:baseOp, dashArray:null});
      return;
    }
    const rec = SA.areas[id];

    else      l.setStyle({fillColor:getColor(rec),   fillOpacity:baseOp, dashArray:null});

    lg += `<div class="sw" style="margin-top:5px;color:var(--muted)"><i style="background:#4a9eff;opacity:.45;border:1px dashed #8ba3c7"></i>Estimated fill from a nearby area (no station)</div>`;

// ---- poster PNG export: composite the map canvases + a title/legend footer ----
// no library: with preferCanvas all vector layers already live in canvases;
// tiles are CORS-loaded (crossOrigin) — if the canvas taints anyway, we
// recompose without the basemap (the poster look works on plain dark).
function exportPoster(){
  const mapEl = document.getElementById('map');
  const rect = mapEl.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  const FOOT = 132;
  const W = Math.round(rect.width*dpr), H = Math.round(rect.height*dpr), FH = Math.round(FOOT*dpr);
  const out = document.createElement('canvas'); out.width = W; out.height = H + FH;
  const ctx = out.getContext('2d');
  const rtl = document.documentElement.dir !== 'ltr';

  function compose(withTiles){
    ctx.fillStyle = '#0b1120'; ctx.fillRect(0, 0, W, H + FH);
    const draw = el => {
      const r = el.getBoundingClientRect();
      ctx.drawImage(el, (r.left-rect.left)*dpr, (r.top-rect.top)*dpr, r.width*dpr, r.height*dpr);
    };
    ctx.save(); ctx.beginPath(); ctx.rect(0, 0, W, H); ctx.clip();
    if(withTiles)
      mapEl.querySelectorAll('.leaflet-tile-pane img').forEach(img=>{ if(img.complete) try{ draw(img); }catch(e){} });
    [...mapEl.querySelectorAll('.leaflet-pane > canvas')]
      .map(c=>({c, z: parseInt(getComputedStyle(c.parentElement).zIndex)||400}))
      .sort((a,b)=>a.z-b.z)
      .forEach(o=>{ try{ draw(o.c); }catch(e){} });
    ctx.restore();
    // footer: title + winner legend + attribution
    ctx.fillStyle = '#0e1526'; ctx.fillRect(0, H, W, FH);
    ctx.strokeStyle = '#1e2a44'; ctx.beginPath(); ctx.moveTo(0, H+0.5); ctx.lineTo(W, H+0.5); ctx.stroke();
    const xT = rtl ? W - 18*dpr : 18*dpr;
    ctx.textAlign = rtl ? 'right' : 'left';
    ctx.fillStyle = '#e2e8f0';
    ctx.font = `700 ${20*dpr}px Heebo,'Segoe UI',sans-serif`;
    ctx.fillText(`${PN.election_name || ''} · ${YEAR}`, xT, H + 32*dpr);
    ctx.font = `400 ${13*dpr}px Heebo,'Segoe UI',sans-serif`;
    ctx.fillStyle = '#8ba3c7';
    ctx.fillText('Winning party per statistical area · lighter shade = higher vote share', xT, H + 55*dpr);
    const cnt = {};
    const src = (EST && EST_MODES[currentMode] && estCache[YEAR]) ? estCache[YEAR].areas : SA.areas;
    Object.values(src).forEach(r=>{ if(r.winner) cnt[r.winner]=(cnt[r.winner]||0)+1; });
    const top = Object.entries(cnt).sort((a,b)=>b[1]-a[1]).slice(0,8);
    ctx.font = `500 ${12.5*dpr}px Heebo,'Segoe UI',sans-serif`;
    let x = xT;
    const y = H + 86*dpr, box = 12*dpr, gap = 6*dpr, pad = 22*dpr;
    top.forEach(([code,n])=>{
      const label = `${partyName[code]||code} · ${n}`;
      const wTxt = ctx.measureText(label).width;
      ctx.fillStyle = WINNER_COLORS[code]||WINNER_FALLBACK;
      if(rtl){ ctx.fillRect(x-box, y-box+2*dpr, box, box); ctx.fillStyle='#cbd5e1'; ctx.fillText(label, x-box-gap, y); x -= box+gap+wTxt+pad; }
      else   { ctx.fillRect(x, y-box+2*dpr, box, box);     ctx.fillStyle='#cbd5e1'; ctx.fillText(label, x+box+gap, y); x += box+gap+wTxt+pad; }
    });
    ctx.font = `400 ${10.5*dpr}px Heebo,'Segoe UI',sans-serif`;
    ctx.fillStyle = '#64748b';
    ctx.textAlign = rtl ? 'left' : 'right';
    ctx.fillText((withTiles ? (SATBASE ? '© Esri, Maxar, Earthstar Geographics · ' : '© OpenStreetMap contributors © CARTO · ') : '') + 'Boundaries: CBS',
                 rtl ? 18*dpr : W - 18*dpr, H + FH - 14*dpr);
  }

  let url;
  try { compose(true); url = out.toDataURL('image/png'); }
  catch(e){ compose(false); url = out.toDataURL('image/png'); }   // tainted -> no basemap
  const a = document.createElement('a');
  a.href = url; a.download = `poster_k${YEARS[YEAR].pnKey}_${YEAR}.png`;
  document.body.appendChild(a); a.click(); a.remove();
  return url.length;
}

// ---- HD poster: print-resolution offscreen render (no Leaflet, no tiles) ----
// Own Mercator projection over the in-memory geometry: national map + three city
// insets + per-party share-ramp legend + title/footer — the classic results-poster
// composition. Used when exporting from the national frame; a zoomed-in frame
// still exports via the live-view composite above.
function exportPosterHD(){
  const rtl = document.documentElement.dir !== 'ltr';
  const estOn = EST && EST_MODES[currentMode] && estCache[YEAR];
  const src = estOn ? estCache[YEAR].areas : SA.areas;
  const res = (LOCRES || {})[YEARS[YEAR].pnKey] || {};
  const W = 2600, H = 3500, M = 64;
  const out = document.createElement('canvas'); out.width = W; out.height = H;
  const ctx = out.getContext('2d');
  const F = px => `${px}px Heebo,'Segoe UI',sans-serif`;

  const merc = la => Math.log(Math.tan(Math.PI/4 + la*Math.PI/360)) * 180 / Math.PI;   // degree-scaled, matches lng on x
  function proj(b, x, y, w, h, pad){
    const x0 = b[0][1], x1 = b[1][1], y0 = merc(b[0][0]), y1 = merc(b[1][0]);
    const k = Math.min((w-2*pad)/(x1-x0), (h-2*pad)/(y1-y0));
    const ox = x + (w - k*(x1-x0))/2, oy = y + (h - k*(y1-y0))/2;
    return (lat,lng) => [ox + (lng-x0)*k, oy + (y1-merc(lat))*k];
  }
  function drawGeo(p, features, styleFn){
    features.forEach(f=>{
      const st = styleFn(f); if(!st) return;
      const polys = f.geometry.type==='Polygon' ? [f.geometry.coordinates] : f.geometry.coordinates;
      ctx.beginPath();
      polys.forEach(rings=>rings.forEach(ring=>{
        ring.forEach((c,i)=>{ const q = p(c[1],c[0]); i?ctx.lineTo(q[0],q[1]):ctx.moveTo(q[0],q[1]); });
        ctx.closePath();
      }));
      if(st.alpha != null) ctx.globalAlpha = st.alpha;
      ctx.fillStyle = st.fill; ctx.fill();
      if(st.stroke){ ctx.strokeStyle = st.stroke; ctx.lineWidth = st.w||0.6; ctx.stroke(); }
      ctx.globalAlpha = 1;
    });
  }
  function panel(b, x, y, w, h, pad){
    const p = proj(b, x, y, w, h, pad);
    ctx.save(); ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip();
    ctx.fillStyle = '#0e1526'; ctx.fillRect(x, y, w, h);
    if(LOCGEO) drawGeo(p, LOCGEO.features, f=>{
      const r = res[f.properties.name];
      return {fill: r ? winnerShade(r[0], r[1]) : 'rgba(255,255,255,0.03)', alpha: 0.5,
              stroke: '#232d42', w: 0.8};
    });
    drawGeo(p, GEO.features, f=>{
      const rec = src[f.properties.id];
      if(rec && rec.winner) return {fill: winnerShade(rec.winner, rec.parties[rec.winner]),
                                    alpha: 0.9, stroke: '#0b1120', w: 0.5};
      const donor = (!estOn && INTERP) ? interpDonor(f.properties.id) : null;
      if(donor && donor.winner) return {fill: winnerShade(donor.winner, donor.parties[donor.winner]), alpha: 0.4};
      return null;
    });
    ctx.restore();
    return p;
  }

  // canvas base
  ctx.fillStyle = '#0b1120'; ctx.fillRect(0, 0, W, H);

  // header
  const xT = rtl ? W - M : M;
  ctx.textAlign = rtl ? 'right' : 'left';
  ctx.fillStyle = '#e2e8f0'; ctx.font = `800 ${F(78)}`;
  const ttl = PN.election_name || '', yr = String(YEAR).replace(/[ab]$/, '');
  ctx.fillText(ttl.includes(yr) ? ttl : `${ttl} · ${yr}`, xT, M + 78);
  ctx.fillStyle = '#8ba3c7'; ctx.font = `400 ${F(34)}`;
  ctx.fillText('Winning party per statistical area · lighter shade = higher vote share', xT, M + 138);

  // body layout
  const yB = 290, hB = 2950;
  const NAT = [[29.45,34.25],[33.35,35.9]];
  const INSETS = [
    {t:'Jerusalem', b:[[31.70,35.09],[31.86,35.28]]},
    {t:'Gush Dan',  b:[[31.96,34.72],[32.17,34.95]]},
    {t:'Haifa',    b:[[32.74,34.93],[32.90,35.13]]},
  ];
  // insets column
  const ixX = 64, ixW = 760, gap = 30, ih = (hB - 2*gap) / 3;
  INSETS.forEach((ins, i)=>{
    const y = yB + i*(ih+gap);
    panel(ins.b, ixX, y, ixW, ih, 14);
    ctx.strokeStyle = '#31456e'; ctx.lineWidth = 3; ctx.strokeRect(ixX, y, ixW, ih);
    const tw = ctx.measureText(ins.t).width + 56;
    const tabX = rtl ? ixX + ixW - Math.max(tw, 210) : ixX;
    ctx.fillStyle = '#111a2e'; ctx.fillRect(tabX, y, Math.max(tw, 210), 62);
    ctx.strokeRect(tabX, y, Math.max(tw, 210), 62);
    ctx.fillStyle = '#e2e8f0'; ctx.font = `700 ${F(38)}`;
    ctx.textAlign = rtl ? 'right' : 'left';
    ctx.fillText(ins.t, rtl ? ixX + ixW - 24 : ixX + 24, y + 44);
  });
  // main national map
  const pNat = panel(NAT, 850, yB, 1060, hB, 24);
  // city labels
  const CITIES = [
    ['Jerusalem', 31.778, 35.225], ['Tel Aviv-Yafo', 32.08, 34.78], ['Haifa', 32.794, 34.989],
    ['Be\'er Sheva', 31.252, 34.791], ['Ashdod', 31.80, 34.65], ['Netanya', 32.32, 34.85],
    ['Nazareth', 32.70, 35.30], ['Eilat', 29.557, 34.95],
  ];
  ctx.font = `600 ${F(30)}`; ctx.textAlign = 'left';
  CITIES.forEach(([nm, la, ln])=>{
    const q = pNat(la, ln);
    ctx.fillStyle = '#e2e8f0'; ctx.beginPath(); ctx.arc(q[0], q[1], 5, 0, 7); ctx.fill();
    ctx.lineWidth = 6; ctx.strokeStyle = 'rgba(11,17,32,0.85)';
    ctx.strokeText(nm, q[0]+14, q[1]+10); ctx.fillText(nm, q[0]+14, q[1]+10);
  });

  // legend column: per-party 7-step share ramp + share/seats/areas line
  const lgX = 1960, lgW = 576;
  let y = yB + 40;
  ctx.textAlign = rtl ? 'right' : 'left';
  const lx = rtl ? lgX + lgW : lgX;
  ctx.fillStyle = '#e2e8f0'; ctx.font = `700 ${F(42)}`;
  ctx.fillText('Winning party × vote share', lx, y); y += 46;
  const cellW = lgW/7;
  ctx.font = `500 ${F(20)}`; ctx.fillStyle = '#8ba3c7'; ctx.textAlign = 'center';
  POSTER_BUCKETS.forEach((bk,i)=>{
    const ci = rtl ? 6-i : i;
    ctx.fillText(bk, lgX + ci*cellW + cellW/2, y);
  });
  y += 14;
  const cnt = {};
  Object.values(src).forEach(r=>{ if(r.winner) cnt[r.winner]=(cnt[r.winner]||0)+1; });
  const top = Object.entries(cnt).sort((a,b)=>b[1]-a[1]).slice(0, 13);
  top.forEach(([code, n])=>{
    ctx.textAlign = rtl ? 'right' : 'left';
    ctx.fillStyle = '#e2e8f0'; ctx.font = `700 ${F(34)}`;
    ctx.fillText(partyName[code] || code, lx, y + 40);
    for(let i = 0; i < 7; i++){
      const ci = rtl ? 6-i : i;
      ctx.fillStyle = lerpColor('#141a24', WINNER_COLORS[code]||WINNER_FALLBACK, 0.30 + 0.70*i/6);
      ctx.fillRect(lgX + ci*cellW, y + 56, cellW - 3, 52);
    }
    ctx.fillStyle = '#8ba3c7'; ctx.font = `400 ${F(25)}`;
    const share = (PN.national || {})[code], seats = (PN.seats || {})[code];
    ctx.fillText(`${share != null ? share.toFixed(1) + '%' : ''}${seats ? ' · ' + seats + ' seats' : ''}` +
                 ` · ${n.toLocaleString()} areas`, lx, y + 146);
    y += 178;
  });

  // footer
  ctx.fillStyle = '#0e1526'; ctx.fillRect(0, H-118, W, 118);
  ctx.strokeStyle = '#1e2a44'; ctx.beginPath(); ctx.moveTo(0, H-117.5); ctx.lineTo(W, H-117.5); ctx.stroke();
  ctx.textAlign = rtl ? 'right' : 'left'; ctx.fillStyle = '#64748b'; ctx.font = `400 ${F(26)}`;
  ctx.fillText('Official results: Central Elections Committee · boundaries & census: CBS', xT, H - 70);
  ctx.textAlign = rtl ? 'left' : 'right';
  ctx.fillStyle = '#8ba3c7';
  ctx.fillText('yardenmorad2003.github.io/election-dashboard', rtl ? M : W - M, H - 70);

  out.toBlob(blob=>{
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `poster_k${YEARS[YEAR].pnKey}_${YEAR}_hd.png`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href), 5000);
  }, 'image/png');
}

function estNote(id){

// White selection ring on the clicked SA, matching election_map's selected-locality look.
// refresh() only touches fills, so the ring survives mode switches; loadYear rebuilds
// geoLayer, so the stale-layer guard lets the reference die quietly on year change.
function setSelected(l){
  if(selectedLayer && selectedLayer !== l && geoLayer && geoLayer.hasLayer(selectedLayer))
    selectedLayer.setStyle({color:'#2a3a5c', weight:0.5});
  selectedLayer = l;
  if(l){
    l.setStyle({color:'#fff', weight:2.5});
    l.bringToFront();
    // the dots share the polygons' canvas and stay visible by paint order alone (see
    // renderDots note) — raising the ring polygon repaints neighbor fills OVER their
    // dots, so the dots must be re-asserted at the top of the draw order
    if(dotsLayer) dotsLayer.eachLayer(d => d.bringToFront());
  }
}

function buildScales(){
  const areas = Object.values(SA.areas);
  const cs = k => areas.map(a=>(a.census||{})[k]);
  scales.acad  = {min:Math.floor(pct(cs('acad'),.02)),  max:Math.ceil(pct(cs('acad'),.98))};
  scales.wage  = {min:Math.floor(pct(cs('med_wage'),.02)), max:Math.ceil(pct(cs('med_wage'),.98))};
  scales.age   = {min:Math.floor(pct(cs('age_med'),.02)), max:Math.ceil(pct(cs('age_med'),.98))};
  scales.aliya = {min:0, max:Math.ceil(pct(areas.map(a=>aliyaVal(a.census||{})),.98))||10};
  scales.ses   = {min:Math.floor(pct(cs('ses_cluster'),.02))||1, max:Math.ceil(pct(cs('ses_cluster'),.98))||20};
  const ov = areas.map(a=>originVal(a.census||{})).filter(v=>v!=null).map(Math.abs);
  scales.origin = {max: Math.max(10, Math.ceil(pct(ov,.95)))};
  Object.keys(OC_LABELS).forEach(k=>{
    const vs = areas.map(a=>((a.census||{}).oc||{})[k]).filter(v=>v!=null);
    scales['oc_'+k] = {max: Math.max(5, Math.ceil(pct(vs,.98)))};
  });
  const codes = new Set();
  areas.forEach(a=>Object.keys(a.parties||{}).forEach(c=>codes.add(c)));
  codes.forEach(code=>{
    const shares = areas.map(a=>(a.parties||{})[code]).filter(v=>v>0);
    scales['party_'+code] = {min:0, max:Math.max(10, Math.ceil(pct(shares,.98)/5)*5)};
  });
  return codes;
}

async function loadYear(year){
  YEAR = year;
  const cfg = YEARS[year], bust = '?v=' + Date.now();
  document.querySelectorAll('.year-btn').forEach(b=>b.classList.toggle('active', b.dataset.year===year));
  document.getElementById('yrLabel').textContent = year;
  const [sa, geo] = await Promise.all([
    fetch('data/'+cfg.data+bust).then(r=>r.json()),
    fetch('data/'+cfg.geo+bust).then(r=>r.json()),
  ]);
  SA = sa; GEO = geo; PN = PNall[cfg.pnKey];
  interpMap = null;   // per-year cache; rebuilt lazily on next refresh
  if(cfg.sesVin){ await ensureSes(); mergeSes(cfg); }   // before buildScales — it reads ses_cluster
  partyName = {}; partyBloc = {};
  PN.party_list.forEach(p=>{ partyName[p.code]=p.name; partyBloc[p.code]=p.bloc; });
  const codes = buildScales();

  // party picker
  const sel = document.getElementById('partySel');
  sel.innerHTML = '';
  PN.party_list.forEach(p=>{ if(codes.has(p.code)){
    const o = document.createElement('option'); o.value=p.code; o.textContent=p.name+' ('+p.code+')'; sel.appendChild(o);
  }});
  if(!codes.has(selectedParty)) selectedParty = sel.options[0] ? sel.options[0].value : selectedParty;
  sel.value = selectedParty;

  // locality names for the search dropdown — they live on the geo features; modern SA records
  // carry no loc field (kept in the union for any year file that still has it)
  const areas = Object.values(SA.areas);
  LOC_NAMES = [...new Set(GEO.features.map(f=>f.properties.name).concat(areas.map(a=>a.loc)).filter(Boolean))].sort();

  // demographic mode buttons available this year
  document.querySelectorAll('.mode-btn[data-demo]').forEach(b=>{
    b.style.display = cfg.demo.includes(b.dataset.mode) ? '' : 'none';
  });
  const tBtn = document.querySelector('.mode-btn[data-mode="turnout"]');
  if(tBtn) tBtn.style.display = cfg.noTurnout ? 'none' : '';
  const eBtn = document.getElementById('estBtn');
  eBtn.style.display = EST_FILES[year] ? '' : 'none';
  if(!EST_FILES[year] && EST){ EST = false; eBtn.classList.remove('active'); }
  // K24-only ימינה bloc toggle (mirrors Interactive Map)
  const showYam = year === '2021';
  document.getElementById('yaminaSep').style.display = showYam ? '' : 'none';
  document.querySelectorAll('.mode-btn[data-yamina]').forEach(b=>{
    b.style.display = showYam ? '' : 'none';
    b.classList.toggle('active', b.dataset.yamina === (YAMINA_RIGHT ? 'right' : 'center'));
  });
  if(EST) await ensureEst();
  if(SPACE_MODES[currentMode]) await ensureSpace();
  const allowed = ['bloc','winner','party','seg','pc2', ...(cfg.noTurnout?[]:['turnout']), ...cfg.demo];
  if(!allowed.includes(currentMode)) currentMode = 'bloc';
  if(POSTER && currentMode!=='winner') POSTER = false, document.getElementById('posterBtn').classList.remove('active');
  document.querySelectorAll('.mode-btn[data-mode]').forEach(x=>x.classList.toggle('active', x.dataset.mode===currentMode));

  // (re)build the geo layer
  if(geoLayer){ map.removeLayer(geoLayer); }
  const tip = document.getElementById('tip');
  geoLayer = L.geoJSON(GEO, {
    style: f => ({color:'#2a3a5c', weight:0.5, fillOpacity:0.82, fillColor:getColor(SA.areas[f.properties.id])}),
    onEachFeature: (f, l) => {
      l.on('click', ()=>{ setSelected(l); showPanel(f); });
      l.on('mousemove', e=>{
        const rec = SA.areas[f.properties.id];
        tip.style.display='block';
        tip.style.left=(e.originalEvent.clientX+14)+'px';
        tip.style.top=(e.originalEvent.clientY+10)+'px';
        const donor = interpDonor(f.properties.id);
        const eRec = estArea(f.properties.id);
        let spcLine = '';
        if(SPACE_MODES[currentMode]){
          const e = spaceEntry(rec);
          if(e){
            const lang = document.documentElement.lang==='en' ? 'en' : 'he';
            spcLine = currentMode==='seg'
              ? `<br>Segment: <b>${(SPACE.meta.segments[e[2]]||{})[lang]||''}</b>`
              : `<br>Haredi-secular axis: <span class="n">${(e[1]>0?'+':'')+e[1]}</span>${spaceTag(rec,e[1])? ' ('+spaceTag(rec,e[1])+')' : ''}`;
          }
        }
        tip.innerHTML = `<b>${(rec&&rec.loc)||f.properties.name}</b> · area <span class="n">${f.properties.sa}</span>` + spcLine +
          (eRec? `<br>🏠 Residence estimate: Right-Haredim <span class="n">${adjBlocs(eRec).rh}%</span> · winner: ${partyName[eRec.winner]||eRec.winner}` : '') +
          (rec&&rec.blocs? `<br>${eRec? 'At the stations inside it: ' : ''}Right-Haredim <span class="n">${adjBlocs(rec).rh}%</span> · winner: ${partyName[rec.winner]||rec.winner}`
           : donor && !eRec? `<br>≈ estimated from area <span class="n">${donor.sa}</span> · winner: ${partyName[donor.winner]||donor.winner}`
           : eRec? '' : '<br>no mapped vote data');
      });
      l.on('mouseout', ()=>{ tip.style.display='none'; });
    }
  }).addTo(map);
  if(firstLoad){ map.fitBounds([[29.45,34.25],[33.35,35.9]]); firstLoad = false; }
  if(POSTER) await ensureUnderlay();
  await renderDots();
  introPanel();
  refresh();
  window.SA_DATA = SA;
}

// === GUIDED TOURS + EXPLAIN-THIS-VIEW (ported from election_map) ===
// Content: data/statarea_tours.json + data/statarea_help.json — he/en fields, read at runtime.
// A step's state = {year, mode, code?, est?, dots?, interp?}; focus = [{semel, sa?, label}] rings.
let TOURS = null, MAP_HELP = null, tourActive = false, tourK = null, tourStep = 0;
let tourHighlightLayer = null, tourBusy = false;
const TOUR_LANG = document.documentElement.lang === 'en' ? 'en' : 'he';
const tourT = o => (o && (o[TOUR_LANG] != null ? o[TOUR_LANG] : o.he)) || '';
const tui = k => (TOURS && TOURS.ui && ((TOURS.ui[TOUR_LANG] || {})[k] != null ? TOURS.ui[TOUR_LANG][k] : (TOURS.ui.he || {})[k])) || '';

function ensureTourDom(){
  if(document.getElementById('tourCard')) return;
  const card = document.createElement('div');
  card.className = 'tour-card';
  card.id = 'tourCard';
  card.innerHTML =
    '<div class="tour-kicker"><span id="tourKicker"></span><button class="tour-close" id="tourClose" title="Esc">✕</button></div>' +
    '<div class="tour-title" id="tourTitle"></div>' +
    '<div class="tour-text" id="tourText"></div>' +
    '<div class="tour-nav"><button class="tour-btn" id="tourPrev"></button><div class="tour-dots" id="tourDots"></div><button class="tour-btn" id="tourNext"></button></div>';
  document.body.appendChild(card);
  const picker = document.createElement('div');
  picker.className = 'tour-picker';
  picker.id = 'tourPicker';
  document.body.appendChild(picker);
  document.getElementById('tourClose').onclick = endTour;
  document.getElementById('tourPrev').onclick = () => tourGo(tourStep - 1);
  document.getElementById('tourNext').onclick = () => {
    if(tourStep >= TOURS.tours[tourK].steps.length - 1) endTour();
    else tourGo(tourStep + 1);
  };
}

function openTourPicker(){
  if(!TOURS) return;
  ensureTourDom();
  const p = document.getElementById('tourPicker');
  p.innerHTML = '<h3>' + tui('pickerTitle') + '</h3><p>' + tui('pickerHint') + '</p>' +
    Object.keys(TOURS.tours).map(k => {
      const t = TOURS.tours[k];
      return '<button class="tour-pick-item" data-tour="' + k + '"><b>' + (t.range || '') + '</b>' +
        '<span>' + tourT(t.title) + '</span>' +
        '<span style="margin-inline-start:auto;color:var(--muted)">' + t.steps.length + '</span></button>';
    }).join('');
  p.classList.add('open');
  document.getElementById('tourCard').classList.remove('open');
  p.querySelectorAll('.tour-pick-item').forEach(b => { b.onclick = () => startTour(b.dataset.tour, 0); });
}

function startTour(k, step){
  if(!TOURS || !TOURS.tours[k]) return;
  ensureTourDom();
  document.getElementById('tourPicker').classList.remove('open');
  tourActive = true;
  tourK = k;
  tourGo(step || 0);
}

async function tourGo(i){
  if(tourBusy) return;                        // year loads are async — don't interleave steps
  tourBusy = true;
  try{
    const tour = TOURS.tours[tourK];
    tourStep = Math.max(0, Math.min(i, tour.steps.length - 1));
    const s = tour.steps[tourStep];
    await applyTourStep(s.state || {});
    tourFocus(s);
    renderTourCard(tour, s);
    refreshMapHelp();
    updateTourHash();
  } finally {
    tourBusy = false;
  }
}

async function applyTourStep(st){
  if(st.code) selectedParty = st.code;
  if(st.mode){
    currentMode = st.mode;
    document.querySelectorAll('.mode-btn[data-mode]').forEach(x => x.classList.toggle('active', x.dataset.mode === st.mode));
  }
  INTERP = !!st.interp;
  document.getElementById('interpBtn').classList.toggle('active', INTERP);
  DOTS = !!st.dots;
  document.getElementById('dotsBtn').classList.toggle('active', DOTS);
  EST = !!st.est;
  document.getElementById('estBtn').classList.toggle('active', EST);
  if(POSTER) await setPoster(false);
  if(st.year && YEAR !== st.year) await loadYear(st.year);   // loadYear re-syncs the party picker + toggle availability
  else {
    const sel = document.getElementById('partySel');
    if(st.code && sel) sel.value = selectedParty;
  }
  if(EST) await ensureEst();
  await renderDots();
  refresh();
}

function tourFocus(s){
  clearTourFocus();
  const items = s.focus || [];
  if(!items.length){ map.flyToBounds([[29.45,34.25],[33.35,35.9]], {duration: 1.1}); return; }
  let all = null;
  const markers = [];
  items.forEach(it => {
    let b = null;
    geoLayer.eachLayer(l => {
      const r = SA.areas[l.feature.properties.id];
      if(!r || r.semel !== it.semel) return;
      if(it.sa && !it.sa.includes(r.sa)) return;
      const lb = l.getBounds();
      b = b ? b.extend(lb) : L.latLngBounds(lb.getSouthWest(), lb.getNorthEast());
    });
    if(!b) return;
    all = all ? all.extend(b) : L.latLngBounds(b.getSouthWest(), b.getNorthEast());
    markers.push(L.marker(b.getCenter(), {interactive: false,
      icon: L.divIcon({className: 'tour-focus', iconSize: [150, 46], iconAnchor: [75, 12],
        html: '<div class="tour-ring"></div><div class="tour-focus-label">' + tourT(it.label) + '</div>'})}));
  });
  if(!all){ map.flyToBounds([[29.45,34.25],[33.35,35.9]], {duration: 1.1}); return; }
  tourHighlightLayer = L.layerGroup(markers).addTo(map);
  map.flyToBounds(all.pad(0.3), {paddingTopLeft: [30, 40], paddingBottomRight: [30, 200], maxZoom: s.zoom || 13, duration: 1.1});
}

function clearTourFocus(){
  if(tourHighlightLayer){ map.removeLayer(tourHighlightLayer); tourHighlightLayer = null; }
}

function renderTourCard(tour, s){
  const card = document.getElementById('tourCard');
  card.classList.add('open');
  const n = tour.steps.length;
  document.getElementById('tourKicker').textContent =
    tourT(tour.title) + ' · ' + tui('storyOf').replace('{i}', tourStep + 1).replace('{n}', n) +
    (s.state && s.state.year ? ' · ' + s.state.year : '');
  document.getElementById('tourTitle').textContent = tourT(s.title);
  document.getElementById('tourText').textContent = tourT(s.text);
  const dots = document.getElementById('tourDots');
  dots.innerHTML = '';
  for(let j = 0; j < n; j++){
    const d = document.createElement('button');
    d.className = 'tour-dot' + (j === tourStep ? ' on' : '');
    d.title = tourT(tour.steps[j].title);
    d.onclick = () => tourGo(j);
    dots.appendChild(d);
  }
  const prev = document.getElementById('tourPrev'), next = document.getElementById('tourNext');
  prev.textContent = tui('prev');
  prev.disabled = tourStep === 0;
  next.textContent = tourStep === n - 1 ? tui('done') : tui('next');
}

function endTour(){
  tourActive = false;
  clearTourFocus();
  const c = document.getElementById('tourCard');
  if(c) c.classList.remove('open');
  const p = document.getElementById('tourPicker');
  if(p) p.classList.remove('open');
  updateTourHash();
}

// hash mirrors boot()'s deep-link params so tour stops are shareable
function updateTourHash(){
  const q = new URLSearchParams();
  q.set('year', YEAR);
  q.set('mode', currentMode);
  if(currentMode === 'party') q.set('code', selectedParty);
  if(INTERP) q.set('interp', '1');
  if(EST) q.set('est', '1');
  if(DOTS) q.set('dots', '1');
  if(YAMINA_RIGHT) q.set('yamina', '1');
  if(tourActive){ q.set('tour', tourK); q.set('step', String(tourStep + 1)); }
  history.replaceState(null, '', '#' + q.toString());
}

document.addEventListener('keydown', e => {
  if(!tourActive || !TOURS) return;
  if(e.key === 'Escape'){ endTour(); return; }
  if(e.target && /INPUT|SELECT|TEXTAREA/.test(e.target.tagName)) return;
  const fwd = document.documentElement.dir === 'rtl' ? 'ArrowLeft' : 'ArrowRight';
  const back = fwd === 'ArrowLeft' ? 'ArrowRight' : 'ArrowLeft';
  if(e.key === fwd){ e.preventDefault(); if(tourStep < TOURS.tours[tourK].steps.length - 1) tourGo(tourStep + 1); }
  else if(e.key === back){ e.preventDefault(); if(tourStep > 0) tourGo(tourStep - 1); }
});

function refreshMapHelp(){
  const pop = document.getElementById('helpPop');
  if(!pop || !pop.classList.contains('open') || !MAP_HELP) return;
  const t = MAP_HELP.modes[currentMode];
  let extra = '';
  if(EST && MAP_HELP.toggles.est) extra += '<div class="help-extra">' + tourT(MAP_HELP.toggles.est) + '</div>';
  if(INTERP && MAP_HELP.toggles.interp) extra += '<div class="help-extra">' + tourT(MAP_HELP.toggles.interp) + '</div>';
  if(DOTS && MAP_HELP.toggles.dots) extra += '<div class="help-extra">' + tourT(MAP_HELP.toggles.dots) + '</div>';
  pop.innerHTML = (t ? '<div>' + tourT(t) + '</div>' : '') + extra;
}

async function boot(){
  PNall = await fetch('data/parties_national.json?v='+Date.now()).then(r=>r.json());

  map = L.map('map', {preferCanvas:true, zoomSnap:0.25});
  window.map = map;
  // base = dark (nolabels+labels pair, ≈ the old dark_all) or Esri satellite; the labels
  // overlay stays on top of both. Explicit zIndex — re-adding a base after a toggle would
  // otherwise append it above the labels. CORS tiles -> canvas PNG export stays untainted.
  darkTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',
    {attribution:'© OpenStreetMap contributors © CARTO · Boundaries: CBS', maxZoom:18, zIndex:1,
     crossOrigin:'anonymous'}).addTo(map);
  satTiles = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
    {attribution:'© Esri, Maxar, Earthstar Geographics · Boundaries: CBS', maxZoom:18, zIndex:1,
     crossOrigin:'anonymous'});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png',
    {maxZoom:18, zIndex:2, crossOrigin:'anonymous'}).addTo(map);
  document.getElementById('satBtn').addEventListener('click', ()=>setSatBase(!SATBASE));

  document.getElementById('partySel').onchange = e => { selectedParty = e.target.value; refresh(); };
  const oSel = document.getElementById('originSel');
  Object.entries(OC_LABELS).forEach(([k,lbl])=>{
    const o = document.createElement('option'); o.value = k; o.textContent = lbl; oSel.appendChild(o);
  });
  oSel.value = selectedOrigin;
  oSel.onchange = e => {
    selectedOrigin = e.target.value;
    refresh();
    if(lastPanel && lastPanel.t === 'sa') showPanel(lastPanel.f);   // keep an open profile in sync
  };
  document.getElementById('searchbox').addEventListener('input', e=>{
    if(sugTimer){ clearTimeout(sugTimer); sugTimer = null; }
    lastPicked = '';
    const q = e.target.value.trim();
    if(q.length < 2){ hideSug(); return; }
    renderSug(q, null);
    // addresses join the list when the text is address-like or matches no locality
    if(q.length >= 3 && (!LOC_NAMES.some(n => n.includes(q)) || /\d/.test(q)))
      sugTimer = setTimeout(async () => {
        const sugs = await photonSuggest(q);
        if(e.target.value.trim() === q) renderSug(q, sugs);   // stale guard — user kept typing
      }, 350);
  });
  document.getElementById('searchbox').addEventListener('keydown', e=>{
    // arrow keys walk the suggestion list; Enter picks the highlighted item
    const items = sugEl.classList.contains('open') ? [...sugEl.querySelectorAll('.it')] : [];
    const cur = items.findIndex(el => el.classList.contains('kb'));
    if(e.key === 'ArrowDown' || e.key === 'ArrowUp'){
      if(!items.length) return;
      e.preventDefault();
      const nxt = e.key === 'ArrowDown' ? Math.min(cur + 1, items.length - 1) : Math.max(cur - 1, 0);
      items.forEach((el, i) => el.classList.toggle('kb', i === nxt));
      items[nxt].scrollIntoView({block:'nearest'});
    } else if(e.key === 'Enter' && cur >= 0){
      e.preventDefault();
      items[cur].dispatchEvent(new MouseEvent('mousedown', {bubbles:true, cancelable:true}));
    } else if(e.key === 'Escape'){ hideSug(); }
  });
  document.getElementById('searchbox').addEventListener('blur', () => setTimeout(hideSug, 200));
  document.getElementById('searchbox').addEventListener('change', async e=>{
    const q = e.target.value.trim();
    if(q === lastPicked) return;   // a suggestion was just picked — pin already placed
    hideSug();
    if(zoomToLocality(q)) return;
    if(q.length < 4) return;   // no locality match — try the text as an address
    const ll = await searchAddress(q);
    if(!ll){
      const sb = e.target, ph = sb.placeholder;
      sb.value = '';
      sb.placeholder = 'No such address found in Israel';
      setTimeout(()=>{ sb.placeholder = ph; }, 2500);
      return;
    }
    const l = saLayerAt(ll);
    if(l){ setSelected(l); showPanel(l.feature); }
  });
  document.querySelectorAll('.mode-btn[data-mode]').forEach(b=>b.addEventListener('click', ()=>{
    if(b.style.display==='none') return;
    document.querySelectorAll('.mode-btn[data-mode]').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); currentMode = b.dataset.mode;
    if(POSTER && currentMode!=='winner'){ setPoster(false); return; }
    if(SPACE_MODES[currentMode] && !SPACE){ ensureSpace().then(refresh); return; }
    refresh();
  }));
  // A poster is a national artifact by default: entering poster mode while the
  // view is zoomed in asks whether to frame the whole country or keep the area.
  const NAT_BOUNDS = L.latLngBounds([[29.45,34.25],[33.35,35.9]]);
  const pChoice = document.getElementById('posterChoice');
  document.getElementById('posterBtn').addEventListener('click', ()=>{
    if(POSTER){ setPoster(false); return; }
    if(map.getBounds().contains(NAT_BOUNDS.pad(-0.06))){ setPoster(true); return; }
    pChoice.style.display = 'flex';
    const r = document.getElementById('posterBtn').getBoundingClientRect(), w = pChoice.offsetWidth;
    pChoice.style.top = (r.bottom + 8) + 'px';
    pChoice.style.left = Math.max(8, Math.min(window.innerWidth - w - 8, r.left + r.width/2 - w/2)) + 'px';
  });
  document.getElementById('pcNat').addEventListener('click', ()=>{
    pChoice.style.display = 'none'; map.fitBounds(NAT_BOUNDS); setPoster(true);
  });
  document.getElementById('pcHere').addEventListener('click', ()=>{
    pChoice.style.display = 'none'; setPoster(true);
  });
  document.addEventListener('click', e=>{
    if(pChoice.style.display !== 'none' && !pChoice.contains(e.target) && e.target.id !== 'posterBtn')
      pChoice.style.display = 'none';
  });
  document.getElementById('pngBtn').addEventListener('click', ()=>{
    // national frame -> the HD offscreen poster; a deliberately zoomed frame
    // still exports as a live-view capture of the smaller area
    if(map.getBounds().contains(NAT_BOUNDS.pad(-0.06))) exportPosterHD();
    else exportPoster();
  });
  document.getElementById('panelClose').addEventListener('click', ()=>{
    setSelected(null);
    document.getElementById('sidePanel').classList.remove('open');
  });
  document.getElementById('interpBtn').addEventListener('click', ()=>{
    INTERP = !INTERP;
    if(INTERP && EST){ EST = false; document.getElementById('estBtn').classList.remove('active'); }
    document.getElementById('interpBtn').classList.toggle('active', INTERP);
    refresh();
  });
  document.getElementById('estBtn').addEventListener('click', async ()=>{
    EST = !EST;
    if(EST && INTERP){ INTERP = false; document.getElementById('interpBtn').classList.remove('active'); }
    document.getElementById('estBtn').classList.toggle('active', EST);
    if(EST) await ensureEst();
    refresh();
  });
  document.getElementById('dotsBtn').addEventListener('click', async ()=>{
    DOTS = !DOTS;
    document.getElementById('dotsBtn').classList.toggle('active', DOTS);
    await renderDots();
    refresh();
  });
  // metric explainers: tapping a dotted metric label toggles its definition
  // (content: statarea_help.json "metrics" — he/en at runtime, like the ❓ help)
  document.getElementById('panel').addEventListener('click', e=>{
    const f = e.target.closest('[data-m]');
    if(!f || !MAP_HELP || !MAP_HELP.metrics) return;
    const anchor = f.closest('.note') || f;   // inline spans explain after their line
    const wasOpen = anchor.nextElementSibling && anchor.nextElementSibling.classList.contains('mnote') &&
                    anchor.nextElementSibling.dataset.mfor === f.dataset.m;
    document.querySelectorAll('#panel .mnote').forEach(n=>n.remove());
    if(wasOpen) return;
    const t = MAP_HELP.metrics[f.dataset.m];
    if(!t) return;
    const d = document.createElement('div');
    d.className = 'mnote';
    d.dataset.mfor = f.dataset.m;
    d.textContent = document.documentElement.lang==='en' ? t.en : t.he;
    anchor.after(d);
  });
  document.querySelectorAll('.mode-btn[data-yamina]').forEach(b=>b.addEventListener('click', ()=>{
    YAMINA_RIGHT = b.dataset.yamina === 'right';
    document.querySelectorAll('.mode-btn[data-yamina]').forEach(x=>
      x.classList.toggle('active', x.dataset.yamina === (YAMINA_RIGHT ? 'right' : 'center')));
    refresh();
    if(lastPanel) lastPanel.t === 'sa' ? showPanel(lastPanel.f) : showVenuePanel(lastPanel.d);
  }));
  document.querySelectorAll('.year-btn').forEach(b=>b.addEventListener('click', ()=>{
    if(b.dataset.year!==YEAR) loadYear(b.dataset.year);
  }));

  // deep link: #year=&mode=&code=
  const h = new URLSearchParams(location.hash.slice(1));
  let startYear = h.get('year') && YEARS[h.get('year')] ? h.get('year') : '2022';
  if(h.get('mode')) currentMode = h.get('mode');
  if(h.get('code')) selectedParty = h.get('code');
  if(h.get('oc') && OC_LABELS[h.get('oc')]){ selectedOrigin = h.get('oc'); oSel.value = selectedOrigin; }
  if(h.get('interp')==='1'){ INTERP = true; document.getElementById('interpBtn').classList.add('active'); }
  if(h.get('est')==='1'){
    EST = true; document.getElementById('estBtn').classList.add('active');
    if(INTERP){ INTERP = false; document.getElementById('interpBtn').classList.remove('active'); }
  }
  if(h.get('dots')==='1'){ DOTS = true; document.getElementById('dotsBtn').classList.add('active'); }
  if(h.get('base')==='sat') setSatBase(true);   // geoLayer not built yet -> swaps tiles only, no refresh
  if(h.get('yamina')==='1') YAMINA_RIGHT = true;   // button actives set in loadYear
  await loadYear(startYear);
  if(h.get('poster')==='1') await setPoster(true);

  // guided tours + explain-this-view — buttons stay hidden if the data files are missing
  TOURS = await fetch('data/statarea_tours.json?v='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null);
  MAP_HELP = await fetch('data/statarea_help.json?v='+Date.now()).then(r=>r.ok?r.json():null).catch(()=>null);
  if(TOURS){
    const tb = document.getElementById('tourBtn');
    tb.style.display = '';
    tb.onclick = () => {
      if(tourActive){ endTour(); return; }
      const p = document.getElementById('tourPicker');
      if(p && p.classList.contains('open')){ p.classList.remove('open'); return; }
      openTourPicker();
    };
    const t = h.get('tour');
    if(t && TOURS.tours[t]) startTour(t, Math.max(1, parseInt(h.get('step')||'1', 10) || 1) - 1);
  }
  if(MAP_HELP){
    const hb = document.getElementById('helpBtn');
    hb.style.display = '';
    const pop = document.createElement('div');
    pop.className = 'help-pop';
    pop.id = 'helpPop';
    document.body.appendChild(pop);
    hb.onclick = () => {
      const r = hb.getBoundingClientRect();
      pop.style.top = (r.bottom + 8) + 'px';
      pop.style.left = Math.max(8, Math.min(r.left, window.innerWidth - 360)) + 'px';
      pop.classList.toggle('open');
      refreshMapHelp();
    };
    // keep an open popover in sync with mode clicks
    document.addEventListener('click', () => setTimeout(refreshMapHelp, 0), true);
  }
}
boot();
</script>
</body>
</html>
