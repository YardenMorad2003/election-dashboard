// === COLOR FUNCTIONS ===
// Margin-based color steps for bloc mode:
// Margin = right_haredi_pct - center_left_arab_pct
//   0-15%  margin = light/pastel
//  15-35%  margin = medium
//  35-50%  margin = strong  
//  50%+    margin = very strong

const BLUE_STEPS = [
  {max:15,  color:[140,185,240]},  // light blue
  {max:35,  color:[74,158,255]},   // medium blue
  {max:50,  color:[40,110,220]},   // strong blue
  {max:200, color:[20,60,180]},    // very strong blue
];
const RED_STEPS = [
  {max:15,  color:[240,150,140]},  // light red
  {max:35,  color:[231,100,80]},   // medium red
  {max:50,  color:[200,55,40]},    // strong red
  {max:200, color:[160,25,15]},    // very strong red
];

function getBlocColor(rightHarediPct, centerLeftArabPct){
  const margin = rightHarediPct - centerLeftArabPct; // positive = right, negative = left
  const absMargin = Math.abs(margin);
  const steps = margin >= 0 ? BLUE_STEPS : RED_STEPS;
  
  let rgb = steps[steps.length-1].color;
  for(const step of steps){
    if(absMargin <= step.max){
      rgb = step.color;
      break;
    }
  }
  
  return `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
}

function getColor(props){
  const mode = COLOR_MODES.find(m=>m.id===currentMode);
  if(!props.matched) return 'rgba(255,255,255,0.03)';

  // Direct-PM mode: two-candidate margin on the bloc scale; split/swing/gap on the
  // swing scale (all three right-positive = blue); turnout on the Knesset turnout ramp
  if(mode.id === 'pm'){
    if(pmSubmode === 'split'){
      const s = pmSplitValue(props);
      return s === null ? 'rgba(255,255,255,0.03)' : getSwingColor(s); // positive = PM-right ahead = blue
    }
    if(pmSubmode === 'swing'){
      const v = pmSwingValue(props);
      return v === null ? 'rgba(255,255,255,0.03)' : getSwingColor(v);
    }
    if(pmSubmode === 'gap'){
      const v = pmGapValue(props);
      return v === null ? 'rgba(255,255,255,0.03)' : getSwingColor(v);
    }
    if(pmSubmode === 'gap_change'){
      const v = pmGapChangeValue(props);
      return v === null ? 'rgba(255,255,255,0.03)' : getSwingColor(v);
    }
    if(pmSubmode === 'net'){
      const v = pmNetValue(props);
      return v === null ? 'rgba(255,255,255,0.03)' : pmNetColor(v);
    }
    if(pmSubmode === 'turnout'){
      const t = pmTurnout(props);
      if(t === null) return 'rgba(255,255,255,0.03)';
      return lerpColor('#1a0a0a', '#2ecc71', Math.min(t, 100) / 100);
    }
    const s = pmShares(pmRow(props.name));
    return s ? getBlocColor(s.r2, s.l2) : 'rgba(255,255,255,0.03)';
  }

  // Swing mode: special color logic
  if(mode.id === 'swing'){
    const swing = getSwing(props);
    if(!swing) return 'rgba(255,255,255,0.03)';
    // Use margin change: negative = swing right (blue), positive = swing left (red)
    const marginChange = swing.center_left_arab - swing.right_haredi;
    return getSwingColor(-marginChange); // negate so right=positive=blue in getSwingColor
  }
  
  // Gap mode: color by difference from national average
  if(mode.id === 'gap'){
    const gapData = getGap(props);
    if(!gapData) return 'rgba(255,255,255,0.03)';
    // gap > 0 means more center-left than national → red; gap < 0 means more right → blue
    return getSwingColor(-gapData.gap); // negate so right=blue, left=red (same as swing)
  }
  
  // Gap change mode: color by change in gap from previous election
  if(mode.id === 'gap_change'){
    const delta = getGapChange(props);
    if(delta === null) return 'rgba(255,255,255,0.03)';
    // delta > 0 = moved more left relative to country → red; delta < 0 = moved more right → blue
    return getSwingColor(-delta);
  }
  
  // Party mode: share (dark → bloc color, fixed scale) / swing (Δ vs prev) / gap (vs national)
  if(mode.id === 'party'){
    if(!selectedPartyCode) return 'rgba(255,255,255,0.03)';
    const info = partyEraInfo(selectedPartyCode, currentElection);
    if(!info) return 'rgba(255,255,255,0.05)'; // didn't contest this election
    if(partySubmode === 'swing'){
      const d = partySwingValue(props);
      return d === null ? 'rgba(255,255,255,0.03)' : divergingGR(d, 15);
    }
    if(partySubmode === 'gap'){
      const d = partyGapValue(props);
      return d === null ? 'rgba(255,255,255,0.03)' : divergingGR(d, 20);
    }
    const row = findPartyData(props.name, currentElection);
    if(!row) return 'rgba(255,255,255,0.03)';
    const share = row[codeForElection(selectedPartyCode, currentElection)] || 0;
    const ramp = BLOC_RAMP[info.bloc] || BLOC_RAMP.right;
    const t = Math.min(share / getPartyScale(selectedPartyCode), 1);
    return lerpColor(ramp[0], ramp[1], t);
  }

  // Winner mode: plurality party's color
  if(mode.id === 'winner'){
    const w = getWinner(props.name, currentElection);
    return w ? (WINNER_COLORS[w.canon] || WINNER_FALLBACK) : 'rgba(255,255,255,0.03)';
  }

  // Duel mode: margin between two parties, ramped toward the leader's color
  if(mode.id === 'duel'){
    const m = duelMargin(props);
    if(m === null) return 'rgba(255,255,255,0.05)';
    if(Math.abs(m) < 0.5) return 'rgb(80,80,90)';
    const {ca, cb} = duelColors();
    const t = Math.min(Math.abs(m), 30) / 30;
    return lerpColor('#141a24', m > 0 ? ca : cb, t);
  }

  // Turnout mode
  if(mode.id === 'turnout'){
    const t = getTurnout(props);
    if(t === null) return 'rgba(255,255,255,0.03)';
    const pct = Math.min(t, 100) / 100;
    return lerpColor('#1a0a0a', '#2ecc71', pct);
  }
  
  // Turnout change mode
  if(mode.id === 'turnout_change'){
    const delta = getTurnoutChange(props);
    if(delta === null) return 'rgba(255,255,255,0.03)';
    if(Math.abs(delta) < 0.5) return 'rgb(80,80,90)';
    const t = Math.min(Math.abs(delta), 15) / 15;
    if(delta > 0) return lerpColor('#1a3a1a', '#2ecc71', t);
    return lerpColor('#3a1a1a', '#e74c3c', t);
  }
  
  let val, rh, cla;
  if(currentElection === props.latest_election){
    let ed = {right_haredi_pct:props.right_haredi_pct, center_left_arab_pct:props.center_left_arab_pct,
      right_pct:props.right_pct, opposition_right_pct:props.opposition_right_pct||0,
      haredi_pct:props.haredi_pct, center_pct:props.center_pct, left_pct:props.left_pct, arab_pct:props.arab_pct};
    ed = adjustBlocForYamina(ed, props.name);
    val = ed[mode.field] || 0;
    rh = ed.right_haredi_pct || 0;
    cla = ed.center_left_arab_pct || 0;
  } else {
    let ed = props.elections?.[currentElection];
    if(!ed) return 'rgba(255,255,255,0.03)';
    ed = adjustBlocForYamina(ed, props.name);
    val = ed[mode.field] || 0;
    rh = ed.right_haredi_pct || 0;
    cla = ed.center_left_arab_pct || 0;
    if(mode.field === 'right_pct' || mode.field === 'haredi_pct' || 
       mode.field === 'center_pct' || mode.field === 'left_pct' || mode.field === 'arab_pct' ||
       mode.field === 'opposition_right_pct'){
      if(val === 0){
        return interpolateColor(0, mode);
      }
    }
  }
  
  if(mode.id === 'bloc'){
    return getBlocColor(rh, cla);
  }
  return interpolateColor(val, mode);
}

// Swing color: blue = swing right, red = swing left, gray = no change
// Range: -30 to +30 mapped to stepped colors
const SWING_BLUE = [
  {max:3,  color:[140,185,240]},
  {max:8,  color:[74,158,255]},
  {max:15, color:[40,110,220]},
  {max:100,color:[20,60,180]},
];
const SWING_RED = [
  {max:3,  color:[240,150,140]},
  {max:8,  color:[231,100,80]},
  {max:15, color:[200,55,40]},
  {max:100,color:[160,25,15]},
];
function getSwingColor(swingVal){
  if(Math.abs(swingVal) < 0.5) return 'rgb(80,80,90)'; // near-zero = gray
  const abs = Math.abs(swingVal);
  const steps = swingVal > 0 ? SWING_BLUE : SWING_RED;
  let rgb = steps[steps.length-1].color;
  for(const step of steps){
    if(abs <= step.max){ rgb = step.color; break; }
  }
  return `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
}

// Net-vote color: same palette, but thresholds in RAW VOTES (dead heat = gray).
// The big cities run to ±60k+, so the darkest step starts at 10k.
const PM_NET_MAXES = [500, 2000, 10000, Infinity];
function pmNetColor(net){
  if(Math.abs(net) < 50) return 'rgb(80,80,90)';
  const abs = Math.abs(net);
  const steps = net > 0 ? SWING_BLUE : SWING_RED;
  let rgb = steps[steps.length-1].color;
  for(let i = 0; i < PM_NET_MAXES.length; i++){
    if(abs <= PM_NET_MAXES[i]){ rgb = steps[i].color; break; }
  }
  return `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
}

function interpolateColor(val, mode){
  const t = Math.min(val,100) / 100;
  return lerpColor(mode.colors[0], mode.colors[1], t);
}

function lerpColor(c1,c2,t){
  const r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);
  const r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);
  const r=Math.round(r1+(r2-r1)*t),g=Math.round(g1+(g2-g1)*t),b=Math.round(b1+(b2-b1)*t);
  return `rgb(${r},${g},${b})`;
}

function getStyle(feature){
  const p = feature.properties;
  const isSelected = selectedFeature && selectedFeature.properties.name === p.name;
  
  // Check if locality passes filter
  let passesFilter = true;
  if(filterRange !== 0){
    passesFilter = localityPassesFilter(p);
  }
  
  return {
    fillColor: getColor(p),
    fillOpacity: !p.matched ? 0.08 : (passesFilter ? (satBase ? 0.55 : 0.75) : 0.06),   // lighter over imagery so buildings stay readable
    color: isSelected ? '#fff' : 'rgba(200,220,255,0.25)',
    weight: isSelected ? 2.5 : 0.5,
    opacity: 1
  };
}

// === MAP DATA ===
function featureCentroid(f){
  if(f.properties._cen) return f.properties._cen;
  let minx=Infinity,miny=Infinity,maxx=-Infinity,maxy=-Infinity;
  (function scan(co){
    if(typeof co[0]==='number'){
      if(co[0]<minx)minx=co[0]; if(co[0]>maxx)maxx=co[0];
      if(co[1]<miny)miny=co[1]; if(co[1]>maxy)maxy=co[1];
    } else { for(const x of co) scan(x); }
  })(f.geometry.coordinates);
  if(minx===Infinity) return null;
  const cen=[(miny+maxy)/2,(minx+maxx)/2];
  f.properties._cen=cen; return cen;
}

function bubbleSize(props){
  if(currentMode === 'pm'){
    const row = pmRow(props.name);
    if(!row) return 0;
    if(pmSubmode === 'net') return Math.abs(row[0] - row[1]);   // bubble area = net vote differential
    return row[3] || row[2] || 0;   // registered, else voted
  }
  const ed=getElectionData(props, currentElection);
  if(!ed) return 0;
  return ed.bzb || ed.kosher_votes || ed.eligible || 0;
}

// Dorling relaxation: separate overlapping circles in pixel space (grid-hashed pairwise pass,
// smaller circles yield more; weak spring back to the true centroid). Runs at the current zoom.
function relaxDorling(items, maxSize){
  const pts = items.map((it, i) => {
    const pt = map.latLngToLayerPoint(L.latLng(it.cen[0], it.cen[1]));
    return {x:pt.x, y:pt.y, ox:pt.x, oy:pt.y, r:3+32*Math.sqrt(it.size/maxSize), i};
  });
  const maxR = pts.reduce((m,p) => Math.max(m, p.r), 1);
  const cell = maxR*2 + 2;
  for(let iter=0; iter<120; iter++){
    const grid = new Map();
    pts.forEach((p, i) => {
      const key = Math.floor(p.x/cell) + '_' + Math.floor(p.y/cell);
      if(!grid.has(key)) grid.set(key, []);
      grid.get(key).push(i);
    });
    let collisions = 0;
    for(let i=0; i<pts.length; i++){
      const p = pts[i];
      const cx = Math.floor(p.x/cell), cy = Math.floor(p.y/cell);
      for(let gx=cx-1; gx<=cx+1; gx++) for(let gy=cy-1; gy<=cy+1; gy++){
        const arr = grid.get(gx + '_' + gy);
        if(!arr) continue;
        for(const j of arr){
          if(j <= i) continue;
          const q = pts[j];
          let dx = q.x-p.x, dy = q.y-p.y;
          let d = Math.sqrt(dx*dx + dy*dy);
          const min = p.r + q.r + 0.5;
          if(d >= min) continue;
          if(d < 0.01){ dx = ((i%7)-3)*0.1 + 0.05; dy = ((j%5)-2)*0.1 + 0.05; d = Math.sqrt(dx*dx+dy*dy); }
          const push = (min - d) / d;
          const wp = q.r*q.r / (p.r*p.r + q.r*q.r); // smaller circle moves more
          p.x -= dx*push*wp;   p.y -= dy*push*wp;
          q.x += dx*push*(1-wp); q.y += dy*push*(1-wp);
          collisions++;
        }
      }
      p.x += (p.ox - p.x) * 0.01;
      p.y += (p.oy - p.y) * 0.01;
    }
    if(!collisions) break;
  }
  return pts.map(p => map.layerPointToLatLng(L.point(p.x, p.y)));
}

function buildBubbleLayer(relaxed){
  const items=[]; let maxSize=1;
  geojsonData.features.forEach(f=>{
    if(!f.properties.matched) return;
    const size=bubbleSize(f.properties);
    if(size<=0) return;
    const cen=featureCentroid(f);
    if(!cen) return;
    if(size>maxSize) maxSize=size;
    items.push({f,size,cen});
  });
  const positions = relaxed ? relaxDorling(items, maxSize) : items.map(it => it.cen);
  const markers=items.map((it, idx)=>{
    const r=3+32*Math.sqrt(it.size/maxSize);
    const isSel=selectedFeature && selectedFeature.properties.name===it.f.properties.name;
    const pass=filterRange===0 || localityPassesFilter(it.f.properties);
    const m=L.circleMarker(positions[idx],{radius:r,fillColor:getColor(it.f.properties),
      fillOpacity:pass?0.8:0.08,color:isSel?'#fff':'rgba(255,255,255,0.35)',weight:isSel?2:0.6,opacity:1});
    m.on('click',()=>{ selectedFeature=it.f; updateMap(); showPanel(it.f); });
    m.on('mouseover',e=>{ e.target.setStyle({weight:2,color:'rgba(255,255,255,0.85)'}); e.target.bringToFront(); });
    m.on('mouseout',e=>{ e.target.setStyle({weight:isSel?2:0.6,color:isSel?'#fff':'rgba(255,255,255,0.35)'}); });
    return m;
  });
  return L.layerGroup(markers);
}

// Dorling layout depends on zoom (pixel radii) — rebuild when zoom settles
map.on('zoomend', () => { if(displayMode === 'dorling') updateMap(); });

// Top-10 labels — party share mode only, updates every time-lapse step. Two metrics:
// 'strongholds' = highest local vote share; 'contrib' = largest slice of the party's official
// NATIONAL vote (locality share × locality valid votes ÷ parties_national national_votes),
// e.g. how much of the national Likud vote Tel Aviv supplied.
let strongholdLayer = null;
function updateStrongholds(){
  if(strongholdLayer){ map.removeLayer(strongholdLayer); strongholdLayer = null; }
  if(currentMode !== 'party' || partySubmode !== 'share' || !selectedPartyCode || !geojsonData) return;
  if(!partyEraInfo(selectedPartyCode, currentElection)) return;
  const actual = codeForElection(selectedPartyCode, currentElection);
  const contrib = partyLabelMode === 'contrib';
  const natVotes = partyNational?.[currentElection]?.national_votes?.[actual] || 0;
  if(contrib && !natVotes) return;
  const seen = new Set(), items = [];
  geojsonData.features.forEach(f => {
    const p = f.properties;
    if(!p.matched || seen.has(p.name)) return;
    const ed = getElectionData(p, currentElection);
    if(!ed || (ed.bzb || ed.kosher_votes || 0) < 500) return; // skip micro-localities
    const row = findPartyData(p.name, currentElection);
    if(!row) return;
    const share = row[actual] || 0;
    if(share <= 0) return;
    let metric = share;
    if(contrib){
      const kosher = ed.kosher_votes || 0;
      if(!kosher) return;
      metric = (share / 100) * kosher / natVotes * 100; // % of the party's national vote
    }
    seen.add(p.name);
    items.push({f, share, metric});
  });
  items.sort((a,b) => b.metric - a.metric);
  const markers = items.slice(0, 10).map(it => {
    const cen = featureCentroid(it.f);
    if(!cen) return null;
    const txt = contrib
      ? `${it.f.properties.name} · ${it.metric >= 9.95 ? it.metric.toFixed(0) : it.metric.toFixed(1)}% מהמפלגה`
      : `${it.f.properties.name} · ${it.share.toFixed(0)}%`;
    return L.marker(cen, {
      interactive: false, keyboard: false,
      icon: L.divIcon({className:'', iconSize:null,
        html:`<div class="stronghold-label">${txt}</div>`})
    });
  }).filter(Boolean);
  strongholdLayer = L.layerGroup(markers).addTo(map);
}

function updateMap(){
  if(!geojsonData) return;
  if(geoLayer){ map.removeLayer(geoLayer); geoLayer=null; }
  if(bubbleLayer){ map.removeLayer(bubbleLayer); bubbleLayer=null; }
  if(displayMode === 'bubbles' || displayMode === 'dorling'){
    bubbleLayer = buildBubbleLayer(displayMode === 'dorling').addTo(map);
    updateStrongholds();
    return;
  }

  geoLayer = L.geoJSON(geojsonData, {
    style: getStyle,
    onEachFeature: (feature, layer) => {
      layer.on({
        click: (e) => {
          selectedFeature = feature;
          updateMap();
          showPanel(feature);
        },
        mouseover: (e) => {
          if(feature.properties.matched){
            e.target.setStyle({weight:2, color:'rgba(255,255,255,0.6)'});
            e.target.bringToFront();
          }
        },
        mouseout: (e) => {
          geoLayer.resetStyle(e.target);
        }
      });
    }
  }).addTo(map);
  updateStrongholds();
}

// Direct-PM panel: candidate result, national reference, split vs the concurrent
// Knesset (96/99) or turnout collapse vs 1999 (2001), and a clickable contest history.
function renderPmPanel(p, titleEl, subEl, bodyEl){
  const m = PM_CONTESTS[pmContest];
  titleEl.textContent = p.name;
  subEl.textContent = `בחירה ישירה לרה"מ · ${pmContest} · ${p.type}`;
  const s = pmShares(pmRow(p.name));
  if(!s){
    bodyEl.innerHTML = '<div style="color:var(--text3);text-align:center;padding:20px 0">אין נתוני בחירה ישירה ליישוב זה</div>';
    return;
  }
  const tile = (label, val) => `<div style="flex:1;background:rgba(255,255,255,0.04);border-radius:8px;padding:10px;text-align:center">
    <div style="font-size:0.75rem;color:var(--text3)">${label}</div>
    <div style="font-size:1.2rem;font-weight:700">${val}</div></div>`;
  let html = `<div style="display:flex;gap:12px;margin-bottom:12px">`;
  if(s.registered > 0) html += tile('בעלי זכות', s.registered.toLocaleString());
  html += tile('הצביעו', s.voted.toLocaleString());
  if(s.registered > 0) html += tile('שיעור הצבעה', (s.voted/s.registered*100).toFixed(1) + '%');
  html += `</div>`;

  const row = pmRow(p.name);
  [{name:m.right, votes:row[0], pct:s.r2, color:'var(--right)'},
   {name:m.left,  votes:row[1], pct:s.l2, color:'var(--left)'}].forEach(c => {
    html += `<div class="bloc-bar">
      <div class="bloc-label"><span class="bloc-name">${c.name}</span>
        <span class="bloc-val" style="color:${c.color}">${c.pct.toFixed(1)}% · ${c.votes.toLocaleString()}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${c.pct}%;background:${c.color}"></div></div>
    </div>`;
  });
  const margin = s.r2 - s.l2;
  const mColor = margin >= 0 ? 'var(--right)' : 'var(--left)';
  html += `<div style="text-align:center;margin:8px 0 4px;font-size:0.85rem;color:${mColor};font-weight:700">
    מרווח: ${Math.abs(margin).toFixed(1)}% ל${margin >= 0 ? m.rShort : m.lShort}</div>`;
  const net = row[0] - row[1];
  if(net !== 0){
    html += `<div style="text-align:center;font-size:0.78rem;color:${mColor}">
      הפרש קולות: ${Math.abs(net).toLocaleString()} ל${net >= 0 ? m.rShort : m.lShort}</div>`;
  }
  const invalid = s.voted - s.valid;
  if(invalid > 0){
    html += `<div style="text-align:center;font-size:0.75rem;color:var(--text3)">
      פסולים ולבנים: ${invalid.toLocaleString()} (${(invalid/s.voted*100).toFixed(1)}% מהמצביעים)</div>`;
  }
  const nat = pmNational();
  if(nat){
    const gap = s.r2 - nat.r2;
    const gColor = Math.abs(gap) < 0.5 ? 'var(--text3)' : (gap > 0 ? 'var(--right)' : 'var(--left)');
    html += `<div style="text-align:center;font-size:0.78rem;color:var(--text3);margin-top:8px">
      ארצי: ${m.rShort} ${nat.r2.toFixed(1)}% · ${m.lShort} ${nat.l2.toFixed(1)}%</div>
    <div style="text-align:center;font-size:0.78rem;color:${gColor};margin-top:2px">
      פער מהארץ: ${Math.abs(gap).toFixed(1)}% ל${gap >= 0 ? m.rShort : m.lShort}</div>`;
  }
  // Margin swing vs the previous direct contest (labeled by the CURRENT pair's candidates —
  // the right's candidate changed between 1999 and 2001)
  const prevY = PM_PREV[pmContest];
  const pv = prevY ? pmShares(pmRow(p.name, prevY)) : null;
  if(pv){
    const sw = (s.r2 - s.l2) - (pv.r2 - pv.l2);
    const swColor = Math.abs(sw) < 0.5 ? 'var(--text3)' : (sw > 0 ? 'var(--right)' : 'var(--left)');
    html += `<div style="text-align:center;font-size:0.78rem;color:${swColor};margin-top:2px">
      סווינג מ-${prevY}: ${Math.abs(sw).toFixed(1)}% ל${sw >= 0 ? m.rShort : m.lShort}</div>`;
    const gc = pmGapChangeValue(p);
    if(gc !== null){
      const gcColor = Math.abs(gc) < 0.5 ? 'var(--text3)' : (gc > 0 ? 'var(--right)' : 'var(--left)');
      html += `<div style="text-align:center;font-size:0.78rem;color:${gcColor};margin-top:2px">
        שינוי בפער מהארץ מ-${prevY}: ${Math.abs(gc).toFixed(1)}% לכיוון ${gc >= 0 ? m.rShort : m.lShort}</div>`;
    }
  }

  // Split vs the same-day Knesset vote (1996/1999)
  if(m.concurrent){
    const split = pmSplitValue(p);
    if(split !== null){
      const ed = getElectionData(p, m.kn);
      const rh = ed.right_haredi_pct || 0, cla = ed.center_left_arab_pct || 0;
      const rh2 = rh/(rh+cla)*100;
      const sColor = Math.abs(split) < 1 ? 'var(--text3)' : (split > 0 ? 'var(--right)' : 'var(--left)');
      const sLabel = split > 1 ? `הקול לרה"מ ימני מהקול לכנסת` : split < -1 ? `הקול לרה"מ שמאלי מהקול לכנסת` : 'אין פיצול משמעותי';
      const sArrow = split > 1 ? '→' : split < -1 ? '←' : '·';
      html += `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
        <div style="font-size:0.8rem;color:var(--text3);margin-bottom:8px">פיצול הקול מול הבחירות לכנסת ${m.kn} (באותו יום)</div>
        <div style="display:flex;justify-content:space-between;font-size:0.78rem;margin-bottom:3px">
          <span style="color:var(--text3)">ימין-חרדים בכנסת (דו-גושי)</span><span style="font-weight:500">${rh2.toFixed(1)}%</span></div>
        <div style="display:flex;justify-content:space-between;font-size:0.78rem;margin-bottom:8px">
          <span style="color:var(--text3)">${m.rShort} לרה"מ (דו-מועמדי)</span><span style="font-weight:500">${s.r2.toFixed(1)}%</span></div>
        <div style="text-align:center;margin-bottom:4px">
          <div style="font-size:1.4rem;font-weight:800;color:${sColor}">${sArrow} ${Math.abs(split).toFixed(1)}%</div>
          <div style="font-size:0.8rem;color:${sColor};font-weight:500">${sLabel}</div>
        </div></div>`;
    }
  } else {
    // 2001: PM-only special election — the story is the turnout collapse vs 1999
    const prev = pmShares(pmRow(p.name, '1999'));
    if(pmContest === '2001' && prev && prev.registered > 0 && s.registered > 0){
      const t99 = prev.voted/prev.registered*100, t01 = s.voted/s.registered*100;
      const d = t01 - t99;
      const dColor = Math.abs(d) < 2 ? 'var(--text3)' : (d < 0 ? 'var(--left)' : 'var(--center)');
      html += `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
        <div style="font-size:0.8rem;color:var(--text3);margin-bottom:6px">בחירות מיוחדות לרה"מ בלבד — ללא בחירות מקבילות לכנסת</div>
        <div style="display:flex;justify-content:space-between;font-size:0.78rem">
          <span style="color:var(--text3)">שינוי בשיעור ההצבעה מ-1999</span>
          <span style="font-weight:700;color:${dColor}">${t99.toFixed(1)}% ← ${t01.toFixed(1)}% (${d > 0 ? '+' : ''}${d.toFixed(1)}%)</span></div>
        </div>`;
    }
  }

  // Contest history strip — jump between the three PM races
  const hist = Object.keys(PM_CONTESTS).filter(y => pmShares(pmRow(p.name, y)));
  if(hist.length > 1){
    html += `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
      <div style="font-size:0.8rem;color:var(--text3);margin-bottom:6px">שלוש הבחירות הישירות ביישוב</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">`;
    hist.forEach(y => {
      const hs = pmShares(pmRow(p.name, y));
      const hm = hs.r2 - hs.l2;
      const meta = PM_CONTESTS[y];
      const c = hm >= 0 ? 'var(--right)' : 'var(--left)';
      html += `<button class="mode-btn${y === pmContest ? ' active' : ''}" onclick="pmGo('${y}')" style="flex:1;min-width:0">
        ${y}<br><span style="color:${c};font-weight:700">${hm >= 0 ? meta.rShort : meta.lShort} +${Math.abs(hm).toFixed(0)}%</span></button>`;
    });
    html += `</div></div>`;
  }
  bodyEl.innerHTML = html;
}

function showPanel(feature){
  const p = feature.properties;
  const titleEl = document.getElementById('panelTitle');
  const subEl = document.getElementById('panelSubtitle');
  const bodyEl = document.getElementById('panelBody');

  if(!p.matched){
    titleEl.textContent = p.name;
    subEl.textContent = p.type;
    bodyEl.innerHTML = '<div style="color:var(--text3);text-align:center;padding:20px 0">אין נתוני בחירות עבור אזור זה</div>';
    return;
  }

  if(currentMode === 'pm'){ renderPmPanel(p, titleEl, subEl, bodyEl); return; }

  titleEl.textContent = p.name;
  const yr = KNESSET_YEARS[currentElection];
  let subtitleExtra = '';
  if(currentElection === '24' && yaminaInRight) subtitleExtra = ' · ימינה בימין';
  subEl.textContent = `כנסת ${currentElection} (${yr}) · ${p.type}${subtitleExtra}`;
  
  // Get election data for current selection
  let ed;
  if(currentElection === p.latest_election){
    ed = {
      right_haredi_pct: p.right_haredi_pct,
      center_left_arab_pct: p.center_left_arab_pct,
      right_pct: p.right_pct, haredi_pct: p.haredi_pct,
      center_pct: p.center_pct, left_pct: p.left_pct,
      arab_pct: p.arab_pct, eligible: p.eligible,
      opposition_right_pct: p.opposition_right_pct || 0,
      turnout_pct: p.turnout_pct,
      kosher_votes: p.kosher_votes, bzb: p.bzb,
      voters: p.voters
    };
  } else {
    ed = p.elections?.[currentElection];
    if(ed) ed = Object.assign({}, ed); // clone so we don't mutate
  }
  
  if(!ed){
    bodyEl.innerHTML = '<div style="color:var(--text3);text-align:center;padding:20px 0">אין נתונים לבחירות אלו</div>';
    return;
  }
  
  // Apply yamina adjustment for K24
  ed = adjustBlocForYamina(ed, p.name);
  
  const blocs = [
    {name:'ימין-חרדים',val:ed.right_haredi_pct||0,color:'var(--right)'},
    {name:'מרכז-שמאל-ערבים',val:ed.center_left_arab_pct||0,color:'var(--left)'},
  ];
  
  let html = '';
  
  // Voter counts
  const elNum = parseInt(currentElection);
  let kosher = ed.kosher_votes || ed.eligible || 0;
  let bzb = ed.bzb || 0;
  
  html += `<div style="display:flex;gap:12px;margin-bottom:4px" data-mblock>`;
  if(bzb > 0){
    html += `<div style="flex:1;background:rgba(255,255,255,0.04);border-radius:8px;padding:10px;text-align:center">
      <div style="font-size:0.75rem;color:var(--text3)" data-m="bzb" class="mk">בעלי זכות</div>
      <div style="font-size:1.2rem;font-weight:700">${bzb.toLocaleString()}</div></div>`;
  }
  html += `<div style="flex:1;background:rgba(255,255,255,0.04);border-radius:8px;padding:10px;text-align:center">
    <div style="font-size:0.75rem;color:var(--text3)" data-m="kosher" class="mk">כשרים</div>
    <div style="font-size:1.2rem;font-weight:700">${kosher.toLocaleString()}</div></div>`;
  const turnoutPct = (bzb > 0 && ed.voters) ? (ed.voters / bzb * 100).toFixed(1) : null;
  if(turnoutPct){
    html += `<div style="flex:1;background:rgba(255,255,255,0.04);border-radius:8px;padding:10px;text-align:center">
      <div style="font-size:0.75rem;color:var(--text3)" data-m="turnout" class="mk">שיעור הצבעה</div>
      <div style="font-size:1.2rem;font-weight:700">${turnoutPct}%</div></div>`;
  }
  html += `</div>`;
  html += `<div class="mhint" style="margin-bottom:12px">הקישו על מדד מקווקו להסבר</div>`;
  
  // Main blocs
  const margin = (ed.right_haredi_pct||0) - (ed.center_left_arab_pct||0);
  const marginAbs = Math.abs(margin).toFixed(1);
  const marginLabel = margin >= 0 ? 'ימין-חרדים' : 'מרכז-שמאל-ערבים';
  const marginColor = margin >= 0 ? 'var(--right)' : 'var(--left)';
  
  blocs.forEach(b => {
    html += `<div class="bloc-bar">
      <div class="bloc-label"><span class="bloc-name">${b.name}</span><span class="bloc-val" style="color:${b.color}">${b.val.toFixed(1)}%</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${b.val}%;background:${b.color}"></div></div>
    </div>`;
  });
  
  html += `<div style="text-align:center;margin:8px 0 4px;font-size:0.85rem;color:${marginColor};font-weight:700" data-m="margin" class="mk">
    מרווח: ${marginAbs}% ${marginLabel}</div>`;
  
  // Swing section
  const swing = getSwing(p);
  if(swing){
    const prevYear = KNESSET_YEARS[swing.prevKey];
    // Overall swing = change in margin (right_haredi - center_left_arab)
    // If right_haredi grew more (or shrank less) than center_left_arab, swing is rightward
    // Overall swing = change in margin (cla - rh). Positive = moved toward center-left.
    const marginChange = swing.center_left_arab - swing.right_haredi;
    const overallSwing = marginChange; // positive = swing to center-left
    const swingAbs = Math.abs(overallSwing).toFixed(1);
    const swingDirection = overallSwing > 0.3 ? 'למרכז-שמאל-ערבים' : overallSwing < -0.3 ? 'לימין-חרדים' : 'ללא שינוי משמעותי';
    const swingColor = overallSwing > 0.3 ? 'var(--left)' : overallSwing < -0.3 ? 'var(--right)' : 'var(--text3)';
    const swingArrow = overallSwing > 0.3 ? '←' : overallSwing < -0.3 ? '→' : '·';
    
    html += `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">`;
    html += `<div style="font-size:0.8rem;color:var(--text3);margin-bottom:10px" data-m="swing" class="mk">סווינג מכ${swing.prevKey} (${prevYear})</div>`;
    
    // Big swing indicator
    html += `<div style="text-align:center;margin-bottom:12px">
      <div style="font-size:1.4rem;font-weight:800;color:${swingColor}">${swingArrow} ${swingAbs}%</div>
      <div style="font-size:0.8rem;color:${swingColor};font-weight:500">${swingDirection}</div>
    </div>`;
    
    // Visual swing bar: center = 0, left = leftward swing, right = rightward swing
    const barMax = 30; // max swing % for bar scale
    const barPct = Math.min(Math.abs(overallSwing), barMax) / barMax * 50;
    html += `<div style="position:relative;height:14px;background:rgba(255,255,255,0.04);border-radius:7px;overflow:hidden;margin-bottom:12px">
      <div style="position:absolute;left:50%;top:0;bottom:0;width:1px;background:rgba(255,255,255,0.2)"></div>`;
    if(overallSwing > 0){
      // Red bar extending LEFT from center (swing to center-left, now on the left)
      html += `<div style="position:absolute;right:50%;top:2px;bottom:2px;width:${barPct}%;background:var(--left);border-radius:5px;transition:width .4s"></div>`;
    } else {
      // Blue bar extending RIGHT from center (swing to right-haredi, now on the right)
      html += `<div style="position:absolute;left:50%;top:2px;bottom:2px;width:${barPct}%;background:var(--right);border-radius:5px;transition:width .4s"></div>`;
    }
    html += `</div>`;
    html += `<div style="display:flex;justify-content:space-between;font-size:0.65rem;color:var(--text3);margin-top:-8px;margin-bottom:8px">
      <span>ימין-חרדים →</span><span>← מרכז-שמאל</span>
    </div>`;
    
    // Sub-bloc changes (compact)
    const subSwing = [
      {name:'ימין', val:swing.right, color:'var(--right)'},
      {name:'חרדים', val:swing.haredi, color:'var(--haredi)'},
      {name:'מרכז', val:swing.center, color:'var(--center)'},
      {name:'שמאל', val:swing.left, color:'var(--left)'},
      {name:'ערבים', val:swing.arab, color:'var(--arab)'},
    ];
    if(parseInt(currentElection) >= 21){
      subSwing.push({name:'ימין אופוזיציוני', val:swing.opposition_right, color:'var(--opp)', m:'opp'});
    }
    html += `<div style="margin-top:4px;padding-top:8px;border-top:1px solid rgba(74,158,255,0.1)">`;
    html += `<div style="font-size:0.75rem;color:var(--text3);margin-bottom:6px" data-m="subswing" class="mk">שינוי לפי גוש</div>`;
    subSwing.forEach(s => {
      const sign = s.val > 0 ? '+' : '';
      const clr = Math.abs(s.val) > 0.5 ? s.color : 'var(--text3)';
      const arrow = s.val > 0.5 ? '▲' : s.val < -0.5 ? '▼' : '–';
      html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;font-size:0.78rem"${s.m?' data-mblock':''}>
        <span style="color:var(--text3)"${s.m?` data-m="${s.m}" class="mk"`:''}>${s.name}</span>
        <span style="font-weight:500;color:${clr}">${arrow} ${sign}${s.val.toFixed(1)}%</span>
      </div>`;
    });
    html += `</div></div>`;
  }
  
  // Bloc trends + gap-from-national — two compact history charts (replaces old gap table)
  let panelHist = null;
  if(nationalData){
    const histKeys = Object.keys(nationalData).sort((a,b)=>parseInt(a)-parseInt(b));
    const rows = [];
    histKeys.forEach(k => {
      let locEd = getElectionData(p, k);
      if(!locEd) return;
      locEd = adjustBlocForYamina(locEd, p.name, k);
      const natEl = getAdjustedNationalData(k);
      if(!natEl) return;
      const cla = locEd.center_left_arab_pct || 0;
      rows.push({el:k, rh: locEd.right_haredi_pct || 0, cla: cla, gap: cla - (natEl.center_left_arab_pct || 0)});
    });
    if(rows.length > 1){
      panelHist = rows;
      const totalChange = rows[rows.length-1].gap - rows[0].gap;
      const trendDir = totalChange > 0.5 ? '(שמאלה)' : totalChange < -0.5 ? '(ימינה)' : '(יציב)';
      const trendColor = totalChange > 0.5 ? 'var(--left)' : totalChange < -0.5 ? 'var(--right)' : 'var(--text3)';
      html += `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
        <div style="font-size:0.8rem;color:var(--text3);margin-bottom:6px">מגמות היסטוריות — גושים</div>
        <div style="height:115px"><canvas id="panelTrendChart"></canvas></div>
        <div style="font-size:0.8rem;color:var(--text3);margin:14px 0 2px" data-m="natgap" class="mk">פער מהארץ (מרכז-שמאל-ערבים)</div>
        <div style="font-size:0.72rem;color:${trendColor};text-align:center;margin-bottom:6px">מגמה כוללת: ${totalChange > 0 ? '+' : ''}${totalChange.toFixed(1)}% ${trendDir}</div>
        <div style="height:115px"><canvas id="panelGapChart"></canvas></div>
      </div>`;
    }
  }

  // Sub-blocs — always show
  {
    const subs = [
      {name:'ימין',val:ed.right_pct||0,color:'var(--right)'},
      {name:'חרדים',val:ed.haredi_pct||0,color:'var(--haredi)'},
      {name:'מרכז',val:ed.center_pct||0,color:'var(--center)'},
      {name:'שמאל',val:ed.left_pct||0,color:'var(--left)'},
      {name:'ערבים',val:ed.arab_pct||0,color:'var(--arab)'},
    ];
    if(parseInt(currentElection) >= 21){
      subs.push({name:'ימין אופוזיציוני',val:ed.opposition_right_pct||0,color:'var(--opp)', m:'opp'});
    }
    html += '<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">';
    html += '<div style="font-size:0.8rem;color:var(--text3);margin-bottom:8px" data-m="blocs" class="mk">פירוט גושים</div>';
    subs.forEach(b => {
      html += `<div class="bloc-bar"${b.m?' data-mblock':''}>
        <div class="bloc-label"><span class="bloc-name${b.m?' mk':''}"${b.m?` data-m="${b.m}"`:''}>${b.name}</span><span class="bloc-val" style="color:${b.color}">${b.val.toFixed(1)}%</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${b.val}%;background:${b.color}"></div></div>
      </div>`;
    });
    html += '</div>';
  }
  
  // Religion data
  if(p.religion){
    const r = p.religion;
    html += `<div class="history-section">
      <div class="history-title mk" data-m="rel2019">דמוגרפיה (2019)</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:0.8rem">`;
    if(r.pct_jews > 0) html += `<div style="color:var(--text2)">יהודים: <b>${r.pct_jews.toFixed(1)}%</b></div>`;
    if(r.pct_arabs > 0) html += `<div style="color:var(--text2)">ערבים: <b>${r.pct_arabs.toFixed(1)}%</b></div>`;
    if(r.pct_muslims > 0) html += `<div style="color:var(--text2)">מוסלמים: <b>${r.pct_muslims.toFixed(1)}%</b></div>`;
    if(r.pct_druze > 0) html += `<div style="color:var(--text2)">דרוזים: <b>${r.pct_druze.toFixed(1)}%</b></div>`;
    if(r.pct_russians > 0.5) html += `<div style="color:var(--text2)">ללא סיווג: <b>${r.pct_russians.toFixed(1)}%</b></div>`;
    html += `</div></div>`;
  }
  
  // Party breakdown
  const partyData = findPartyData(p.name, currentElection);
  if(partyData && partyNational && partyNational[currentElection]){
    const partyList = partyNational[currentElection].party_list || [];
    const BLOC_COLORS = {right:'var(--right)',haredi:'var(--haredi)',center:'var(--center)',left:'var(--left)',arab:'var(--arab)',opposition_right:'var(--opp)'};
    
    // Build sorted party results (filter out meta keys like opposition_right_pct)
    const partyCodes = new Set(partyList.map(p=>p.code));
    const partyResults = Object.entries(partyData)
      .filter(([code, pct]) => partyCodes.has(code) && pct > 0)
      .sort((a,b) => b[1] - a[1]);
    
    if(partyResults.length > 0){
      const maxPct = partyResults[0][1];
      const initialShow = 5;
      const hasMore = partyResults.length > initialShow;
      
      html += `<div class="party-section">`;
      html += `<div class="party-section-title"><span>פילוג מפלגתי</span><span style="font-size:0.7rem;color:var(--text3)">${partyResults.length} מפלגות</span></div>`;
      
      const selCodes = new Set();
      if((currentMode === 'party' || currentMode === 'duel') && selectedPartyCode)
        selCodes.add(codeForElection(selectedPartyCode, currentElection));
      if(currentMode === 'duel' && selectedPartyCode2)
        selCodes.add(codeForElection(selectedPartyCode2, currentElection));
      partyResults.forEach(([code, pct], idx) => {
        const partyInfo = partyList.find(p=>p.code===code);
        const name = partyInfo ? partyInfo.name : code;
        const bloc = partyInfo ? partyInfo.bloc : '';
        const color = BLOC_COLORS[bloc] || 'var(--text3)';
        const barWidth = (pct / maxPct) * 100;
        const isSel = selCodes.has(code);
        const rowStyle = (idx >= initialShow && hasMore && !isSel ? 'display:none;' : '')
          + (isSel ? 'background:rgba(255,255,255,0.08);border-radius:6px;padding:3px 5px;margin:0 -5px 6px;' : '');

        html += `<div class="party-row" data-party-extra style="${rowStyle}">
          <span class="party-name" title="${name}" ${isSel?'style="font-weight:700;color:#fff"':''}>${name}</span>
          <div class="party-bar-track">
            <div class="party-bar-fill" style="width:${barWidth}%;background:${color}"></div>
          </div>
          <span class="party-pct" style="color:${color}">${pct.toFixed(1)}%</span>
        </div>`;
      });
      
      if(hasMore){
        html += `<button class="show-more-btn" onclick="
          this.parentElement.querySelectorAll('[data-party-extra]').forEach(el=>el.style.display='');
          this.remove();
        ">הצג עוד ${partyResults.length - initialShow} מפלגות ▾</button>`;
      }
      html += `</div>`;
    }
  }

  // Party mode: this party in this locality across all elections (bars: locality, line: national)
  const histRows = (code) => Object.keys(KNESSET_YEARS).map(k => {
    const info = partyEraInfo(code, k);
    if(!info) return {k, share:null, nat:null, bloc:null, ename:null};
    const actual = codeForElection(code, k);
    const r = findPartyData(p.name, k);
    return {k, share: r ? (r[actual] || 0) : null,
      nat: partyNational?.[k]?.national?.[actual] ?? null, bloc: info.bloc, ename: info.name};
  });
  let partyHist = null, duelHist = null;
  if(currentMode === 'party' && selectedPartyCode && partyNational){
    const rows = histRows(selectedPartyCode);
    if(rows.some(r => r.share !== null && r.share > 0)){
      partyHist = rows;
      const cat = partyCatalog?.find(c => c.code === selectedPartyCode);
      html += `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
        <div style="font-size:0.8rem;color:var(--text3);margin-bottom:6px">${cat ? cat.name : ''} ביישוב לאורך השנים</div>
        <div style="height:120px"><canvas id="panelPartyChart"></canvas></div>
      </div>`;
    }
  } else if(currentMode === 'duel' && selectedPartyCode && selectedPartyCode2 && partyNational){
    const ra = histRows(selectedPartyCode), rb = histRows(selectedPartyCode2);
    if(ra.some(r => r.share > 0) || rb.some(r => r.share > 0)){
      duelHist = {ra, rb};
      const catA = partyCatalog?.find(c => c.code === selectedPartyCode);
      const catB = partyCatalog?.find(c => c.code === selectedPartyCode2);
      const {ca, cb} = duelColors();
      html += `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">
        <div style="font-size:0.8rem;color:var(--text3);margin-bottom:6px">
          <b style="color:${ca}">${catA ? catA.name : ''}</b> מול <b style="color:${cb}">${catB ? catB.name : ''}</b> ביישוב
        </div>
        <div style="height:120px"><canvas id="panelDuelChart"></canvas></div>
      </div>`;
    }
  }

  bodyEl.innerHTML = html;

  // Render the two compact history charts (Chart.js)
  if(window._panelCharts){ window._panelCharts.forEach(ch => { try{ ch.destroy(); }catch(e){} }); }
  window._panelCharts = [];
  if(panelHist && window.Chart){
    const labels = panelHist.map(r => 'כ'+r.el);
    const xOpt = {ticks:{color:'#5a7194',font:{size:8},maxRotation:0,autoSkip:true,maxTicksLimit:7},grid:{display:false}};
    const tc = document.getElementById('panelTrendChart');
    if(tc) window._panelCharts.push(new Chart(tc.getContext('2d'), {
      type:'line',
      data:{labels, datasets:[
        {label:'ימין-חרדים', data:panelHist.map(r=>r.rh), borderColor:'#4a9eff', backgroundColor:'#4a9eff', borderWidth:2, pointRadius:1.5, tension:0.25},
        {label:'מרכז-שמאל-ערבים', data:panelHist.map(r=>r.cla), borderColor:'#e74c3c', backgroundColor:'#e74c3c', borderWidth:2, pointRadius:1.5, tension:0.25}
      ]},
      options:{responsive:true, maintainAspectRatio:false, interaction:{intersect:false,mode:'index'},
        plugins:{legend:{display:true,labels:{color:'#8ba3c7',boxWidth:10,font:{size:9},padding:6}}},
        scales:{y:{min:0,max:100,ticks:{color:'#5a7194',font:{size:8},stepSize:25,callback:v=>v+'%'},grid:{color:'rgba(255,255,255,0.06)'}}, x:xOpt}}
    }));
    const gc = document.getElementById('panelGapChart');
    if(gc) window._panelCharts.push(new Chart(gc.getContext('2d'), {
      type:'bar',
      data:{labels, datasets:[{data:panelHist.map(r=>r.gap),
        backgroundColor:panelHist.map(r=> r.el===currentElection ? (r.gap>=0?'#e74c3c':'#4a9eff') : (r.gap>=0?'rgba(231,76,60,0.55)':'rgba(74,158,255,0.55)'))}]},
      options:{responsive:true, maintainAspectRatio:false,
        plugins:{legend:{display:false}, tooltip:{callbacks:{label:cx=>(cx.raw>=0?'+':'')+(+cx.raw).toFixed(1)+'%'}}},
        scales:{y:{ticks:{color:'#5a7194',font:{size:8},callback:v=>(v>=0?'+':'')+v},grid:{color:'rgba(255,255,255,0.06)'}}, x:xOpt}}
    }));
  }

  // Party history chart (party mode)
  if(partyHist && window.Chart){
    const hexA = (hex, a) => {
      const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
      return `rgba(${r},${g},${b},${a})`;
    };
    const pc = document.getElementById('panelPartyChart');
    if(pc) window._panelCharts.push(new Chart(pc.getContext('2d'), {
      type:'bar',
      data:{labels: partyHist.map(r=>'כ'+r.k), datasets:[
        {type:'bar', label:'ביישוב', data:partyHist.map(r=>r.share), order:2,
         backgroundColor:partyHist.map(r=>{
           const c = BLOC_SOLID[r.bloc] || '#8ba3c7';
           return r.k === currentElection ? c : hexA(c, 0.55);
         })},
        {type:'line', label:'ארצי', data:partyHist.map(r=>r.nat), order:1,
         borderColor:'rgba(255,255,255,0.7)', backgroundColor:'rgba(255,255,255,0.7)',
         borderWidth:1.5, pointRadius:1.5, tension:0.2, spanGaps:false}
      ]},
      options:{responsive:true, maintainAspectRatio:false, interaction:{intersect:false,mode:'index'},
        plugins:{legend:{display:true,labels:{color:'#8ba3c7',boxWidth:10,font:{size:9},padding:6}},
          tooltip:{callbacks:{
            title:cx=>{const r=partyHist[cx[0].dataIndex]; return 'כ'+r.k+(r.ename?' · '+r.ename:' · לא התמודדה');},
            label:cx=>cx.dataset.label+': '+(cx.raw==null?'—':(+cx.raw).toFixed(1)+'%')}}},
        scales:{y:{min:0,ticks:{color:'#5a7194',font:{size:8},callback:v=>v+'%'},grid:{color:'rgba(255,255,255,0.06)'}},
                x:{ticks:{color:'#5a7194',font:{size:8},maxRotation:0,autoSkip:true,maxTicksLimit:7},grid:{display:false}}}}
    }));
  }

  // Duel history chart (duel mode): both parties' shares in this locality across elections
  if(duelHist && window.Chart){
    const dc = document.getElementById('panelDuelChart');
    const {ca, cb} = duelColors();
    const catA = partyCatalog?.find(c => c.code === selectedPartyCode);
    const catB = partyCatalog?.find(c => c.code === selectedPartyCode2);
    if(dc) window._panelCharts.push(new Chart(dc.getContext('2d'), {
      type:'line',
      data:{labels: duelHist.ra.map(r=>'כ'+r.k), datasets:[
        {label:catA ? catA.name : 'א', data:duelHist.ra.map(r=>r.share),
         borderColor:ca, backgroundColor:ca, borderWidth:2, pointRadius:1.5, tension:0.25, spanGaps:false},
        {label:catB ? catB.name : 'ב', data:duelHist.rb.map(r=>r.share),
         borderColor:cb, backgroundColor:cb, borderWidth:2, pointRadius:1.5, tension:0.25, spanGaps:false}
      ]},
      options:{responsive:true, maintainAspectRatio:false, interaction:{intersect:false,mode:'index'},
        plugins:{legend:{display:true,labels:{color:'#8ba3c7',boxWidth:10,font:{size:9},padding:6}},
          tooltip:{callbacks:{
            title:cx=>{
              const i = cx[0].dataIndex;
              const ea = duelHist.ra[i].ename, eb = duelHist.rb[i].ename;
              return 'כ' + duelHist.ra[i].k + ' · ' + (ea || '—') + ' מול ' + (eb || '—');
            },
            label:cx=>cx.dataset.label+': '+(cx.raw==null?'—':(+cx.raw).toFixed(1)+'%')}}},
        scales:{y:{min:0,ticks:{color:'#5a7194',font:{size:8},callback:v=>v+'%'},grid:{color:'rgba(255,255,255,0.06)'}},
                x:{ticks:{color:'#5a7194',font:{size:8},maxRotation:0,autoSkip:true,maxTicksLimit:7},grid:{display:false}}}}
    }));
  }
  
  // On mobile, auto-expand panel when locality is clicked
  if(window.innerWidth <= 768){
    document.getElementById('panel').classList.add('expanded');
  }
}

// === MOBILE PANEL TOGGLE + SHEET DRAG ===
const panelEl = document.getElementById('panel');
const panelHeader = panelEl.querySelector('.panel-header');
let sheetDragged = false;   // a drag that just ended must not also count as a tap

panelHeader.addEventListener('click', () => {
  if(sheetDragged) return;
  if(window.innerWidth <= 768){
    panelEl.classList.toggle('expanded');
  }
});

// Drag the handle: the sheet follows the finger, then snaps open/collapsed.
(function(){
  let active = false, startY = 0, startT = 0, collY = 0, curY = 0;
  panelHeader.addEventListener('pointerdown', e => {
    if(window.innerWidth > 768) return;
    active = true; sheetDragged = false;
    startY = e.clientY;
    collY = Math.max(0, panelEl.offsetHeight - 48);   // CSS collapsed offset: calc(100% - 48px)
    startT = panelEl.classList.contains('expanded') ? 0 : collY;
    curY = startT;
    panelEl.style.transition = 'none';
    panelHeader.setPointerCapture(e.pointerId);
  });
  panelHeader.addEventListener('pointermove', e => {
    if(!active) return;
    const dy = e.clientY - startY;
    if(Math.abs(dy) > 8) sheetDragged = true;
    curY = Math.max(0, Math.min(collY, startT + dy));
    panelEl.style.transform = 'translateY(' + curY + 'px)';
  });
  const end = () => {
    if(!active) return;
    active = false;
    panelEl.style.transition = '';
    panelEl.style.transform = '';   // hand control back to the CSS classes (animates)
    if(sheetDragged){
      const dy = curY - startT;
      if(startT === 0 && dy > 40) panelEl.classList.remove('expanded');
      else if(startT > 0 && dy < -40) panelEl.classList.add('expanded');
      setTimeout(() => { sheetDragged = false; }, 120);   // swallow the trailing click only
    }
  };
  panelHeader.addEventListener('pointerup', end);
  panelHeader.addEventListener('pointercancel', end);
})();

const searchInput = document.getElementById('searchInput');
const searchResults = document.getElementById('searchResults');

// One dropdown for both suggestion kinds: locality matches render instantly; address
// suggestions (Photon) are debounced in when the text is address-like or matches no locality.
function localityMatches(q){
  return geojsonData ? geojsonData.features.filter(f => f.properties.matched && f.properties.name.includes(q)) : [];
}

function renderSearchSug(q, addrSugs){
  const locs = localityMatches(q).slice(0, addrSugs && addrSugs.length ? 4 : 8);
  const addrs = addrSugs || [];
  if(!locs.length && !addrs.length){ searchResults.classList.remove('visible'); return; }

  searchResults.innerHTML = locs.map(f => {
    const p = f.properties;
    return `<div class="search-item" data-name="${escHtml(p.name)}">
      ${escHtml(p.name)}
      <div class="search-item-sub">${p.type} · ${(p.eligible||0).toLocaleString()} בעלי זכות</div>
    </div>`;
  }).join('') + addrs.map((s, i) =>
    `<div class="search-item${!i && locs.length ? ' sec' : ''}" data-sug="${i}">📍 ${escHtml(s.main)}${s.sub ? `<div class="search-item-sub">${escHtml(s.sub)}</div>` : ''}</div>`
  ).join('');

  searchResults.classList.add('visible');

  searchResults.querySelectorAll('.search-item').forEach(el => {
    el.addEventListener('click', () => {
      searchResults.classList.remove('visible');
      if(el.dataset.name !== undefined){
        const name = el.dataset.name;
        const feat = geojsonData.features.find(f=>f.properties.name===name);
        if(feat){
          selectedFeature = feat;
          updateMap();
          showPanel(feat);
          // Zoom to feature
          const layer = findLayer(name);
          if(layer) map.fitBounds(layer.getBounds(), {padding:[50,50], maxZoom:12});
          else { const cc = featureCentroid(feat); if(cc) map.setView(cc, Math.max(map.getZoom(), 11)); }
        }
        searchInput.value = name;
      } else {
        const s = addrs[+el.dataset.sug];
        searchInput.value = s.main;
        const ll = L.latLng(s.lat, s.lon);
        dropPin(ll, s.main + (s.sub ? ', ' + s.sub : ''));
        const feat = localityAt(ll);
        if(feat){ selectedFeature = feat; updateMap(); showPanel(feat); }
      }
    });
  });
}

searchInput.addEventListener('input', (e) => {
  const q = e.target.value.trim();
  if(sugTimer){ clearTimeout(sugTimer); sugTimer = null; }
  if(q.length < 2){searchResults.classList.remove('visible');return;}
  renderSearchSug(q, null);
  if(q.length >= 3 && (!localityMatches(q).length || /\d/.test(q)))
    sugTimer = setTimeout(async () => {
      const sugs = await photonSuggest(q);
      if(searchInput.value.trim() === q) renderSearchSug(q, sugs);   // stale guard — user kept typing
    }, 350);
});

searchInput.addEventListener('blur', () => {
  setTimeout(()=>searchResults.classList.remove('visible'), 200);
});

function findLayer(name){
  if(!geoLayer) return null;
  let found = null;
  geoLayer.eachLayer(l => {
    if(l.feature?.properties?.name === name) found = l;
  });
  return found;
}

// === ADDRESS SEARCH (Nominatim/OSM, keyless) ===
// Enter with no exact locality match geocodes the text as an Israeli address, drops a pin,
// and selects the locality the point falls in. The address is deliberately NOT written to
// the permalink hash — addresses are personal data and hashes are meant to be shared.
function pointInFeature(ll, f){
  const x = ll.lng, y = ll.lat;
  const inRing = ring => {
    let inside = false;
    for(let i = 0, j = ring.length - 1; i < ring.length; j = i++){
      const xi = ring[i][0], yi = ring[i][1], xj = ring[j][0], yj = ring[j][1];
      if(((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) inside = !inside;
    }
    return inside;
  };
  const polys = f.geometry.type === 'Polygon' ? [f.geometry.coordinates]
              : f.geometry.type === 'MultiPolygon' ? f.geometry.coordinates : [];
  return polys.some(rings => inRing(rings[0]) && rings.slice(1).every(h => !inRing(h)));
}

// smallest matched locality containing the point (guards against enclosing envelopes)
function localityAt(ll){
  let best = null, bestArea = Infinity;
  for(const f of geojsonData.features){
    if(!f.properties.matched || !pointInFeature(ll, f)) continue;
    let minx=Infinity,miny=Infinity,maxx=-Infinity,maxy=-Infinity;
    (function scan(co){
      if(typeof co[0] === 'number'){
        if(co[0]<minx)minx=co[0]; if(co[0]>maxx)maxx=co[0];
        if(co[1]<miny)miny=co[1]; if(co[1]>maxy)maxy=co[1];
      } else { for(const c of co) scan(c); }
    })(f.geometry.coordinates);
    const a = (maxx-minx)*(maxy-miny);
    if(a < bestArea){ bestArea = a; best = f; }
  }
  return best;
}

let addrMarker = null, addrBusy = false;
async function nominatim(params){
  const lang = document.documentElement.lang === 'en' ? 'en' : 'he';
  const res = await fetch('https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&countrycodes=il'
                        + '&accept-language=' + lang + '&' + params).then(r => r.json()).catch(() => []);
  return (res && res.length) ? res[0] : null;
}
async function searchAddress(q){
  if(addrBusy) return null;
  addrBusy = true;
  try{
    // ׳ = Hebrew geresh, ’ = curly quote — normalize both to ASCII apostrophe
    q = q.replace(/[\u05F3\u2019]/g, "'").replace(/\s+/g, ' ').trim();
    // Free-form Nominatim mis-scopes Israeli addresses (it happily returns the same street name
    // in another city), so parse street/city and query structured first. Accepted shapes:
    // "street number, city" and the Hebrew convention "street number city" (no comma).
    let street = null, city = null;
    const segs = q.split(',').map(s => s.trim()).filter(Boolean);
    if(segs.length >= 2){
      if(/^(israel|\u05D9\u05E9\u05E8\u05D0\u05DC)$/i.test(segs[segs.length - 1])) segs.pop();   // trailing "Israel"
      if(segs.length >= 2){ street = segs[0]; city = segs.slice(1).join(' '); }
    }
    if(street === null && segs.length === 1){
      const toks = q.split(' ');
      let numIdx = -1;   // last house-number-looking token: 16, 16a, 16 + Hebrew letter (א-ת)
      toks.forEach((t, i) => { if(/^\d+[\u05D0-\u05EAa-z]?$/i.test(t)) numIdx = i; });
      if(numIdx > 0 && numIdx < toks.length - 1){
        street = toks.slice(0, numIdx + 1).join(' ');
        city = toks.slice(numIdx + 1).join(' ');
      }
    }
    const attempts = [];
    if(street && city){
      attempts.push('street=' + encodeURIComponent(street) + '&city=' + encodeURIComponent(city));
      // "St"/"Rd" suffixes poison the geocoder — retry with them stripped
      const bare = street.replace(/\b(st\.?|street|rd\.?|road|blvd\.?|ave\.?|avenue)\b/gi, ' ').replace(/\s+/g, ' ').trim();
      if(bare && bare !== street) attempts.push('street=' + encodeURIComponent(bare) + '&city=' + encodeURIComponent(city));
    }
    attempts.push('q=' + encodeURIComponent(q));
    let hit = null;
    for(let i = 0; i < attempts.length && !hit; i++){
      if(i) await new Promise(r => setTimeout(r, 1100));   // Nominatim etiquette: max 1 req/sec
      hit = await nominatim(attempts[i]);
    }
    if(!hit) return null;
    const ll = L.latLng(+hit.lat, +hit.lon);
    if(addrMarker) map.removeLayer(addrMarker);
    dropPin(ll, hit.display_name.split(',').slice(0, 3).join(','));
    return ll;
  } catch(e){ return null; }
  finally { addrBusy = false; }
}

function dropPin(ll, label){
  if(addrMarker) map.removeLayer(addrMarker);
  addrMarker = L.marker(ll, {icon: L.divIcon({className:'addr-pin', html:'📍', iconSize:[30,30], iconAnchor:[15,28]})})
    .addTo(map)
    .bindTooltip(label, {direction:'top'});
  addrMarker.on('click', () => { map.removeLayer(addrMarker); addrMarker = null; });
  map.flyTo(ll, Math.max(map.getZoom(), 13));
}

// live address suggestions (Photon/OSM — built for search-as-you-type, which Nominatim's
// policy forbids). Returns coordinates directly, so a pick needs no second geocode.
let sugTimer = null;
const escHtml = s => String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
async function photonSuggest(q){
  const lang = document.documentElement.lang === 'en' ? 'en' : 'default';   // default = local (Hebrew) names
  const res = await fetch('https://photon.komoot.io/api/?q=' + encodeURIComponent(q)
                        + '&limit=6&lang=' + lang + '&bbox=34.2,29.4,35.9,33.4').then(r => r.json()).catch(() => null);
  if(!res || !res.features) return [];
  const seen = new Set(), out = [];
  for(const f of res.features){
    const p = f.properties;
    if(p.countrycode && p.countrycode !== 'IL') continue;   // bbox clips neighbors imperfectly
    const streetPart = [p.street || '', p.housenumber || ''].join(' ').trim();
    const main = (p.name && p.name !== p.street) ? p.name : (streetPart || p.name || '');
    if(!main) continue;
    const sub = [(p.name && p.name !== p.street && streetPart) ? streetPart : '', p.city || p.district || p.county || '']
      .filter(Boolean).join(' · ');
    const key = main + '|' + sub;
    if(seen.has(key)) continue;
    seen.add(key);
    out.push({main, sub, lat: f.geometry.coordinates[1], lon: f.geometry.coordinates[0]});
    if(out.length >= 5) break;
  }
  return out;
}

searchInput.addEventListener('keydown', async e => {
  // arrow keys walk the suggestion list; Enter picks the highlighted item
  const items = searchResults.classList.contains('visible') ? [...searchResults.querySelectorAll('.search-item')] : [];
  const cur = items.findIndex(el => el.classList.contains('kb'));
  if(e.key === 'ArrowDown' || e.key === 'ArrowUp'){
    if(!items.length) return;
    e.preventDefault();
    const nxt = e.key === 'ArrowDown' ? Math.min(cur + 1, items.length - 1) : Math.max(cur - 1, 0);
    items.forEach((el, i) => el.classList.toggle('kb', i === nxt));
    items[nxt].scrollIntoView({block:'nearest'});
    return;
  }
  if(e.key !== 'Enter') return;
  if(sugTimer){ clearTimeout(sugTimer); sugTimer = null; }
  if(cur >= 0){ e.preventDefault(); items[cur].click(); return; }
  const q = searchInput.value.trim();
  if(q.length < 3) return;
  const exact = geojsonData && geojsonData.features.find(f => f.properties.matched && f.properties.name === q);
  if(exact){   // exact locality name typed — behave like clicking its suggestion
    selectedFeature = exact; updateMap(); showPanel(exact);
    const layer = findLayer(q);
    if(layer) map.fitBounds(layer.getBounds(), {padding:[50,50], maxZoom:12});
    searchResults.classList.remove('visible');
    return;
  }
  searchResults.innerHTML = '<div class="search-item">🔍 מחפש כתובת…</div>';
  searchResults.classList.add('visible');
  const ll = await searchAddress(q);
  if(!ll){
    searchResults.innerHTML = '<div class="search-item">לא נמצאה כתובת בישראל</div>';
    setTimeout(() => searchResults.classList.remove('visible'), 2500);
    return;
  }
  searchResults.classList.remove('visible');
  const feat = localityAt(ll);
  if(feat){ selectedFeature = feat; updateMap(); showPanel(feat); }
});

// === LOAD DATA ===
// Name normalization for matching geojson names to party data names
function normalizeName(name){
  return name.replace(/[\s\-()\"']/g, '').replace(/׳/g,'');
}
// Per-election locality index, built lazily. Also converts the handful of raw-ballot-count rows
// (19 in K15, 3 each in K23-25 incl. Tel Aviv) to shares via the share-sum>150 rule — the same
// rule used by the analysis builds. Whole-map party coloring needs O(1) lookups, hence the index.
const PARTY_INDEX = {};
function getPartyIndex(k){
  if(!partyByLocality || !partyByLocality[k]) return null;
  if(PARTY_INDEX[k]) return PARTY_INDEX[k];
  const byName = {}, byNorm = {}, rows = [];
  for(const [name, raw] of Object.entries(partyByLocality[k])){
    let row = raw, sum = 0;
    for(const v of Object.values(raw)) if(typeof v === 'number') sum += v;
    if(sum > 150){
      row = {};
      for(const [c, v] of Object.entries(raw)) row[c] = (typeof v === 'number') ? v/sum*100 : v;
    }
    byName[name] = row;
    byNorm[normalizeName(name)] = row;
    rows.push(row);
  }
  return PARTY_INDEX[k] = {byName, byNorm, rows, keys: Object.keys(byName)};
}

const PARTY_RESOLVE = {}; // cache: 'k|name' -> row (or null), so time-lapse recolors stay fast
function findPartyData(localityName, electionKey){
  const idx = getPartyIndex(electionKey);
  if(!idx) return null;
  const ck = electionKey + '|' + localityName;
  if(ck in PARTY_RESOLVE) return PARTY_RESOLVE[ck];
  let hit = idx.byName[localityName] || idx.byNorm[normalizeName(localityName)] || null;
  if(!hit){
    // Partial match (first word)
    const firstWord = localityName.split(/[\s\-]/)[0];
    if(firstWord.length >= 3){
      for(const key of idx.keys){
        if(key.startsWith(firstWord) && Math.abs(key.length - localityName.length) < 5){ hit = idx.byName[key]; break; }
      }
    }
  }
  return PARTY_RESOLVE[ck] = hit;
}
