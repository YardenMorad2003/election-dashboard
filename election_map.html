<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מפת בחירות ישראל</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#070d18;--bg2:#0a1628;--card:rgba(15,31,61,0.85);
  --border:rgba(74,158,255,0.2);--text:#fff;--text2:#8ba3c7;--text3:#5a7194;
  --right:#4a9eff;--haredi:#9b59b6;--center:#2ecc71;
  --left:#e74c3c;--arab:#f39c12;--opp:#00bcd4;
}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
#map{position:absolute;top:0;left:0;right:0;bottom:0;z-index:1;background:#070d18}

/* Time-lapse year overlay */
.play-year{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);z-index:900;
  font-size:2.6rem;font-weight:800;color:rgba(255,255,255,0.9);
  text-shadow:0 2px 14px rgba(0,0,0,0.75);pointer-events:none;display:none;white-space:nowrap}

/* Guided tour — story card, tour picker, focus highlights (content from data/map_tours.json) */
.tour-card{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:1100; /* above legend/panel (1000-1001), below the site-nav dropdown (1200) */
  width:min(560px,calc(100vw - 32px));background:rgba(10,22,40,0.96);backdrop-filter:blur(20px);
  border:1px solid rgba(255,209,102,0.45);border-radius:14px;padding:14px 18px 12px;display:none;
  box-shadow:0 10px 34px rgba(0,0,0,0.55)}
.tour-card.open{display:block}
.tour-kicker{font-size:0.72rem;color:#ffd166;font-weight:700;letter-spacing:0.4px;margin-bottom:2px;
  display:flex;justify-content:space-between;align-items:center;gap:8px}
.tour-close{background:none;border:none;color:var(--text3);font-size:1rem;cursor:pointer;padding:2px 6px;border-radius:6px}
.tour-close:hover{color:#fff;background:rgba(255,255,255,0.08)}
.tour-title{font-size:1.05rem;font-weight:800;margin-bottom:6px;color:#fff}
.tour-text{font-size:0.86rem;line-height:1.55;color:var(--text2)}
.tour-nav{display:flex;align-items:center;justify-content:space-between;margin-top:10px;gap:10px}
.tour-dots{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.tour-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.22);cursor:pointer;border:none;padding:0}
.tour-dot.on{background:#ffd166}
.tour-btn{padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:rgba(255,255,255,0.06);
  color:var(--text);font-family:inherit;font-size:0.82rem;cursor:pointer;font-weight:600;white-space:nowrap}
.tour-btn:hover{border-color:#ffd166;color:#ffd166}
.tour-btn:disabled{opacity:0.35;cursor:default}
.tour-btn:disabled:hover{border-color:var(--border);color:var(--text)}
.tour-picker{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);z-index:1100;
  width:min(430px,calc(100vw - 32px));background:rgba(10,22,40,0.97);backdrop-filter:blur(20px);
  border:1px solid var(--border);border-radius:14px;padding:16px 18px;display:none;box-shadow:0 10px 34px rgba(0,0,0,0.55);
  max-height:min(560px,calc(100vh - var(--topbar-h,70px) - 40px));overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.tour-picker.open{display:block}
.tour-picker h3{font-size:0.98rem;margin-bottom:2px;color:#ffd166}
.tour-picker p{font-size:0.78rem;color:var(--text3);margin-bottom:10px}
.tour-pick-item{display:flex;width:100%;text-align:start;align-items:center;gap:8px;padding:9px 12px;margin-top:6px;
  border:1px solid var(--border);border-radius:10px;background:rgba(255,255,255,0.04);color:var(--text);
  font-family:inherit;font-size:0.86rem;cursor:pointer}
.tour-pick-item:hover{border-color:#ffd166;color:#ffd166}
.tour-focus{pointer-events:none}
.tour-ring{position:relative;width:22px;height:22px;border:3px solid #ffd166;border-radius:50%;
  box-shadow:0 0 10px rgba(255,209,102,0.6);margin:0 auto}
.tour-ring::after{content:'';position:absolute;inset:-3px;border:3px solid #ffd166;border-radius:50%;
  animation:tourPulse 1.6s ease-out infinite}
.tour-focus-label{display:table;margin:3px auto 0;background:rgba(10,22,40,0.88);border:1px solid rgba(255,209,102,0.6);
  border-radius:6px;padding:2px 7px;font-size:0.72rem;font-weight:700;color:#ffd166;white-space:nowrap}
@keyframes tourPulse{0%{transform:scale(0.8);opacity:1}100%{transform:scale(1.9);opacity:0}}
/* Explain-this-view: ❓ in the legend, plain-language mode explanations from data/map_help.json */
.help-btn{position:absolute;top:8px;inset-inline-end:8px;width:22px;height:22px;border-radius:50%;
  border:1px solid var(--border);background:rgba(255,255,255,0.07);color:var(--text3);font-size:0.8rem;
  font-weight:700;cursor:pointer;line-height:1;padding:0}
.help-btn:hover{color:#ffd166;border-color:#ffd166}
.help-pop{display:none;position:absolute;bottom:calc(100% + 8px);left:0;width:340px;max-width:74vw; /* physical left: the legend hugs the viewport's left on both the RTL and LTR pages */
  background:rgba(10,22,40,0.97);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:10px;
  padding:12px 14px;font-size:0.8rem;line-height:1.55;color:var(--text2);box-shadow:0 8px 24px rgba(0,0,0,0.5);z-index:1101}
.help-pop.open{display:block}
.help-display{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);color:var(--text3);font-size:0.75rem}
@media (max-width:640px){
  .tour-card,.tour-picker{bottom:8px;width:calc(100vw - 16px)}
  .tour-text{font-size:0.8rem;max-height:26vh;overflow-y:auto}
}

/* Top bar */
.topbar{position:absolute;top:0;left:0;right:0;z-index:1002; /* above .panel(1000/1001) so the Site-pages dropdown isn't buried behind an open locality panel */
  background:linear-gradient(180deg,rgba(10,22,40,0.95) 0%,rgba(10,22,40,0.8) 80%,transparent 100%);
  padding:12px 20px 24px;display:flex;flex-wrap:wrap;align-items:center;gap:10px 16px;pointer-events:none}
.topbar>*{pointer-events:auto}
.logo{font-size:1.3rem;font-weight:800;
  background:linear-gradient(135deg,#fff 0%,#4a9eff 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
.election-pills{display:flex;gap:4px;flex-wrap:wrap}
.pill{padding:5px 10px;border:1px solid var(--border);border-radius:8px;background:rgba(15,31,61,0.6);
  color:var(--text2);font-family:inherit;font-size:0.8rem;cursor:pointer;transition:all .2s}
.pill:hover{background:rgba(74,158,255,0.15);color:#fff}
.pill.active{background:var(--right);color:#fff;border-color:var(--right)}

/* Color mode selector */
.mode-select{display:flex;flex-wrap:wrap;gap:4px;margin-right:auto}
.mode-btn{padding:5px 12px;border:1px solid var(--border);border-radius:8px;background:rgba(15,31,61,0.6);
  color:var(--text2);font-family:inherit;font-size:0.78rem;cursor:pointer;transition:all .2s;white-space:nowrap}
.mode-btn:hover{background:rgba(74,158,255,0.15)}
.mode-btn.active{background:rgba(74,158,255,0.2);color:#fff;border-color:var(--right)}
/* "more modes" collapse */
.mode-more{display:none;gap:4px;flex-wrap:wrap}
.mode-more.open{display:flex}

/* Site navigation dropdown (hidden when embedded in the dashboard iframe) */
.mapnav{position:relative}
.mapnav summary{list-style:none;padding:5px 12px;border:1px solid var(--border);border-radius:8px;
  background:rgba(15,31,61,0.6);color:var(--text2);font-size:0.78rem;cursor:pointer;
  transition:all .2s;white-space:nowrap;user-select:none}
.mapnav summary::-webkit-details-marker{display:none}
.mapnav summary:hover{background:rgba(74,158,255,0.15);color:#fff}
.mapnav[open] summary{background:rgba(74,158,255,0.2);color:#fff;border-color:var(--right)}
.mapnav nav{position:absolute;top:calc(100% + 6px);inset-inline-start:auto;inset-inline-end:0;z-index:1200;min-width:185px; /* anchor to the button's inline-end: the button sits at the row's end, so a start-anchored menu overflows the viewport on wide windows */
  background:rgba(10,22,40,0.97);backdrop-filter:blur(16px);border:1px solid var(--border);
  border-radius:10px;padding:6px;display:flex;flex-direction:column;gap:2px;box-shadow:0 8px 24px rgba(0,0,0,0.5)}
.mapnav nav a{color:var(--text2);text-decoration:none;padding:6px 10px;border-radius:7px;
  font-size:0.82rem;white-space:nowrap;transition:all .15s}
.mapnav nav a:hover{background:rgba(74,158,255,0.15);color:#fff}
.mapnav nav a.on{color:#fff;background:rgba(74,158,255,0.18)}

/* Yamina toggle */
.yamina-toggle{display:flex;gap:4px;padding:2px 6px;border:1px solid rgba(255,165,0,0.3);border-radius:8px;background:rgba(255,165,0,0.06)}
.yamina-toggle .mode-btn{font-size:0.72rem;padding:4px 8px;border-color:rgba(255,165,0,0.3)}
.yamina-toggle .mode-btn.active{background:rgba(255,165,0,0.25);border-color:rgba(255,165,0,0.6);color:#ffc107}

/* Info panel — top offsets follow the topbar's real height (it wraps to 2-3 rows on short/narrow
   viewports and when the "more modes" row is open); --topbar-h is kept current by a ResizeObserver */
.panel{position:absolute;top:calc(var(--topbar-h,70px) + 10px);right:16px;z-index:1000;width:320px;max-height:calc(100vh - var(--topbar-h,70px) - 30px);
  overflow-y:auto;background:var(--card);backdrop-filter:blur(20px);border:1px solid var(--border);
  border-radius:14px;padding:0;transition:transform .3s;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.panel::-webkit-scrollbar{width:6px}
.panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.panel.collapsed{transform:translateX(340px)}
.panel-toggle{position:absolute;top:calc(var(--topbar-h,70px) + 10px);right:16px;z-index:1001;width:36px;height:36px;
  border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--text2);
  font-size:1.2rem;cursor:pointer;display:none;align-items:center;justify-content:center}
.panel.collapsed~.panel-toggle{display:flex;right:16px}

.panel-header{padding:16px;border-bottom:1px solid var(--border);position:sticky;top:0;
  background:rgba(10,22,40,0.95);backdrop-filter:blur(20px);z-index:2}
.panel-title{font-size:1.1rem;font-weight:700;margin-bottom:2px}
.panel-subtitle{font-size:0.8rem;color:var(--text3)}
.panel-body{padding:16px}

/* Metric explainers: dotted labels are tappable (content: map_help.json "metrics") */
[data-m]{cursor:help}
.mk{text-decoration:underline dotted;text-underline-offset:2px}
.mnote{font-size:.75rem;color:var(--text3);line-height:1.5;background:rgba(255,255,255,0.04);border-radius:6px;padding:6px 8px;margin:4px 0 10px}
.mhint{font-size:.68rem;color:var(--text3)}

/* Bloc bars */
.bloc-bar{margin-bottom:12px}
.bloc-label{display:flex;justify-content:space-between;font-size:0.82rem;margin-bottom:4px}
.bloc-name{color:var(--text2)}
.bloc-val{font-weight:600}
.bar-track{height:8px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s ease}

/* Mini chart (sparkline area) */
.history-section{margin-top:16px;border-top:1px solid var(--border);padding-top:12px}
.history-title{font-size:0.85rem;color:var(--text2);margin-bottom:8px}
.sparkline-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.spark-label{font-size:0.75rem;color:var(--text3);width:65px;text-align:left}
.spark-bar-track{flex:1;height:6px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden;position:relative}
.spark-bar{height:100%;border-radius:3px;transition:width .4s}

/* Legend */
.legend{position:absolute;bottom:24px;left:16px;z-index:1000;background:var(--card);
  backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:10px;padding:16px 20px;min-width:280px}
.legend-title{font-size:0.85rem;color:var(--text2);margin-bottom:10px;font-weight:500}
.legend-gradient{height:14px;border-radius:7px;margin-bottom:6px}
.legend-labels{display:flex;justify-content:space-between;font-size:0.75rem;color:var(--text3);direction:ltr}
input[type=range]{-webkit-appearance:none;appearance:none;background:rgba(255,255,255,0.1);border-radius:3px;height:5px;outline:none;margin:0;cursor:pointer;direction:ltr /* match the LTR 0%->100% gradient above it, also on the RTL page */}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 0 4px rgba(0,0,0,0.4)}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#fff;cursor:pointer;border:none;box-shadow:0 0 4px rgba(0,0,0,0.4)}

/* Search (z 999: must paint below the topbar's site-nav dropdown, which lives in the topbar's z-1000 stacking context) */
.search-box{position:absolute;top:calc(var(--topbar-h,70px) + 10px);left:16px;z-index:999}
.search-input{width:260px;padding:10px 14px;border:1px solid var(--border);border-radius:10px;
  background:var(--card);backdrop-filter:blur(20px);color:var(--text);font-family:inherit;
  font-size:0.9rem;outline:none;direction:rtl}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{border-color:var(--right)}
.search-results{margin-top:4px;background:var(--card);border:1px solid var(--border);
  border-radius:10px;max-height:240px;overflow-y:auto;display:none}
.search-results.visible{display:block}
.search-item{padding:8px 14px;cursor:pointer;font-size:0.85rem;border-bottom:1px solid rgba(74,158,255,0.1)}
.search-item:hover{background:rgba(74,158,255,0.1)}
.search-item:last-child{border-bottom:none}
.search-item-sub{font-size:0.72rem;color:var(--text3)}
.search-item.sec{border-top:1px solid var(--border)}
.search-item.kb{background:rgba(74,158,255,0.18)}
.addr-pin{font-size:26px;line-height:1;text-align:center;text-shadow:0 2px 6px rgba(0,0,0,.65);cursor:pointer}

/* Party picker (party / duel color modes) */
.party-picker{position:absolute;top:calc(var(--topbar-h,70px) + 4px);left:50%;transform:translateX(-50%);z-index:1000;display:none;
  gap:6px;align-items:center;flex-wrap:wrap;justify-content:center}
.party-select{padding:8px 14px;border:1px solid var(--border);border-radius:10px;background:var(--card);
  backdrop-filter:blur(20px);color:var(--text);font-family:inherit;font-size:0.85rem;outline:none;
  cursor:pointer;max-width:320px;direction:rtl}
.party-select:focus{border-color:var(--right)}
.party-select option{background:#0a1628;color:#fff}
.party-submodes{display:flex;gap:4px;padding:2px 6px;border:1px solid var(--border);border-radius:8px;background:var(--card);backdrop-filter:blur(20px)}
#pmSubmodes{flex-wrap:wrap}  /* 7 buttons — wrap on desktop; the mobile block turns this into one scrollable row */
.duel-vs{color:var(--text2);font-size:0.85rem;font-weight:600;padding:0 2px}

/* Stronghold labels (party mode top-10) */
.stronghold-label{background:rgba(10,22,40,0.85);border:1px solid rgba(255,255,255,0.3);border-radius:6px;
  padding:2px 7px;font-size:0.68rem;font-weight:600;color:#fff;white-space:nowrap;
  transform:translate(-50%,-140%);width:max-content;box-shadow:0 2px 8px rgba(0,0,0,0.5)}

/* Winner-mode legend swatches */
.lg-sw{display:flex;align-items:center;gap:7px;font-size:0.78rem;color:var(--text2);margin-bottom:4px}
.lg-sw b{margin-right:auto;color:#fff;font-weight:600}
.lg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* Leaflet overrides */
.leaflet-control-zoom{border:1px solid var(--border)!important;border-radius:8px!important;overflow:hidden}
.leaflet-control-zoom a{background:var(--card)!important;color:var(--text2)!important;border-color:var(--border)!important}
.leaflet-control-zoom a:hover{background:rgba(74,158,255,0.2)!important}
/* Leaflet's top-left corner sits under the floating topbar — push it below the search box
   (which is at --topbar-h + 10 and ~42px tall; the control adds its own 10px margin) */
.leaflet-top.leaflet-left{top:calc(var(--topbar-h,70px) + 52px)}

/* Party bars */
.party-section{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.party-section-title{font-size:0.8rem;color:var(--text3);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.party-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.party-name{font-size:0.78rem;color:var(--text2);width:100px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.party-bar-track{flex:1;height:7px;background:rgba(255,255,255,0.04);border-radius:4px;overflow:hidden}
.party-bar-fill{height:100%;border-radius:4px;transition:width .4s}
.party-pct{font-size:0.75rem;color:var(--text);width:42px;text-align:left;flex-shrink:0;font-weight:500}
.party-threshold-line{position:absolute;right:0;top:0;bottom:0;width:1px;background:rgba(255,255,255,0.15)}
.show-more-btn{display:block;margin:8px auto 0;padding:4px 14px;border:1px solid var(--border);border-radius:6px;
  background:rgba(15,31,61,0.6);color:var(--text2);font-family:inherit;font-size:0.75rem;cursor:pointer;transition:all .2s}
.show-more-btn:hover{background:rgba(74,158,255,0.15);color:#fff}

/* ========== MOBILE ========== */
@media (max-width: 768px) {
  .topbar{
    flex-wrap:wrap;gap:4px;padding:6px 8px 10px;
  }
  .logo{font-size:0.9rem;width:auto;flex-shrink:0}
  
  /* Election pills: horizontal scroll */
  .election-pills{
    display:flex;flex-wrap:nowrap;gap:3px;
    overflow-x:auto;-webkit-overflow-scrolling:touch;
    scrollbar-width:none;width:100%;
  }
  .election-pills::-webkit-scrollbar{display:none}
  .pill{padding:3px 6px;font-size:0.65rem;white-space:nowrap;flex-shrink:0}
  
  /* Mode buttons: horizontal scroll */
  .mode-select{
    display:flex;flex-wrap:nowrap;gap:3px;
    overflow-x:auto;-webkit-overflow-scrolling:touch;
    scrollbar-width:none;width:100%;margin-right:0;
  }
  .mode-select::-webkit-scrollbar{display:none}
  .mode-btn{padding:3px 7px;font-size:0.62rem;white-space:nowrap;flex-shrink:0}
  
  /* Yamina toggle mobile */
  .yamina-toggle{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;width:100%}
  .yamina-toggle::-webkit-scrollbar{display:none}
  .yamina-toggle .mode-btn{font-size:0.6rem;padding:3px 6px}
  
  /* Panel becomes bottom sheet */
  .panel{
    position:fixed;top:auto;bottom:0;right:0;left:0;
    width:100%;max-height:55vh;
    border-radius:14px 14px 0 0;
    transform:translateY(calc(100% - 48px));
    transition:transform .3s ease;
    z-index:1001;
  }
  .panel.expanded{transform:translateY(0)}
  .panel-header{
    cursor:pointer;padding:10px 16px;
    display:flex;flex-wrap:wrap;align-items:center;gap:4px;
    touch-action:none;   /* vertical drags belong to the sheet, not page scroll */
  }
  .panel-header::before{
    content:'';display:block;width:40px;height:4px;
    background:rgba(255,255,255,0.3);border-radius:2px;
    margin:0 auto 6px;flex-basis:100%;
  }
  .panel-body{padding:10px}
  
  /* Search — stops short of the legend corridor on the right */
  .search-box{top:auto;bottom:60px;left:10px;right:158px;z-index:1000}
  .search-input{width:100%;font-size:0.82rem;padding:8px 10px}
  .search-results{max-height:160px}

  /* Party/PM picker mobile: above the search box, clear of the legend corridor.
     Each button group collapses to ONE horizontally-scrollable row (the PM mode
     has 7 submodes — wrapped rows grew tall enough to dive under the legend). */
  .party-picker{top:auto;bottom:104px;left:10px;right:158px;transform:none}
  .party-select{width:100%;max-width:none;font-size:0.8rem;padding:7px 10px}
  .party-picker .party-submodes, #pmSubmodes{
    flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;
    scrollbar-width:none;max-width:100%;
  }
  .party-picker .party-submodes::-webkit-scrollbar{display:none}

  /* Legend — min-width:0 is load-bearing: the desktop min-width:280px otherwise
     beats max-width and the legend buries everything to its left */
  .legend{bottom:60px;left:auto;right:10px;padding:6px 10px;min-width:0;max-width:140px}
  .legend-title{font-size:0.65rem;margin-bottom:3px}
  .legend-gradient{height:6px}
  .legend-labels{font-size:0.58rem}
  
  /* Hide search when panel is expanded to avoid overlap */
  .panel.expanded ~ .search-box{display:none}
  .panel.expanded ~ .legend{display:none}

<script>
// === CONFIG ===
const KNESSET_YEARS = {13:1992,14:1996,15:1999,16:2003,17:2006,18:2009,19:2013,20:2015,21:2019,22:2019,23:2020,24:2021,25:2022};
const COLOR_MODES = [
  {id:'bloc',label:'גוש',field:'right_haredi_pct',colors:['#4a9eff','#e74c3c'],legendL:'100% ימין-חרדים',legendR:'100% מרכז-שמאל-ערבים'},
  {id:'pm',label:'בחירה ישירה',field:'_pm',colors:['#4a9eff','#e74c3c'],legendL:'',legendR:''},
  {id:'swing',label:'סווינג',field:'_swing',colors:['#e74c3c','#4a9eff'],legendL:'סווינג שמאלה',legendR:'סווינג ימינה'},
  {id:'gap',label:'פער מהארץ',field:'_gap',colors:['#e74c3c','#4a9eff'],legendL:'יותר מרכז-שמאל מהארץ',legendR:'יותר ימין-חרדים מהארץ'},
  {id:'gap_change',label:'שינוי פער',field:'_gap_change',colors:['#e74c3c','#4a9eff'],legendL:'התרחק שמאלה',legendR:'התרחק ימינה'},
  {id:'right',label:'ימין',field:'right_pct',colors:['#0d1b2a','#1e90ff'],legendL:'0%',legendR:'100% ימין'},
  {id:'haredi',label:'חרדים',field:'haredi_pct',colors:['#0d1520','#c27aed'],legendL:'0%',legendR:'100% חרדים'},
  {id:'arab',label:'ערבים',field:'arab_pct',colors:['#1a1408','#f5b731'],legendL:'0%',legendR:'100% ערבים'},
  {id:'left',label:'שמאל',field:'left_pct',colors:['#1a0d0d','#ff4444'],legendL:'0%',legendR:'100% שמאל'},
  {id:'center',label:'מרכז',field:'center_pct',colors:['#0a1a0f','#27d969'],legendL:'0%',legendR:'100% מרכז'},
  {id:'opp_right',label:'ימין אופוזיציוני',field:'opposition_right_pct',colors:['#0a1618','#00e5ff'],legendL:'0%',legendR:'100% ימין אופוזיציוני'},
  {id:'party',label:'מפלגה',field:'_party',colors:['#0d1b2a','#1e90ff'],legendL:'0%',legendR:''},
  {id:'winner',label:'מפלגה מנצחת',field:'_winner',colors:['#0d1b2a','#1e90ff'],legendL:'',legendR:''},
  {id:'duel',label:'ראש בראש',field:'_duel',colors:['#0d1b2a','#1e90ff'],legendL:'',legendR:''},
  {id:'turnout',label:'שיעור הצבעה',field:'_turnout',colors:['#1a0a0a','#2ecc71'],legendL:'0%',legendR:'100% הצבעה'},
  {id:'turnout_change',label:'שינוי בשיעור ההצבעה',field:'_turnout_change',colors:['#e74c3c','#2ecc71'],legendL:'ירידה',legendR:'עלייה'},
];

const PREV_ELECTION = {14:'13',15:'14',16:'15',17:'16',18:'17',19:'18',20:'19',21:'20',22:'21',23:'22',24:'23',25:'24'};

// Get election data for a given election key from a feature's properties
function getElectionData(props, elKey){
  if(elKey === props.latest_election){
    return {
      right_haredi_pct: props.right_haredi_pct, center_left_arab_pct: props.center_left_arab_pct,
      right_pct: props.right_pct, haredi_pct: props.haredi_pct,
      center_pct: props.center_pct, left_pct: props.left_pct,
      arab_pct: props.arab_pct, opposition_right_pct: props.opposition_right_pct||0,
      eligible: props.eligible, kosher_votes: props.kosher_votes, bzb: props.bzb,
      voters: props.voters, turnout_pct: props.turnout_pct
    };
  }
  const ed = props.elections?.[elKey];
  return ed ? Object.assign({}, ed) : null;
}

// Calculate swing between current and previous election for a locality
function getSwing(props){
  const prevKey = PREV_ELECTION[currentElection];
  if(!prevKey) return null;
  let curr = getElectionData(props, currentElection);
  let prev = getElectionData(props, prevKey);
  if(!curr || !prev) return null;
  curr = adjustBlocForYamina(curr, props.name, currentElection);
  prev = adjustBlocForYamina(prev, props.name, prevKey);
  return {
    right_haredi: (curr.right_haredi_pct||0) - (prev.right_haredi_pct||0),
    center_left_arab: (curr.center_left_arab_pct||0) - (prev.center_left_arab_pct||0),
    right: (curr.right_pct||0) - (prev.right_pct||0),
    haredi: (curr.haredi_pct||0) - (prev.haredi_pct||0),
    center: (curr.center_pct||0) - (prev.center_pct||0),
    left: (curr.left_pct||0) - (prev.left_pct||0),
    arab: (curr.arab_pct||0) - (prev.arab_pct||0),
    opposition_right: (curr.opposition_right_pct||0) - (prev.opposition_right_pct||0),
    prevKey
  };
}

// Calculate gap from national average for a locality
function getGap(props, elKey){
  if(!nationalData) return null;
  const natEl = getAdjustedNationalData(elKey || currentElection);
  if(!natEl) return null;
  let ed = getElectionData(props, elKey || currentElection);
  if(!ed) return null;
  ed = adjustBlocForYamina(ed, props.name, elKey || currentElection);
  // Gap = locality center_left_arab - national center_left_arab (positive = more left than country)
  const localCLA = ed.center_left_arab_pct || 0;
  const natCLA = natEl.center_left_arab_pct || 0;
  return {
    gap: localCLA - natCLA,       // positive = more center-left-arab than national
    localPct: localCLA,
    nationalPct: natCLA
  };
}

// Calculate change in gap from previous election
function getGapChange(props){
  const prevKey = PREV_ELECTION[currentElection];
  if(!prevKey) return null;
  const currGap = getGap(props, currentElection);
  const prevGap = getGap(props, prevKey);
  if(!currGap || !prevGap) return null;
  return currGap.gap - prevGap.gap; // positive = moved more left relative to country
}

let currentElection = '25';
let currentMode = 'bloc';
let geoLayer = null;
let bubbleLayer = null;
let displayMode = 'polygons';
let geojsonData = null;
let selectedFeature = null;
let partyByLocality = null;
let partyNational = null;
let nationalData = null; // national averages from core.json
let filterRange = 0; // single threshold value. For dual modes: -100 to +100 (0=show all). For simple modes: 0 to 100 (0=show all).
let selectedPartyCode = null;  // canonical party code for the 'party' color mode
let selectedPartyCode2 = null; // second party for 'duel' mode
let partySubmode = 'share';    // 'share' | 'swing' | 'gap' — sub-view within party mode
let partyLabelMode = 'strongholds'; // 'strongholds' (top-10 local share) | 'contrib' (top-10 share of the party's NATIONAL vote)
let partyCatalog = null;       // union of party_list across elections, keyed by canonical code

// === DIRECT PM ELECTIONS (1996/1999/2001) ===
// data/pm_direct.json (built by analysis/build_pm_direct.py): loc[<geo name>][year] =
// [rightVotes, leftVotes, voted, registered]. 96/99 were held together with K14/K15
// (kn = the concurrent Knesset, used by the split submode); 2001 was a PM-only special
// election during K15 — no same-day Knesset vote, so no split view for it.
const PM_CONTESTS = {
  '1996': {kn:'14', concurrent:true,  right:'בנימין נתניהו', left:'שמעון פרס', rShort:'נתניהו', lShort:'פרס'},
  '1999': {kn:'15', concurrent:true,  right:'בנימין נתניהו', left:'אהוד ברק',  rShort:'נתניהו', lShort:'ברק'},
  '2001': {kn:'15', concurrent:false, right:'אריאל שרון',   left:'אהוד ברק',  rShort:'שרון',   lShort:'ברק'},
};
// Previous direct contest, for the swing submode (1996 has no predecessor)
const PM_PREV = {'1999':'1996', '2001':'1999'};
let pmData = null;        // parsed pm_direct.json
let pmContest = '1996';   // '1996' | '1999' | '2001'
let pmSubmode = 'vote';   // 'vote' | 'swing' | 'gap' | 'turnout' | 'split' (PM vs concurrent Knesset)

function pmRow(name, year){
  return pmData?.loc?.[name]?.[year || pmContest] || null;
}
// Two-way candidate shares for a locality row; null when no data
function pmShares(row){
  if(!row) return null;
  const valid = row[0] + row[1];
  if(valid <= 0) return null;
  return {r2: row[0]/valid*100, l2: row[1]/valid*100, valid, voted: row[2], registered: row[3]};
}
// National two-way shares from the official candidate totals
function pmNational(year){
  const c = pmData?.contests?.[year || pmContest];
  if(!c) return null;
  const tot = c.right_votes + c.left_votes;
  return {r2: c.right_votes/tot*100, l2: c.left_votes/tot*100,
          rightVotes: c.right_votes, leftVotes: c.left_votes};
}
// Split-ticket value: PM right-candidate two-way % minus the concurrent Knesset's
// right-haredi two-BLOC % (both normalized to their two-way race, so they're comparable).
// Positive = the locality voted for the right's PM candidate MORE than for its Knesset bloc.
function pmSplitValue(props){
  const meta = PM_CONTESTS[pmContest];
  if(!meta.concurrent) return null;
  const s = pmShares(pmRow(props.name));
  if(!s) return null;
  const ed = getElectionData(props, meta.kn);
  if(!ed) return null;
  const rh = ed.right_haredi_pct || 0, cla = ed.center_left_arab_pct || 0;
  if(rh + cla <= 0) return null;
  return s.r2 - rh/(rh+cla)*100;
}
// PM turnout: voted / registered (some era rows carry registered=0 — skip them)
function pmTurnout(props, year){
  const row = pmRow(props.name, year);
  if(!row || row[2] <= 0 || row[3] <= 0) return null;
  return row[2]/row[3]*100;
}
// PM swing: change in the two-candidate margin vs the previous direct contest.
// Right-positive, same POST-negation convention as pmSplitValue — no flip downstream.
function pmSwingValue(props){
  const prev = PM_PREV[pmContest];
  if(!prev) return null;
  const s = pmShares(pmRow(props.name));
  const p = pmShares(pmRow(props.name, prev));
  if(!s || !p) return null;
  return (s.r2 - s.l2) - (p.r2 - p.l2);
}
// PM gap from national: locality right two-way share minus the official national one
// (single-share diff, matching both the panel's gap line and the Knesset gap mode).
function pmGapValue(props, year){
  const s = pmShares(pmRow(props.name, year));
  const nat = pmNational(year);
  if(!s || !nat) return null;
  return s.r2 - nat.r2;
}
// Change in the gap from national vs the previous direct contest — did the locality
// drift away from the country rightward (+) or leftward (−)? e.g. Jerusalem was
// +19.4 vs national in 1996 and +20.7 in 1999 → +1.3.
function pmGapChangeValue(props){
  const prev = PM_PREV[pmContest];
  if(!prev) return null;
  const g = pmGapValue(props), pg = pmGapValue(props, prev);
  if(g === null || pg === null) return null;
  return g - pg;
}
// Net vote differential: the leading candidate's raw votes minus the trailing one's,
// signed right-positive. Best read in the bubbles display (area = |net|, color = leader).
function pmNetValue(props){
  const row = pmRow(props.name);
  if(!row) return null;
  return row[0] - row[1];
}

// Same code, different ballot letters in specific elections (K14/K19 Meretz = מרץ with final tsadi; K22 Otzma = כף)
const PARTY_ALIASES = {'מרצ':{'14':'מרץ','19':'מרץ'}, 'נץ':{'22':'כף'}};
function codeForElection(code, k){
  return PARTY_ALIASES[code]?.[k] || code;
}

// Dark→bloc-color ramps for the party choropleth (same endpoints as the single-bloc modes)
const BLOC_RAMP = {
  right:['#0d1b2a','#1e90ff'], haredi:['#0d1520','#c27aed'], center:['#0a1a0f','#27d969'],
  left:['#1a0d0d','#ff4444'], arab:['#1a1408','#f5b731'], opposition_right:['#0a1618','#00e5ff']
};
const BLOC_SOLID = {right:'#4a9eff',haredi:'#9b59b6',center:'#2ecc71',left:'#e74c3c',arab:'#f39c12',opposition_right:'#00bcd4'};

// party_list entry for a canonical code in a given election (null = didn't contest)
function partyEraInfo(code, k){
  const pl = partyNational?.[k]?.party_list;
  if(!pl) return null;
  const actual = codeForElection(code, k);
  return pl.find(e => e.code === actual) || null;
}

// Fixed color scale per party across ALL its elections (p98 of nonzero locality shares),
// so the time-lapse is comparable frame to frame
const PARTY_SCALE = {};
function getPartyScale(code){
  if(PARTY_SCALE[code]) return PARTY_SCALE[code];
  const shares = [];
  Object.keys(KNESSET_YEARS).forEach(k => {
    if(!partyEraInfo(code, k)) return;
    const idx = getPartyIndex(k);
    if(!idx) return;
    const actual = codeForElection(code, k);
    for(const row of idx.rows){
      const v = row[actual];
      if(v > 0) shares.push(v);
    }
  });
  if(!shares.length) return PARTY_SCALE[code] = 100;
  shares.sort((a,b) => a-b);
  const p98 = shares[Math.floor(0.98 * (shares.length - 1))];
  return PARTY_SCALE[code] = Math.min(100, Math.max(10, Math.ceil(p98/5)*5));
}

// Reverse of PARTY_ALIASES: actual ballot code -> canonical code
const CANON_OF = {'מרץ':'מרצ', 'כף':'נץ'};

// Distinct color per canonical party for the winner map + duel sides (fallback gray)
const WINNER_COLORS = {
  'מחל':'#3b82f6', // הליכוד — blue
  'אמת':'#ef4444', // העבודה — red
  'שס':'#a855f7',  // ש"ס — purple
  'ג':'#6d28d9',   // יהדות התורה — deep violet
  'מרצ':'#f472b6', // מרצ — pink
  'כן':'#14b8a6',  // ישראל בעלייה/קדימה/כחול לבן/הממלכתי — teal
  'פה':'#22d3ee',  // יש עתיד/כחול לבן — cyan
  'ודעם':'#f59e0b',// הרשימה המשותפת — amber
  'ו':'#ea580c',   // חד"ש — dark orange
  'ום':'#d97706',  // חד"ש-תע"ל — burnt amber
  'עם':'#22c55e',  // רע"מ — green
  'דעם':'#84cc16', // רע"מ-בל"ד — lime
  'ד':'#a16207',   // בל"ד — brown
  'ע':'#fb923c',   // מד"ע-רע"מ — orange
  'ל':'#94a3b8',   // ישראל ביתנו — steel
  'ב':'#15803d',   // מפד"ל/הבית היהודי — dark green
  'ט':'#6366f1',   // מולדת/הציונות הדתית — indigo
  'טב':'#facc15',  // ימינה — yellow
  'הד':'#0ea5e9',  // הדרך השלישית — sky
  'יש':'#67e8f9',  // שינוי — light cyan
};
const WINNER_FALLBACK = '#64748b';

// Diverging green/red for party swing & gap-from-national (gray near zero, saturates at cap)
function divergingGR(val, cap){
  if(Math.abs(val) < 0.5) return 'rgb(80,80,90)';
  const t = Math.min(Math.abs(val), cap) / cap;
  return val > 0 ? lerpColor('#1a3a1a', '#2ecc71', t) : lerpColor('#3a1a1a', '#e74c3c', t);
}

// Plurality party of a locality in an election (era party_list codes only)
const WINNER_CACHE = {};
function getWinner(name, k){
  const ck = k + '|' + name;
  if(ck in WINNER_CACHE) return WINNER_CACHE[ck];
  const row = findPartyData(name, k);
  const pl = partyNational?.[k]?.party_list;
  if(!row || !pl) return WINNER_CACHE[ck] = null;
  let best = null, bp = 0;
  for(const e of pl){
    const v = row[e.code] || 0;
    if(v > bp){ bp = v; best = e; }
  }
  return WINNER_CACHE[ck] = best
    ? {code:best.code, canon:CANON_OF[best.code] || best.code, name:best.name, bloc:best.bloc, pct:bp}
    : null;
}

// Duel: side colors (distinct even when blocs collide) + share margin A−B
function duelColors(){
  const ca = WINNER_COLORS[selectedPartyCode] || '#4a9eff';
  let cb = WINNER_COLORS[selectedPartyCode2] || '#f39c12';
  if(cb === ca) cb = '#f39c12';
  return {ca, cb};
}
function duelMargin(props){
  if(!selectedPartyCode || !selectedPartyCode2) return null;
  if(!partyEraInfo(selectedPartyCode, currentElection) || !partyEraInfo(selectedPartyCode2, currentElection)) return null;
  const row = findPartyData(props.name, currentElection);
  if(!row) return null;
  return (row[codeForElection(selectedPartyCode, currentElection)] || 0)
       - (row[codeForElection(selectedPartyCode2, currentElection)] || 0);
}

// Party swing: ΔShare vs the previous election (null unless contested in both + rows exist)
function partySwingValue(props){
  if(!selectedPartyCode || !partyEraInfo(selectedPartyCode, currentElection)) return null;
  const prevK = PREV_ELECTION[currentElection];
  if(!prevK || !partyEraInfo(selectedPartyCode, prevK)) return null;
  const row = findPartyData(props.name, currentElection);
  const prow = findPartyData(props.name, prevK);
  if(!row || !prow) return null;
  return (row[codeForElection(selectedPartyCode, currentElection)] || 0)
       - (prow[codeForElection(selectedPartyCode, prevK)] || 0);
}

// Winner-mode legend: top parties by localities won in the current election
function winnerLegendHTML(){
  if(!geojsonData) return '';
  const seen = new Set(), tally = {};
  geojsonData.features.forEach(f => {
    const p = f.properties;
    if(!p.matched || seen.has(p.name)) return;
    seen.add(p.name);
    const w = getWinner(p.name, currentElection);
    if(!w) return;
    if(!tally[w.canon]) tally[w.canon] = {n:0, name:w.name, c:WINNER_COLORS[w.canon] || WINNER_FALLBACK};
    tally[w.canon].n++;
  });
  const rows = Object.values(tally).sort((a,b) => b.n - a.n);
  const top = rows.slice(0, 8);
  const rest = rows.slice(8).reduce((s,r) => s + r.n, 0);
  let h = top.map(r => `<div class="lg-sw"><span class="lg-dot" style="background:${r.c}"></span>${r.name}<b>${r.n}</b></div>`).join('');
  if(rest > 0) h += `<div class="lg-sw"><span class="lg-dot" style="background:${WINNER_FALLBACK}"></span>אחרות<b>${rest}</b></div>`;
  return h;
}

// Party gap: share − national share
function partyGapValue(props){
  if(!selectedPartyCode || !partyEraInfo(selectedPartyCode, currentElection)) return null;
  const actual = codeForElection(selectedPartyCode, currentElection);
  const nat = partyNational?.[currentElection]?.national?.[actual];
  if(nat == null) return null;
  const row = findPartyData(props.name, currentElection);
  if(!row) return null;
  return (row[actual] || 0) - nat;
}

function isDualMode(){
  if(currentMode === 'party') return partySubmode !== 'share';
  if(currentMode === 'pm') return pmSubmode !== 'turnout';
  return ['bloc','swing','gap','gap_change','turnout_change','duel'].includes(currentMode);
}

function getTurnout(props, elKey){
  const ed = getElectionData(props, elKey || currentElection);
  if(!ed) return null;
  const bzb = ed.bzb || 0;
  const voters = ed.voters || 0;
  if(bzb <= 0 || voters <= 0) return null;
  return voters / bzb * 100;
}

function getTurnoutChange(props){
  const prevKey = PREV_ELECTION[currentElection];
  if(!prevKey) return null;
  const curr = getTurnout(props, currentElection);
  const prev = getTurnout(props, prevKey);
  if(curr === null || prev === null) return null;
  return curr - prev;
}

function getModeValue(props){
  const mode = COLOR_MODES.find(m=>m.id===currentMode);
  if(mode.id === 'pm'){
    if(pmSubmode === 'split'){
      // already right-positive, matching swing's POST-negation convention — no flip here
      return pmSplitValue(props);
    }
    if(pmSubmode === 'swing') return pmSwingValue(props);   // right-positive, no flip
    if(pmSubmode === 'gap') return pmGapValue(props);       // right-positive, no flip
    if(pmSubmode === 'gap_change') return pmGapChangeValue(props); // right-positive, no flip
    if(pmSubmode === 'net') return pmNetValue(props);       // right-positive, raw votes
    if(pmSubmode === 'turnout') return pmTurnout(props);    // simple 0-100 mode
    const s = pmShares(pmRow(props.name));
    return s ? s.r2 - s.l2 : null;     // margin, same convention as bloc (rh - cla)
  }
  if(mode.id === 'turnout') return getTurnout(props);
  if(mode.id === 'turnout_change') {
    const tc = getTurnoutChange(props);
    return tc !== null ? -tc : null;
  }
  if(mode.id === 'swing'){
    const s = getSwing(props);
    if(!s) return null;
    return -((s.center_left_arab||0) - (s.right_haredi||0));
  }
  if(mode.id === 'gap'){
    const g = getGap(props);
    return g ? -g.gap : null;
  }
  if(mode.id === 'gap_change'){
    const d = getGapChange(props);
    return d !== null ? -d : null;
  }
  if(mode.id === 'party'){
    if(partySubmode === 'swing'){
      const d = partySwingValue(props);
      return d !== null ? -d : null; // negated like turnout_change: positive slider = decline side
    }
    if(partySubmode === 'gap'){
      const d = partyGapValue(props);
      return d !== null ? -d : null;
    }
    if(!selectedPartyCode || !partyEraInfo(selectedPartyCode, currentElection)) return null;
    const row = findPartyData(props.name, currentElection);
    return row ? (row[codeForElection(selectedPartyCode, currentElection)] || 0) : null;
  }
  if(mode.id === 'winner'){
    const w = getWinner(props.name, currentElection);
    return w ? w.pct : null;
  }
  if(mode.id === 'duel'){
    const m = duelMargin(props);
    return m !== null ? -m : null; // negated: positive slider = party-B side (gradient left)
  }
  if(mode.id === 'bloc'){
    let ed;
    if(currentElection === props.latest_election){
      ed = {right_haredi_pct:props.right_haredi_pct, center_left_arab_pct:props.center_left_arab_pct};
      ed = adjustBlocForYamina(ed, props.name);
    } else {
      ed = props.elections?.[currentElection];
      if(ed) ed = adjustBlocForYamina(ed, props.name);
    }
    if(!ed) return null;
    return (ed.right_haredi_pct||0) - (ed.center_left_arab_pct||0);
  }
  // Simple percentage modes
  let ed;
  if(currentElection === props.latest_election){
    ed = {right_pct:props.right_pct, haredi_pct:props.haredi_pct, center_pct:props.center_pct,
          left_pct:props.left_pct, arab_pct:props.arab_pct, opposition_right_pct:props.opposition_right_pct||0};
    ed = adjustBlocForYamina(ed, props.name);
  } else {
    ed = props.elections?.[currentElection];
    if(ed) ed = adjustBlocForYamina(ed, props.name);
  }
  if(!ed) return null;
  return ed[mode.field] || 0;
}

const map = L.map('map',{
  preferCanvas:true,   // canvas rendering — fast with ~1,200 locality polygons
  zoomControl:true,

// Fractional zoomSnap + fitBounds: frame the country tightly at any viewport aspect
// (matters most inside the dashboard iframe, where fixed zoom 8 left Israel tiny in a sea of basemap).
// Guard: a lazily-loaded iframe can initialize while its tab is still hidden (0×0 container) —
// fitBounds then computes a NaN zoom and the throw aborts the whole script. Fall back to the old
// fixed view and refit once the container gets a real size (tab shown → resize fires).
const ISRAEL_BOUNDS = [[29.45,34.25],[33.35,35.9]];

  map.fitBounds(ISRAEL_BOUNDS,{padding:[6,6]});
} else {

  const ro = new ResizeObserver(() => {   // fires when the hidden container gets its real size
    if(mapDiv.clientWidth > 0 && mapDiv.clientHeight > 0){
      ro.disconnect();
      map.invalidateSize();
      map.fitBounds(ISRAEL_BOUNDS,{padding:[6,6]});
    }
  });
  ro.observe(mapDiv);
}

let playTimer = null;
function stopPlay(){
  if(playTimer){ clearInterval(playTimer); playTimer = null; }
  document.getElementById('playBtn').textContent = '▶';
  document.getElementById('playYear').style.display = 'none';
}
function startPlay(){
  // Direct-PM mode: the timeline runs over the three PM contests instead of the Knessets
  if(currentMode === 'pm'){
    const ys = Object.keys(PM_CONTESTS);
    let j = ys.indexOf(pmContest);
    if(j >= ys.length - 1) j = -1;
    document.getElementById('playBtn').textContent = '⏸';
    const yearEl = document.getElementById('playYear');
    yearEl.style.display = 'block';
    const pmStep = () => {
      j++;
      if(j >= ys.length){ stopPlay(); return; }
      pmGo(ys[j]);
      const m = PM_CONTESTS[ys[j]];
      yearEl.textContent = `בחירה ישירה ${ys[j]} · ${m.rShort} מול ${m.lShort}`;
    };
    pmStep();
    playTimer = setInterval(pmStep, 1500);
    return;
  }
  const ks = Object.keys(KNESSET_YEARS);
  let i = ks.indexOf(currentElection);
  if(i >= ks.length - 1) i = -1;                 // at the end -> restart from 1992
  document.getElementById('playBtn').textContent = '⏸';
  const yearEl = document.getElementById('playYear');
  yearEl.style.display = 'block';
  const step = () => {
    i++;
    if(i >= ks.length){ stopPlay(); return; }
    selectElection(ks[i]);
    let label = `${KNESSET_YEARS[ks[i]]} · כנסת ${ks[i]}`;
    if(currentMode === 'party' && selectedPartyCode){
      const info = partyEraInfo(selectedPartyCode, ks[i]);
      label += info ? ` · ${info.name}` : ' · לא התמודדה';
    } else if(currentMode === 'duel' && selectedPartyCode && selectedPartyCode2){
      const a = partyEraInfo(selectedPartyCode, ks[i]);
      const b = partyEraInfo(selectedPartyCode2, ks[i]);
      label += ` · ${a ? a.name : '—'} מול ${b ? b.name : '—'}`;
    }
    yearEl.textContent = label;
  };
  step();
  playTimer = setInterval(step, 1500);
}

// #k=25&mode=party&code=שס&sub=swing&display=bubbles — written on every state change, applied on load
function updateHash(){
  const q = new URLSearchParams();
  q.set('k', currentElection);
  q.set('mode', currentMode);
  q.set('display', displayMode);
  if(satBase) q.set('base', 'sat');
  if(currentMode === 'party'){
    if(selectedPartyCode) q.set('code', selectedPartyCode);
    if(partySubmode !== 'share') q.set('sub', partySubmode);
  }
  if(currentMode === 'duel'){
    if(selectedPartyCode) q.set('code', selectedPartyCode);
    if(selectedPartyCode2) q.set('code2', selectedPartyCode2);
  }
  if(currentMode === 'pm'){
    q.set('pmc', pmContest);
    if(pmSubmode !== 'vote') q.set('pmsub', pmSubmode);
  }
  // tourActive is var-declared (hoisted) in the tour section, so this is safe during initial setup
  if(tourActive){ q.set('tour', tourK); q.set('step', String(tourStep + 1)); }
  history.replaceState(null, '', '#' + q.toString());
}

function parseHash(){
  if(!location.hash || location.hash.length < 2) return;
  const q = new URLSearchParams(location.hash.slice(1));
  if(q.get('base') === 'sat') setBase(true);
  const disp = q.get('display');
  if(disp && ['polygons','bubbles','dorling'].includes(disp)){
    displayMode = disp;
    document.querySelectorAll('#displayToggle .mode-btn').forEach(b => b.classList.toggle('active', b.dataset.display === disp));
  }
  const code = q.get('code');
  if(code) selectedPartyCode = code;
  const code2 = q.get('code2');
  if(code2) selectedPartyCode2 = code2;
  const sub = q.get('sub');
  if(sub && ['share','swing','gap'].includes(sub)){
    partySubmode = sub;
    document.querySelectorAll('#partySubmodes .mode-btn').forEach(b => b.classList.toggle('active', b.dataset.sub === sub));
  }
  const pmc = q.get('pmc');
  if(pmc && PM_CONTESTS[pmc]) pmContest = pmc;
  const pmsub = q.get('pmsub');
  if(pmsub && ['vote','swing','gap','gap_change','net','turnout','split'].includes(pmsub)) pmSubmode = pmsub;
  const mode = q.get('mode');
  if(mode && COLOR_MODES.some(m => m.id === mode)) selectMode(mode);
  const k = q.get('k');
  if(k && KNESSET_YEARS[k]) selectElection(k);
  // #loc=<semel or name> — select + frame a locality, same path as a search-suggestion
  // click. Safe here: parseHash runs only after geojsonData is loaded.
  const loc = q.get('loc');
  if(loc && geojsonData){
    const feat = geojsonData.features.find(f => String(f.properties.semel) === loc) ||
                 geojsonData.features.find(f => f.properties.name === loc);
    if(feat){
      selectedFeature = feat;
      updateMap();
      showPanel(feat);
      const layer = findLayer(feat.properties.name);
      if(layer) map.fitBounds(layer.getBounds(), {padding:[50,50], maxZoom:12});
      else { const cc = featureCentroid(feat); if(cc) map.setView(cc, Math.max(map.getZoom(), 11)); }
    }
  }
}

  const all = Object.keys(TOURS.tours);
  const els = all.filter(k => KNESSET_YEARS[k]).sort((a, b) => +a - +b);
  const arcs = all.filter(k => !KNESSET_YEARS[k]);   // thematic arcs: non-election keys, steps carry their own k
  const item = k => {
    const t = TOURS.tours[k];
    const head = KNESSET_YEARS[k] ? tourElectionLabel(k) : (t.range || '');
    return '<button class="tour-pick-item" data-tour="' + k + '"><b>' + head + '</b>' +
      '<span>' + tourT(t.title) + '</span>' +
      '<span style="margin-inline-start:auto;color:var(--text3)">' + t.steps.length + '</span></button>';
  };
  p.innerHTML = '<h3>' + tui('pickerTitle') + '</h3><p>' + tui('pickerHint') + '</p>' +
    els.map(item).join('') +
    (arcs.length ? '<h3 style="margin-top:14px">' + tui('arcsTitle') + '</h3>' + arcs.map(item).join('') : '');
  p.classList.add('open');
  document.getElementById('tourCard').classList.remove('open');
  p.querySelectorAll('.tour-pick-item').forEach(b => { b.onclick = () => startTour(b.dataset.tour, 0); });
}

function startTour(k, step){
  if(!TOURS || !TOURS.tours[k]) return;
  ensureTourDom();
  document.getElementById('tourPicker').classList.remove('open');
  if(playTimer) stopPlay();          // the timeline animation and a tour would fight over selectElection
  tourActive = true;
  tourK = k;
  tourGo(step || 0);
}

function tourGo(i){
  const tour = TOURS.tours[tourK];
  tourStep = Math.max(0, Math.min(i, tour.steps.length - 1));
  const s = tour.steps[tourStep];
  applyTourState(s.state || {});
  tourFocus(s);
  renderTourCard(tour, s);
  updateHash();
}

// Same application order as parseHash: display -> codes -> submode -> mode -> election
function applyTourState(st){
  const disp = st.display || 'polygons';
  if(displayMode !== disp){
    displayMode = disp;
    document.querySelectorAll('#displayToggle .mode-btn').forEach(b => b.classList.toggle('active', b.dataset.display === disp));
  }
  if(st.code) selectedPartyCode = st.code;
  if(st.code2) selectedPartyCode2 = st.code2;
  const sub = st.sub || 'share';
  partySubmode = sub;
  document.querySelectorAll('#partySubmodes .mode-btn').forEach(b => b.classList.toggle('active', b.dataset.sub === sub));
  selectMode(st.mode || 'bloc');
  // thematic arcs set k per step; election tours inherit the tour key
  const wantK = st.k || tourK;
  if(KNESSET_YEARS[wantK] && currentElection !== wantK) selectElection(wantK);
}

function tourFocus(s){
  clearTourFocus();
  const names = s.focus || [];
  const pts = [], markers = [], seen = new Set();
  (geojsonData && geojsonData.features || []).forEach(f => {
    const nm = f.properties && f.properties.name;
    if(!names.includes(nm)) return;
    const cen = featureCentroid(f);
    if(!cen) return;
    pts.push(cen);
    if(seen.has(nm)) return;           // multi-polygon localities get a single label
    seen.add(nm);
    const lbl = (TOUR_LANG === 'en' && f.properties.name_en) ? f.properties.name_en : nm;
    markers.push(L.marker(cen, {
      interactive: false,
      icon: L.divIcon({className: 'tour-focus', iconSize: [150, 46], iconAnchor: [75, 12],
        html: '<div class="tour-ring"></div><div class="tour-focus-label">' + lbl + '</div>'})
    }));
  });
  if(!pts.length){ map.flyToBounds(ISRAEL_BOUNDS, {padding: [6, 6], duration: 1.1}); return; }
  tourHighlightLayer = L.layerGroup(markers).addTo(map);
  // extra bottom padding keeps the framed localities clear of the story card
  if(pts.length === 1) map.flyTo(pts[0], s.zoom || 11, {duration: 1.1});
  else map.flyToBounds(L.latLngBounds(pts).pad(0.22),
    {paddingTopLeft: [30, 80], paddingBottomRight: [30, 210], maxZoom: s.zoom || 10.5, duration: 1.1});
}

function clearTourFocus(){
  if(tourHighlightLayer){ map.removeLayer(tourHighlightLayer); tourHighlightLayer = null; }
}

function renderTourCard(tour, s){
  const card = document.getElementById('tourCard');
  card.classList.add('open');
  const n = tour.steps.length;
  document.getElementById('tourKicker').textContent =
    tourT(tour.title) + ' · ' + tui('storyOf').replace('{i}', tourStep + 1).replace('{n}', n) +
    (s.state && s.state.k ? ' · ' + tourElectionLabel(s.state.k) : '');   // arcs: show which election this stop is on
  document.getElementById('tourTitle').textContent = tourT(s.title);
  document.getElementById('tourText').textContent = tourT(s.text);
  const dots = document.getElementById('tourDots');
  dots.innerHTML = '';
  for(let j = 0; j < n; j++){
    const d = document.createElement('button');
    d.className = 'tour-dot' + (j === tourStep ? ' on' : '');
    d.title = tourT(tour.steps[j].title);
    d.onclick = () => tourGo(j);
    dots.appendChild(d);
  }
  const prev = document.getElementById('tourPrev'), next = document.getElementById('tourNext');
  prev.textContent = tui('prev');
  prev.disabled = tourStep === 0;
  next.textContent = tourStep === n - 1 ? tui('done') : tui('next');
}

function endTour(){
  tourActive = false;
  clearTourFocus();
  const c = document.getElementById('tourCard');
  if(c) c.classList.remove('open');
  const p = document.getElementById('tourPicker');
  if(p) p.classList.remove('open');
  updateHash();
}

// #tour=25&step=3 deep link — called after parseHash once the geo layer exists;
// if the tours file is still in flight the pending ref is applied when it lands.
function applyTourFromHash(){
  if(!TOUR_INITIAL_HASH || TOUR_INITIAL_HASH.length < 2) return;
  const q = new URLSearchParams(TOUR_INITIAL_HASH.slice(1));
  const t = q.get('tour');
  if(!t) return;
  const st = Math.max(1, parseInt(q.get('step') || '1', 10) || 1) - 1;
  if(TOURS && TOURS.tours[t]) startTour(t, st);
  else tourPendingHash = {t: t, st: st};
}

document.getElementById('tourBtn').onclick = () => {
  if(tourActive){ endTour(); return; }
  const p = document.getElementById('tourPicker');
  if(p && p.classList.contains('open')){ p.classList.remove('open'); return; }
  openTourPicker();
};

document.addEventListener('keydown', e => {
  if(!tourActive || !TOURS) return;
  if(e.key === 'Escape'){ endTour(); return; }
  if(e.target && /INPUT|SELECT|TEXTAREA/.test(e.target.tagName)) return;
  // forward = reading direction: left arrow on the RTL page, right arrow on the English page
  const fwd = document.documentElement.dir === 'rtl' ? 'ArrowLeft' : 'ArrowRight';
  const back = fwd === 'ArrowLeft' ? 'ArrowRight' : 'ArrowLeft';
  if(e.key === fwd){ e.preventDefault(); if(tourStep < TOURS.tours[tourK].steps.length - 1) tourGo(tourStep + 1); }
  else if(e.key === back){ e.preventDefault(); if(tourStep > 0) tourGo(tourStep - 1); }
});

// Helper: get yamina pct for a locality in K24
function getAdjustedNationalData(elKey){
  const natEl = nationalData[elKey];
  if(!natEl) return null;
  if(!yaminaInRight || elKey !== '24') return natEl;
  // Get yamina national pct from parties data (code 'ב' = 6.21%)
  const yPct = partyNational?.['24']?.national?.['ב'] || 0;
  if(yPct === 0) return natEl;
  return Object.assign({}, natEl, {
    right_haredi_pct: (natEl.right_haredi_pct || 0) + yPct,
    center_left_arab_pct: (natEl.center_left_arab_pct || 0) - yPct,
    opposition_right_pct: (natEl.opposition_right_pct || 0) - yPct,
    right_pct: (natEl.right_pct || 0) + yPct,
  });
}

function getYaminaPct(localityName){
  if(!partyByLocality || !partyByLocality['24']) return 0;
  const pd = findPartyData(localityName, '24');
  return pd ? (pd['ב'] || 0) : 0;
}

// Adjust bloc percentages for K24 yamina toggle
// elKey param allows adjusting K24 data even when viewing a different election (e.g. swing from K25)
function adjustBlocForYamina(ed, localityName, elKey){
  const effectiveEl = elKey || currentElection;
  if(!yaminaInRight || effectiveEl !== '24') return ed;
  const yPct = getYaminaPct(localityName);
  if(yPct === 0) return ed;
  return Object.assign({}, ed, {
    right_haredi_pct: (ed.right_haredi_pct || 0) + yPct,
    center_left_arab_pct: (ed.center_left_arab_pct || 0) - yPct,
    opposition_right_pct: Math.max(0, (ed.opposition_right_pct || 0) - yPct),
    right_pct: (ed.right_pct || 0) + yPct,
  });
}

// Honest identities for reused ballot letters — the letter is NOT the party
// (same principle as party_analysis's name-change warning). Each entry below
// partitions a code's elections into separate picker entries; the entry name is
// taken from its own era's list name in the data, so nothing is hardcoded twice.
// e.g. פה = מפלגת המרכז (1999) / יש עתיד / כחול לבן; ת = התחיה (1992) / תקווה חדשה.
const PARTY_IDENTITY_SEGMENTS = {
  'פה': [['15'], ['19','20','24','25'], ['21','22','23']],
  'כן': [['14','15','16'], ['17','18','19'], ['24'], ['25']],
  'ב':  [['13','14','15','16'], ['18','25'], ['24']],
  'ט':  [['13','14'], ['18'], ['24','25']],
  'טב': [['17'], ['19','20'], ['21'], ['22','23']],
  'נץ': [['16'], ['19'], ['22','23']],
  'ת':  [['13'], ['24']],
};

// Select the picker option for a party code: prefer the identity segment covering
// the current election, else the code's first entry (segmented values are 'code@idx').
function setPickerValue(sel, code){
  const opts = [...sel.options].filter(o => o.value === code || o.value.startsWith(code + '@'));
  if(!opts.length) return;
  let pick = opts[0];
  if(opts.length > 1 && partyCatalog){
    const cover = opts.find(o => {
      const c = partyCatalog[+o.value.split('@')[1]];
      return c && c.elections.includes(currentElection);
    });
    if(cover) pick = cover;
  }
  sel.value = pick.value;
}

// Build the canonical-party catalog from parties_national (union of party_list across elections,
// alias codes folded in, reused letters split into identity segments) and populate the picker.
function ensurePartyPicker(){
  if(partyCatalog || !partyNational) return;
  const byCode = {};
  Object.keys(partyNational).sort((a,b)=>+a-+b).forEach(k => {
    (partyNational[k].party_list || []).forEach(e => {
      let code = e.code;
      for(const [canon, byEl] of Object.entries(PARTY_ALIASES)){
        if(byEl[k] === code) code = canon;
      }
      if(!byCode[code]) byCode[code] = {code, elections:[], name:'', bloc:'', nameByEl:{}};
      byCode[code].elections.push(k);
      byCode[code].name = e.name;  // latest era name wins
      byCode[code].bloc = e.bloc;
      byCode[code].nameByEl[k] = e.name;
    });
  });
  const entries = [];
  Object.values(byCode).forEach(c => {
    const segs = PARTY_IDENTITY_SEGMENTS[c.code];
    if(!segs){ entries.push(c); return; }
    const claimed = new Set();
    segs.forEach(seg => {
      const els = c.elections.filter(k => seg.includes(k));
      if(!els.length) return;
      els.forEach(k => claimed.add(k));
      entries.push({code:c.code, elections:els, name:c.nameByEl[els[els.length-1]], bloc:c.bloc});
    });
    const rest = c.elections.filter(k => !claimed.has(k));   // future-proof: unpartitioned elections
    if(rest.length) entries.push({code:c.code, elections:rest, name:c.nameByEl[rest[rest.length-1]], bloc:c.bloc});
  });
  partyCatalog = entries.sort((a,b) =>
    b.elections.length - a.elections.length ||
    (+b.elections[b.elections.length-1]) - (+a.elections[a.elections.length-1]));
  const sel = document.getElementById('partySelect');
  const sel2 = document.getElementById('partySelect2');
  sel.innerHTML = '';
  sel2.innerHTML = '';
  partyCatalog.forEach((c, idx) => {
    const yF = KNESSET_YEARS[c.elections[0]], yL = KNESSET_YEARS[c.elections[c.elections.length-1]];
    // ⁦…⁩ (LRI/PDI) keeps the year range LTR inside the RTL option text
    const label = c.name + ' · ' + (yF === yL ? yF : `⁦${yF}–${yL}⁩`);
    // segmented codes need unique option values; consumers strip after '@'
    const val = PARTY_IDENTITY_SEGMENTS[c.code] ? c.code + '@' + idx : c.code;
    [sel, sel2].forEach(s => {
      const opt = document.createElement('option');
      opt.value = val;
      opt.textContent = label;
      s.appendChild(opt);
    });
  });
  const onPick = () => {
    selectedPartyCode = sel.value.split('@')[0];          // strip segment suffix
    selectedPartyCode2 = (sel2.value || selectedPartyCode2).split('@')[0];
    filterRange = 0;
    updateLegend();
    updateMap();
    if(selectedFeature) showPanel(selectedFeature);
    updateHash();
  };
  sel.onchange = onPick;
  sel2.onchange = onPick;
  // Submode pills (אחוז / סווינג / פער מהארץ) — party mode only
  document.querySelectorAll('#partySubmodes .mode-btn').forEach(btn => {
    btn.onclick = () => {
      partySubmode = btn.dataset.sub;
      document.querySelectorAll('#partySubmodes .mode-btn').forEach(b => b.classList.toggle('active', b === btn));
      filterRange = 0;
      updateLabelModeVis();
      updateLegend();
      updateMap();
      if(selectedFeature) showPanel(selectedFeature);
      updateHash();
    };
  });
  // Label-mode pills (מעוזים / ספקיות הקולות) — which top-10 gets tagged on the map (share submode only)
  document.querySelectorAll('#partyLabelModes .mode-btn').forEach(btn => {
    btn.onclick = () => {
      partyLabelMode = btn.dataset.lbl;
      document.querySelectorAll('#partyLabelModes .mode-btn').forEach(b => b.classList.toggle('active', b === btn));
      updateStrongholds();
    };
  });
}

function getFilterDisplayValue(val){
  const mode = COLOR_MODES.find(m=>m.id===currentMode);
  const abs = Math.abs(val);
  if(mode.id === 'bloc'){
    const side = val > 0 ? 'מרכז-שמאל-ערבים' : 'ימין-חרדים';
    return '+' + abs + '% ' + side;
  } else if(mode.id === 'pm' && pmSubmode === 'vote'){
    const m = PM_CONTESTS[pmContest];
    return '+' + abs + '% ' + (val > 0 ? m.lShort : m.rShort);
  } else if(mode.id === 'pm' && pmSubmode === 'turnout'){
    return '+' + val + '%';
  } else if(mode.id === 'pm' && pmSubmode === 'net'){
    const m = PM_CONTESTS[pmContest];
    const v = Math.round(abs / 100 * 10000);
    return '+' + v.toLocaleString() + ' קולות ל' + (val > 0 ? m.lShort : m.rShort);
  } else if(mode.id === 'pm'){
    const v = Math.round(abs / 100 * 30);
    if(pmSubmode === 'swing') return '+' + v + '% ' + (val > 0 ? 'סווינג שמאלה' : 'סווינג ימינה');
    if(pmSubmode === 'gap') return '+' + v + '% ' + (val > 0 ? 'שמאלי מהארץ' : 'ימני מהארץ');
    if(pmSubmode === 'gap_change') return '+' + v + '% ' + (val > 0 ? 'פער גדל שמאלה' : 'פער גדל ימינה');
    return '+' + v + '% ' + (val > 0 ? 'פיצול שמאלה' : 'פיצול ימינה');
  } else if(mode.id === 'party' && partySubmode === 'swing'){
    const v = Math.round(abs / 100 * 15);
    return (val > 0 ? '-' : '+') + v + '% ' + (val > 0 ? 'ירידה' : 'עלייה');
  } else if(mode.id === 'party' && partySubmode === 'gap'){
    const v = Math.round(abs / 100 * 20);
    return (val > 0 ? '-' : '+') + v + '% ' + (val > 0 ? 'מתחת לארצי' : 'מעל הארצי');
  } else if(mode.id === 'duel'){
    const v = Math.round(abs / 100 * 30);
    const catA = partyCatalog?.find(c => c.code === selectedPartyCode);
    const catB = partyCatalog?.find(c => c.code === selectedPartyCode2);
    const side = val > 0 ? (catB ? catB.name : 'ב׳') : (catA ? catA.name : 'א׳');
    return '+' + v + '% ל' + side;
  } else if(mode.id === 'swing' || mode.id === 'gap' || mode.id === 'gap_change'){
    const v = Math.round(abs / 100 * 30);
    const side = val > 0 ? 'שמאלה' : 'ימינה';
    return '+' + v + '% ' + side;
  } else if(mode.id === 'turnout_change'){
    const v = Math.round(abs / 100 * 15);
    const side = val > 0 ? 'ירידה' : 'עלייה';
    const sign = val > 0 ? '-' : '+';
    return sign + v + '% ' + side;
  } else {
    return '+' + val + '%';
  }
}

function localityPassesFilter(props){
  if(filterRange === 0) return true;
  const val = getModeValue(props);
  if(val === null) return false;
  
  if(isDualMode()){
    if(currentMode === 'turnout_change' || currentMode === 'party' || currentMode === 'duel'){
      // not flipped: getModeValue already carries the slider's sign convention
      const scale = currentMode === 'turnout_change' ? 15
                  : currentMode === 'duel' ? 30
                  : (partySubmode === 'gap' ? 20 : 15);
      const threshold = filterRange / 100 * scale;
      return filterRange > 0 ? val >= threshold : val <= threshold;
    }
    // bloc/pm/swing/gap/gap_change: flipped gradient, so swap directions
    // (pm 'vote' is a percent margin like bloc; pm 'net' is raw votes, capped at 10k;
    // the other pm submodes are swing-scaled)
    const pmVote = currentMode === 'pm' && pmSubmode === 'vote';
    const pmNet = currentMode === 'pm' && pmSubmode === 'net';
    if(filterRange > 0){
      let threshold;
      if(currentMode === 'bloc' || pmVote) threshold = filterRange;
      else if(pmNet) threshold = filterRange / 100 * 10000;
      else threshold = filterRange / 100 * 30;
      return val <= -threshold;
    } else {
      let threshold;
      if(currentMode === 'bloc' || pmVote) threshold = -filterRange;
      else if(pmNet) threshold = -filterRange / 100 * 10000;
      else threshold = -filterRange / 100 * 30;
      return val >= threshold;
    }
  } else {
    return val >= filterRange;
  }
}

function updateFilterLabels(){
  if(!geojsonData) return;
  let total = 0, matching = 0;
  geojsonData.features.forEach(f => {
    if(!f.properties.matched) return;
    total++;
    if(localityPassesFilter(f.properties)) matching++;
  });
  const countEl = document.getElementById('filterCount');
  if(filterRange === 0){
    countEl.textContent = 'גרור לסינון ישובים';
  } else {
    countEl.textContent = `${getFilterDisplayValue(filterRange)} · ${matching} / ${total} ישובים`;
  }
}

document.getElementById('filterThreshold').addEventListener('input', (e) => {
  filterRange = parseInt(e.target.value);
  updateFilterLabels();
  updateMap();
});
